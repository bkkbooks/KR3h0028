body:
  text: 廣川書跋卷八宋董逌著魯公祭姪文峻拔一角潛虚半股此於書法其體裁當如此矣至於分若抵背合如竝目以側映斜以斜附曲然後成書而古人於此葢盡之也魯公於書其過人處正在灋度備存而端勁莊特朢之知為盛徳君子也甞問懐素折釵股何如屋漏水曰老賊盡之矣前人於其隱處亦自矜持不以告人其造微者然後得之此二體又在八法六體外乃知書一技而其法之衆至此公祭猶子文殆兼存此體者也磨崖碑中興頌刻永州浯溪上斲其崖石書之刺史元結撰結以能文卓然振起衰陋自以老於文學故頌國之中興頌成乞書顔太師太師以書名時而此尤瑰瑋故世貴之今數百年蘚封莓固逺望雲烟外至者仰而玩之其亦天下之偉觀者耶甞謂唐之文敝極矣結以古學為天下倡首芟擢蓬艾奮然拔出數百年外故其言危苦險絶略無時習態氣質竒古踔厲自將甞曰山蒼然一形水泠然一色大抵以簡潔為主韓退之評其文謂以所能鳴者余謂唐之古文自結始至愈而後大成也放生池碑顔太師以書自娯平生意好惟此不替晩年甞載石以行礱而藏之遇事以書隨所在留其所鐫石監視而􅊲之自公之沒名徳雖在人然世豈盡知惟書于石者人得見之故今獨以書名於世或謂公以書傳流俗間至野人田老皆得名之甚至與書藝人竝傳王密碑太師於書天得也甞學折釵股謂得古人書法隱處余見此碑特盡之矣故為世絶藝觀太師名徳偉然為天下第一忠義之發本于天性今人不得盡知惟書法入石流傳于後故世無賢不肖皆得知之葢以公為善書人也今書藝所學皆深墨重筆如指畫木印狀皆謂能學公之書矣㫺夫子能拓闗而不以力聞葢以慎其所習也公於書自喜常患後世不傳則其䧟流俗中亦自取其累也摹畫贊東方曼倩畫贊㫺魯公守平原時為書今其石刓剥後世復為摹搨以傳然魯公於書其神明煥發正在筆畫外若弮朱墨而印于石者此待詔書爾果有道耶公之書幸今猶有存者更數十百年後石破字缺人間所得皆其傳摹見者必唾而笑之其書不足傳也新驛記新驛記唐祕書少監李陽冰書陽冰在唐以篆學名世自秦相李斯後號能書者不得伯仲間見也今世壯碑巨碣尚多有之其詣絶處更無蹊轍可索碑陰有頌謂斯去千載冰生唐時冰今又去後來者誰後千年有人吾不得知之後千年無人當盡於斯嗚呼郡人為吾寳之㫺歐陽文忠公嘗疑唐相賈耽為之葢耽喜陽冰書甞為序其説文字原耽後又為滑州刺史其為刻此或可信也余􅊲其言葢舒元輿所為玉筯篆志謂斯去千載冰復去矣誰能得也當盡於斯嗚呼主人則與今碑陰或異葢後人因其文時有改定以合此記不足怪也雖然陽冰篆字其甚工處不盡於此而刻元輿頌者獨見此碑爾元輿又謂陽冰其格峻其力猛其功備光大於秦斯信矣則亦屢進而不止也李陽冰篆千字陽冰於書授法張旭世疑長史遊於顛㝠之地所以離遁繩墨而自放者也豈有蹟可求哉觀陽冰此帖得書法三昧雖規合榘應不遁方圓至其神明合離殆無蹊徑可蹈而循固知與長史異者形蹟之間也書家以法相授其律甚嚴非心融神會未甞以付始求于法不參流動如羚羊掛角更無聲蹟逮其游于法之外斯可語成法矣琴銘唐李祕監琴銘十字特竒古李陽冰小篆惟見于此琴在太常㫺陳儀為協律郎甞出以示客余因摹其書今琴入禁中故世以其書貴也沈存中書曰南溟島上得一木名伽陀羅紋如銀屑其堅如石命工斲為此琴且謂琴材欲輕鬆脃滑木堅如石可以製琴所未諭也觀此是括未甞見琴其銘亦不盡見也今銘曰以為臨岳等此豈為琴材者耶或曰琴之臨岳何据曰㫺孫綽云囘風臨岳刈飾流離成公綏亦曰臨岳則齊州之丹林顔黄門曰琴首更絃者名臨岳琴必以堅木藉絃欲其不刻入也世人既不見琴而銘又少得傳括以其書行於世則余不得不辯徐浩寳林寺詩李邦彦出㑹稽寳林寺詩黄庭堅書其後曰法士多瓌能奴來反乃是僧為鼈爾孤岫龜形在謂山有穴而特不可謂山余評曰此詩未有工處特以書貴季海書名唐世而此石乃公平生書不得不尚如髙閣無恢炱音苔乃詩人會意誤處黄子抉而警之是一快事謂瓌能孤岫不害于詩黄子求人已細張子曰因進非哀表賢選能奴來切馮相觀祲祈禳攘災古人已如此音況能有所合謂之能自有据耶尔疋曰山有穴岫不必謂如神瀵凡山有竅穿可見者皆是故謝康樂言牕間列逺岫𤣥暉言雲表呉岫徹杜甫言自多窮岫雨韓愈言㸃㸃露數岫豈盡失也若白居易言岫合雲初吐則不可謂山聳而出者世人多託人見聞以為己是黄子説甞勝人亦未深􅊲余不得不辯政和元年四月十三日徐浩開河碑書家貴在得筆意若拘于法者正似唐經所傳者爾其於古人極地不復到也觀前人于書自有得于天然者下手便見筆意其于工夫不至雖不害為佳致然不合于法者亦終不可語書也觀蘭亭叙樂毅論便知逸少於法度備矣此皆已出後人摹勒以傳不能盡得當時下筆意至其合處猶度絶前軰備有書法可􅊲則知書到古人地位自可以法度論也㫺蔡邕受法於神人傳于崔瑗瑗傳之文姬文姬傳之鍾繇繇傳之衛夫人夫人傳之逸少自此而下各有師授逮于張旭其書分故蔡有隣法為篆惟顔清臣徐季海守舊法而真行盡合于古之作者至韋玩崔邈授其法而絶矣􅊲其源流正如禪家宗風相承各有主也後人積學不及古人而授受又無傳嗣宜其不知古人筆意可勝歎耶開河碑令狐綯文字季海所書也書法該備而尤玅他石知其法度所從來遠矣徐浩題經題經楷法最密殆於樂毅論得其結字玅處至形密埶疎字細畫短故當在伯仲間然方而有規圓而藏矩未甞刓角耀鋒構成觚稜正如大匠掄材斲木就器繩墨既陳潛刄其間求礱削之蹟殆不可見況痕瑕節目可得而求之耶季海于此可以忘情筆墨矣顧法度存者世知什一豈論三四哉懐素七帖書法相傳至張顛後則魯公得盡於楷懐素得盡於草故魯公謂以狂繼顛正以師承源流而論之也然旭於草字則度絶繩墨懐素則謹於法度要之二人皆造其極斯可以語善學矣昔魯男子以其不可學桞下惠之可素于張旭吾知出此懐素别本帖李丕緒舊藏懐素别本有六帖筆力險絶而法度盡應比他書若異葢古人於用筆時一法不立故衆技隨至而於見空時得無字相此其不落世檢而天度自全也世人方將捉三寸柔豪籍之緹油心量形象而暗度逺近疏密隨步武之後躡其遺塵豈復有全書者耶鄔融甞問素胡不學雨霤痕良久而省又問撥鐙法如何曰如人竝乘鐙不相犯剜鋒事密射如何曰不可言也觀其書知此法從來久矣懐素洪州詩懐素似不許右軍得名太過謂漢家聚兵楚無人也其與阮籍言世無英雄使豎子成名氣亦略等矣觀李廣射石秦人扑虎皆在氣全未分時使心一改而氣已移雖有勇決剛果何施於用耶懐素氣成乎技者也直視無前而能坐收成功天下至莫與争勝其氣葢一世久矣故能致一而終身不衰也北亭草筆懐素於書自言得筆法三昧觀唐人評書謂不減張旭素雖馳騁繩墨外而囘旋進退莫不中節旭則更無蹊轍可擬超忽變滅未甞覺山谷之險原隰之夷以此異爾今其書自謂真出鍾草出張真字不見于世惟草獨傳當其手筆調和時忘神定氣徐起而視所鄊無前故能迥出唐諸子右奄薄劉宋齊隋而兼有之其體製該備顧後世不能加也北亭所書適當其逐鴻濛而問太虚時矣至其㑹處乃假浪岷山放乎江之津也髙閒千字閒之書不多存於世其學出張顛在唐得名甚顯韓退之甞謂張旭喜怒憂悲必於書發之故能變化若鬼神旭之書其初豈能無是哉其進於知者日益逺矣指與物化而心稽者喪矣縱横振發超忽滅沒忽乎出于前者若雨雪霜雹雷轟電激方其時豈復知喜怒憂悲而求以發之耶觀閒書者知隨步置履於旭之境矣彼投蹟無差者豈復循己棄之轍蹟而求致之哉正善學旭者也遺教經歐陽永叔以此為唐寫經手黄魯直謂此書在楷法中小不及樂毅論今世不知樂毅論已遭火而别本為薛崇徹所藏亡于五溪其搨本皆摹畫善者則亦與寫經手何異但此書疏肥令密密瘦令疏自得古人書意其為名輩所推良有以也昔張翼代羲之草奏㡬乎亂真褚遂良臨冩右軍亦為髙玅但恨乏自然後人不見逸少蹟若碑刻所傳已多假偽則臨搨善工自足惑世矣常得佛戒經其碑乃比邱道秀書與此經一體率化衆縁共崇鐫刻則知為道秀所書但世不傳爾道秀徳宗時人其書當建中三年壬戌葢永叔魯直不見碑陰故所評如此鑄鼎原銘虢州刺史王顔撰華州刺史袁淄籀書其作銘在貞元十一年九月至十七年韋諷復書識其後以籀為篆葢古者均謂之篆至秦既分殆以史籀所書為籀不足異也其曰得玉石佩於原上地深四尺得獲之黄帝去今六千四百三十年謂此上升時小臣遺墜物也此則怪矣然原上非人迹所至佩藏土下當時不得不異其説以黄帝為六千年者緯書也三皇逺矣後世推􅊲不得其序史記雖斷自黄帝然嵗月尤謬誤而緯書之説又皆臆決安可信哉但言者欲引以自神則増多竒怪亦其常也隂真人詩酆都宮隂真人祠刻詩三章唐貞元中刺史李貽孫書元豐四年轉運判官許安世即祠下盡閱其石謂此三詩真隂氏作如還丹等皆後人託之乃屬知䕫州呉師孟書既成送觀中於是盡破䃣其餘石故今世不得傳余甞得舊石本然獨存此也真人名長生新野隂氏本儒生有才貌善著書其學類左元放甞授太清神丹故世傳其丹經贊文甚古雅亦異東漢時人不知常為此詩也此詩雖然與漢異不知安世何据而知余益知前所毁棄未必皆非長生所述葛洪曰長生服金液半齊其止世間㡬千年然後仙去殆古強所謂洪亦不省也李翺題名李子揚出貞元某年李文公題名唐之進士科目葢自韋肇始而兩京初未聞今􅊲文公所書知府送皆有㑹集書於慈㤙石楹葢當時等甲進士便與科名等故世尤貴重觀韋貫之集有啓獻韓貞公乞免知進士舉當時貞公欲以解頭目送文公謂頭須用合及等人恐不可令舉子作解頭取及第由是乃得以李翺為第一張仲素次之葢自十人解送而九人入等時以為盛即此題名是也子揚世系葢習之胄緒宜其保此桐柏廟碑唐元􅍬修桐柏廟碑昔歐陽永叔謂刻銘於碑謂之碑銘後世伐石刻文既非因柱已不宜謂之碑則􅍬書此為碑過矣古者廟中庭謂之碑故以碑為節然獨不可以石刻文遂謂之碑甞見伏滔功徳銘曰堯碑禹碣歴古不昧范雲亦謂甞見異書堯碑禹碣皆為籀文在崆峒山中此果足信哉余謂􅍬為此碑亦因是為据撫州六詠陳公逺得戴容州臨川六詠筆畫疏瘦婉麗勁疾不在唐諸子下然世不以能書名也葢叔倫自以詞學著聞世少見其書宜其不為人知其後識曰龍沙或疑叔倫燕人者今􅊲新舊書皆曰豫章或曰其先葢幽都又戴自宋出無相及也豫章記言章江東岸沙埶如卧龍狀故叔倫詩曰鄰里龍沙北以沙岸如龍故云絳守居園池記文章之竒至矣作者既衆人争務以工自見時出所長㬥耀震發則其勢必至恢詭譎怪而後己金玉犀象人之所寳楩楠豫章人之所材至于大宇之下常珍滿目故非竒玩怪産不足以發異觀於是海中腐石以出珊瑚溝中斷木以供犧尊唐之文敝極矣而後有韓退之振起衰陋故皇甫湜李翺張籍輩相附而出葢亦求海中之石溝中之木者也嗚呼能不隨人後以自樹立宜昌黎公之文獨臻其至耶園池記别本園池記文既怪險人患難知葢紹述亦釋於後自昔不知故世不得􅊲之崇寧三年余至絳州乃剔刮劘洗於其後刻囘漣亭名香亭名薪亭名槐亭名望月亭名柏亭名鷴白鷴亭鷺白鷺亭白濵亭名雅薛姓絳人文安裴姓聞喜人與雅同應漢王諒友軌梁姓為正平令蒼塘亭名風亭名鼇亭名如此而後可以識也嘗聞八代文敝至唐極矣以文皇之英叡房杜之才賢不能革此豈習俗已久非改心易慮盡去舊染不能扶而正也其留于今者碑刻書疏讀之令人羞汗浮淺如俳優誶語鄙俗如村野訟諜無所挍者也當時如韓退之毅然以古學為諸儒倡然其得意而人非笑之者不勝衆也葢流俗所移非能自立者其能終不廢耶紹述之知不顧世俗者其言雖怪要不置木立塗望洋而鄉若者也隂符經序桞誠縣書至此極矣然人之好尚亦難齊矣李西臺愛桞尊師志歐陽公愛髙重一作唐碑惟君謨獨喜此序謂善藏筆鋒自是書家所共恐不能盡其玅處觀其平時論曰尖如錐捺如鑿不得出只得郤文宗問之曰凡縳筆頭極𦂳一毛出即不堪用然藏鋒在得筆意非極工於筆亦不能也宜公權戒此金剛經誠縣以書聞四方史謂當時中外大臣家書碑刻銘不煩手筆者子孫以為孝敬不足故昔時髙麗百濟入貢齎貨貝以購書名之重後世莫及然此經本書於西明寺後亦屢改矣經石幸存不墜兵火柳玭謂備有鍾王歐虞褚陸之體今􅊲其書誠為絶蓻尤可貴也武昌詩李衛公武昌詩其間謂牛羊具特俎則指牛僧孺楊嗣復歎夫朋黨之怨至於如此雖一話言間且不能忘必求詆訾以逞其憾安得公天下而無私好憎之心哉徳裕學優而材勝其操術近正但悁忿少容以及於禍昔牛崇為隴西主簿羊喜為郡功曹馬文淵為太守凉州云三特備具徳裕嘗編牛羊日厯皆取於此衡州門記衡州記唐大中四年李侗為刺史因治郡署立通門刻石記其封域所本不見書撰人名葢侗所為也其言衡陽當五領門􅊲于書葢古文嶺字為領五領皆在今廣南以衡岳為五嶺門昔鄧徳明作南康記其五嶺甚辨然皆謂在南康則非也裴潛記以大庾始安臨賀桂陽掲陽為五嶺今􅊲於古可信然二子之論雖異獨無以衡陽為五嶺者或侗自有据而衡山又有五嶺不可知也趙璘登科記秦始晦藏趙璘登科記書本唐人葢筆畫工力殆出遺教經而稍為出入繩墨不拘律度内顧後世書名者未能伯仲間見首末盡亡葢自開元二十三年至貞元九年其間亦又有缺剥不可倫序或遺去十年或少三四年在姓名中又泯滅過半此書既久其存宜若是以趙參所紀姓名則又有異者此不能盡􅊲也昔鄭顥當知大中十年舉宣宗索登科記顥表曰自武徳以後便有進士諸科所傳姓名皆是私家記録尋委當行祠部外郎趙璘采訪諸家科目記撰成十三卷今所存纔六卷而亡者十七八矣雖然猶幸以書字著顯而世存之故今得有傳也余嘗訪今藏書家并官書所籍殆無璘所撰登科人目則此書尤可貴也因録而藏之并以舊記相參成十卷以傳于範書于範書險瘦自有體裁唐人書大抵有法而於文則或不工末者勝也範書自序感戀増懐皆書詞所避咸通間唐制不行於天下久矣後生不習典禮可以増歎也梁制箋書有増懐語者不得荅書荅中彼此感思乖錯者州望須刺大中正處入清議終身不得仕唐紅亭記立制凡稱感者􅑫二年其法至重梁制至唐雖未必盡用然陸贄所定行于貞元不應咸通間盡廢知當時唐之制度不能行于四方也唐經生字書法要得自然其於規矩權衡各有成法不可遁也至于駿發陵厲自取氣決則縱釋法度隨機制宜不守一定若一切束于法者非書也世稱王逸少為書祖觀其遺文可以得之毎為一畫則三過筆至波埶則偃筆從字有同處剙為别體若其垂露懸針磓石釵股諸體備有至于神明焕發絶塵掣影則不謀自合此其貴也後世論書法太嚴尊逸少太過如謂黄庭清濁字三㸃為埶上勁側中偃下潛挫而趯鋒樂毅論燕字謂之聫飛左掲右入告誓文客字一飛三動上則左竪右掲如此類者豈復有書耶又謂一合用二兼三解橛四平分如此論書正可謂唐經生等所為字若盡求於此雖逸少未必能合也今人作字既無法而論書之法又常過是亦未甞求于古也盩厔尉題名唐都闗中盩厔在畿内為望至重而尉尤為要任自進士第一與賢科中選人得補然以題名􅊲之皆自此入翰林充學士者接武不者猶為真御史世傳縣吏視尉到而輒論其官壽所劇未甞差葢閱人多者自有据依惟貴人多故知者尤審也水曲曰盩山曲曰厔其取名者如是津陽亭詩司馬懿征朱然於樊城車駕送津陽城門外元嘉二十五年改開陽門為津陽然則漢以洛陽宫為名而南朝效之若蟠之言津陽即本漢之東郡鄭蟠津陽亭詩其敘津陽門有亭舊矣疑唐亦有之但不若漢時備也東漢天子都洛其制度盛麗故典儀書洛陽二十街街一亭十二城門門一亭津陽為城門則有亭宜也廣川書跋卷八
