body:
  text: 廣川書跋卷一宋董逌著父乙尊彞李丕緒得古彞銘曰作父乙尊彞其下為蜼形或疑其制余曰此古尊彞也其在有虞氏之世不則自商以前其制得於此未可知也書曰日月星辰山龍華蟲作㑹宗彞藻火粉米黼黻絺繡孔安國以㑹為繪謂彞尊亦以山龍華蟲飾之鄭康成曰宗廟之器鬱尊虞氏以上虎蜼而已聖人以飾尊則於服以宗彞所飾而為絺繡自漢至今學者嘗疑之以父乙尊彞考者可以信也方虞氏尊用虎蜼則非一器矣丹陽蔡氏得祖丁彞為虎形考古圖不能推見虞氏宗彞之制乃謂兕形古人飾器各以其意虎為義蜼為智觀其飾可以知其意蜼寓屬其尾岐出今於彞可考而見也或曰乙丁商人尚質其稱蓋云考之於禮幼名冠字死諡自周以然其在商夏則以丁壬癸甲為别知虞氏之世亦若是也記者猶曰辛壬則於名可知矣蜼敦祕閣有敦其實鼎也政和三年內降宣和殿古器圖凡百卷考論形制甚備於是館下以藏古器别為書譜上挍書郎黃伯思以圖示余曰商素敦者其髙五寸五分深四寸一分口徑六寸七分其受八升重六斤有七兩皆今之權量挍也其制㒳蜼首耳下有珥蓋其尾岐出且曰古敦之存於今者若周宰辟父敦散季敦􅌏牧敦戠敦虢姜敦皆有欵識此器特異疑為商人製也余考之雖寓屬其尾岐出古之宗彞也自虞舜已然豈特商邪於是定以為蜼鼎罍尊王得君藏山罍且世寶之嘗曰昔梁孝王有罍尊戒後世善寶即此器也或曰尊罍異制不得同名余考之漢謂罍尊蓋彞卣罍器也卣中尊也然則罍大尊可知也古之酌酒皆取之罍故廟堂之上罍尊在阼犧尊在西則罍謂之尊可也應劭曰罍畫雲靁之象以其為罍故飾以雷者此其文也鄭康成謂上蓋刻為山雲靁之象如此則孝王之罍蓋夏后氏之寶矣禮曰山罍夏后氏之尊也伯作父丁寶尊彞銘傳言人年二十有父之道朋友不可復呼其名故冠而加字年五十矣耆艾轉尊又舍其字直以伯仲别之此周公定禮以變殷制如此今曰伯作父丁殆以名著不諱其死此殷禮也殷人無字見者又伯仲之稱不必五十故以生號仍為死後之稱則父丁是也若二十稱伯則以甫某配之五十之後直呼伯仲知殷禮異矣仲作辛鼎銘伯仲之敘别長少自堯舜以至三代盡然惟著稱則異夏商不待年五十凡長則稱伯次則稱仲周人必待五十而後稱伯仲此其制文也仲作辛鼎其可考者以名知之辛壬丁甲惟殷為敘而伯不配甫者亦殷道也禮緯曰質家稱仲文家稱叔又益知其說信然貍首豆祕閣古豆制作甚朴趺為函獸或以其質曰商人豆也政和三年祕書考定古器以函獸為貍謂射以貍首為節其制以豆示於小獸不遺故以備乾豆宴賔客因曰商貍首豆或以問曰貍首為豆禮乎曰非也昔之制禮諸侯以貍首樂歌也射以歌樂為節故其詩曰曽孫侯氏四正具舉大夫君子凡以庶士小大莫處御于君所以燕以射則燕則譽夫如此故詩以時會為意而且有燕也諸侯之射必先行燕禮燕禮所用饋食之豆薦羞之豆恆豆水物加豆陸産其用則燕器也燕器無異制則又有貍首以為别邪且刻畫祭器博庶物也雖卻仄連紆之行脰注旁翼股胸之鳴求以備物為飾不有遺也故雖翼而飛廉爪而叨餮攫而兕虎惟所宜而設焉其以小獸而自私哉余恐議者未嘗得其形制也如騶虞采蘩且又寓之籩豆簠簋之間邪著尊著直略切內府古尊昔嘗出示於朝故人得圖之無足無銘刻腹為獸首附肩著耳安定胡瑗曰釜無脰有足壺尊有脰著無足嘗疑其名又謂尊以魯壺是其制也今考周官朝獻用㒳著尊饋獻用㒳壺尊以壺為尊蓋祀器也古者饗用祀器為禮之重自用著尊不類引以為据誤也禮曰著殷尊也著尊為著略尊故說禮者言著地無足如此定為著尊可以考矣古者著鼎無足則凡著地無足皆以著名之商觚祕閣有觚二其一髙七寸七分深五寸一分口徑四寸五分受一升其二髙七寸深五寸三分受九合其制無四廉朴素不文或定以為商觚古量比今才及三之一則其受一升當古之三升不得為觚也孔子曰觚不觚觚之所以為觚者以有觚也觚以廉制得名則無廉隅者非觚也漢世以周之文敝而欲得三王循環之政且謂救僿以忠則質尚矣故曰破觚為圜漢不知觚為廉苟以尚質趣便則去其廉隅此漢人之所為也後世不考其制以為此但取喻不知破觚可無其事而假以說邪古者操觚執簡以有記也惟有隅故可以書今觚無廉而以圜成者此豈知古人之立制哉象觚祕閣有觚髙八寸一分其容六合有羡上下為雲靁飾足為四象或以問余對曰此象觚也禮射人升賓賓升立于西序東面主人盥洗象觚升酌膳東北面獻公公拜受爵觚之别如此或謂以象飾者為象觚然觚亦為象飾邪曰觚容三升是亦觚也特容受有差故以名異鄭康成曰觚有象骨飾也故為象觚竊為當漢之世古器存者盡矣其在邱墓者未出故不得見之則飾以象骨者漢人制也康成推漢之制論之故不得於古一柱爵祕閣有爵一柱以度挍之髙六寸七分深四寸一分口徑六寸五分濶二寸七分容八合飾以雲靁下為叨餮狀崇寧三年余至館下識之歎曰禮之廢久矣二千年後誰復傳此器也方今天子以興禮樂為務意者天以三代之禮行乎不然此器何為出也或曰爵必㒳柱猶鼎敦之有㑹簠簋之有蓋也必三柱加上以覆持之爵有坫反而加其上者以有柱也今為一柱意以滿必覆其著戒乎曰非也爵有舉舉必反酬故更爵易觶此禮之用於獻酬者也若夫燕禮進受虛爵降奠于篚則以君尊不酌也虞禮以虛爵入于房則以不貴酒也虛爵無坫故不及反反者以坫示其釂也然後受洗則虛爵不易且不反也故一柱為主古之為器以雲靁為飾非特謂氣蒸而澤潤其以為物之需者如此至于叨餮異獸也以是文之爾貪財為叨貪食為餮古之著戒至矣不必以自食其身為太甚也牛鼎牛鼎無銘識昔內府出古器使考法定制工官圖其狀求余識之曰深八寸六分徑尺有八寸其容一斛刻文塗金世不知所本乃考禮圖圖有牛鼎羊鼎豕鼎其足以牛羊豕為飾可以得其名矣鼎足盡為牛首知其為牛鼎也荀爽曰鼎象三公之位上則調和隂陽下則撫育百姓牛鼎受一斛天子飾以黃金諸侯白金三足以象三台足上皆作鼻目為飾羊鼎五斗天子飾以黃金諸侯白金大夫以銅豕鼎三斗天子諸侯大夫飾之如羊鼎士以鐵飾之三鼎形同以足為異然豕鼎則天子諸侯大夫士所得共用也羊鼎自大夫以上有之其别以飾至於牛鼎大鼎也惟天子諸侯有之其飾以金者天子器也以爽說考之合矣其三代之所用也二方鼎祕閣方鼎二其一髙二尺二寸八分深一尺三寸九分口徑尺有七寸三分受太府之量一䄷七斗五升又一髙減一寸二分深減四寸四分其受量損二斗三升足四承其下形方如矩鼎之制其見于三禮鼎器圖者最古謂以銅為之三足者鼎也其後劉向謂湯使人持三足鼎祝於山川漢得魏脽適三足故有司得以藉其說謂泰帝興神鼎一黃帝作寶鼎三禹鑄九鼎象九州皆嘗享上帝鬼神其空足曰鬲以象三德諸儒許慎蘇林如淳顔師古輩皆謂禹之鼎惟其三足以有承也韋昭以左氏說莒之二方鼎乃謂其上則方矣其下則圜與祭用鼎鬲無所異方其時古鼎存者盡廢其在山澤邱隴者未出故不得其形制然亦不知考於古也昔禹使飛廉析金於山以鑄鼎昆吾使翁難乙灼白若之龜鼎成四足而方不灼自成不舉自藏不遷自行而古之為鼎四分其足以有成者雖禹猶然知鼎之方者亦得四足矣今世之有魯公文王方鼎有單臩方鼎有王伯方鼎有陀員庚子方鼎惟祕閣方鼎其大受斛其飾為羊此古之所謂羊鼎者也或曰魯公方鼎其銘為尊彞單臩之鼎其銘為從彞王伯之鼎其銘為寶彞一作齍其制與祕閣方鼎相類特容量不同其名異者何哉余考之曰禮有六尊六彞六尊以待祼六彞以待祭祀賓客及祭之日齍盛告潔故逆齍以受膳人之盛視鑊以受烹人之腥古人於此雖異制矣然彞卣罍同器而尊則與彞同薦大祝六號器同謂之齍蓋以彞器為常器齍以持而獻也故黍稷稻粱醯醢牲牢同謂齍者惟所用以有别也傳曰以壺為尊故謂壺尊然以鼎為尊以鼎為彞以鼎為齍其為尊彞與齍同制有所本也今考父癸方彞其制鼎也孔文父飲鼎其制尊單臩從彞其制鼎盉與觚皆具蓋宗彞常器也尊鼎常薦也其從以享者隨器以名之古人於宗器其重如此古豆祕閣有豆其制甚備中直而下承有跗如盤禮官疑之政和三年詔盡出古器俾儒官考定蓋朝廷講禮既備將大革器物以合三代或以問余豆之制不同何哉余曰禮之所設其器異也詩曰于豆于登都騰反傳曰瓦豆謂之登豆之制則同毛氏謂瓦為登木為豆不知古者銅為蓋有制也夫五齊七醢七菹三臡此豆實也清廟未食則為朝事以菹臡為薦至于薦孰則螺蠯蚳魚尸既食矣后夫人亞獻故有加豆房中之羞主婦右之則有羞豆加豆有鐙有校故禮曰夫人薦豆執醴者授之執鐙此加豆也豆今存者已衆其鐙不具者朝事及賔客饋食之器也若后夫人當獻于尸則執醴者供之故授夫人以豆而執鐙禮有嚴其分者雖一器猶有存也鄭康成曰豆以木為之受四升此宜阮諶梁正相承以自絶於禮者蓋漢世其器未出故論如此螭足豆上方出銅豆螭蚨有蓋蓋有柱無銘可考禮學號螭足周豆足為盤螭其名以此然髙九寸一分深三寸二分口徑五寸四分其容三升見於禮文此周豆之制也嘗考古豆之見於今者可得而存之矣惟此有蓋存焉其與簠簋之制同也傳曰蓋謂之㑹㑹有柱可仰以食故饋食禮曰佐食啓㑹卻于敦南先儒謂佐食者取㑹卻置而奠之以待尸入而食公食大夫禮曰賔卒食㑹飯先儒謂取飯於敦蓋仰㑹而食置其餘以待餕也夫豆宴豆螺蠯蚳魚其為加豆芹蒲箈荀羞房中之豆酏食糝食不為飯器也吕靜曰飯器謂之簋古之為敦甗盤杅亦或用以為飯之薦然仰㑹以飯自豆以分古之食禮如此特牲饋食禮曰筵對席佐食分簋鉶注曰分簋者分敦黍于會為有對也敦有虞氏之器也周制士用之變敦言簋容同姓之士從周制也犧尊將作監李誡出古銅牛以示曰此謂犧尊於禮圖考之不合余謂古之制犧尊如此後世不得其制故禮圖者失之鄭康成曰畫鳯凰尾媻娑然今無此器當禮家録禮器則依康成為据昔劉杳號博識雖知康成為誤猶謂刻木為鳥獸鑿頂及背以出酒昔魏得齊大夫子尾送女器作犧牛形晉永嘉中曹嶷發齊景公塜又得二尊亦為牛象杳蓋未嘗見犧牛分其首受酒則又吻合如全牛時受酒受飯則開而出內之以是為異杳乃謂鑿頂及背誤也康成當漢世此器尚未出宜不得考其制如梁正聶崇義則二器已出雖未嘗見魏晉梁齊書盡得考之矣乃畫牛負尊何其愈陋也今世此器多見禮器故可知或曰杳謂以木為之何也余謂古者亦以木為尊故曰溝中斷木以為犧尊知其有据木久則壞世不復傳今人見者皆赤金也謂古不得以木為尊是待目見而後信者可與論禮制哉著尊著尊殷制也其形範朴古無復疑者昔內府出周著尊文采繁縟蘷躍龍翔靁回雲紜有旋動之勢此固為周制也又有獸傅翼而飛或曰蚩尤之形也夫榆罔蚩尤銅頭石項飛空走險故古之鑄鼎象物則必備之或曰蚩尤著貪暴之戒不以此論也鋭喙決吻數目顅脰小體騫腹古之所謂羽屬刻畫祭器以備制為薦所以致飾也虎彞廬江李公麟得彞於新鄭銘三字余求得之开圖其器京兆吕大臨曰㒳耳飾以虎首蓋虎彞豫考於書宗彞謂虎蜼也方虞氏世宗彞之文如此其㑹於裳則蜼備舉矣嘗見父乙尊為虎然虎蜼雖飾宗彞非一器盡備疑宗彞之飾各得其一以見當是時二者皆見於宗彞故古器之存於世無二物備載一器知舉宗彞以見二物也伯時虎彞則異父乙尊為虎以飾耳非虞氏制也昔周人追享朝享祼用虎彞蜼彞自為二器蓋周所制也蜼彞考古圖曰祕閣所藏大小七器形制略相似其二大者為行獸二首及身有斑文似虎而岐尾如蜼腹下空可以縣故為錞崇寧三年余就館中求之信然後得王氏古彞其制如此則古宗彞也方唐虞時宗彞之制如此其以為絺繡倣此而已後世作器文采日以加縟故有隱起雜飾不復朴質如古故今之所見蜼彞虎彞或器各自别知三代皆用此至周其制漸改於古余嘗求宗彞未見有二物同一器者蓋嘗疑古不必一器具此或二器同為宗彞故書舉虎蜼但曰宗彞其說在祖乙之蜼彞至此余竊疑之其為斑文者虎也岐尾者蜼也此豈古之備二物於宗彞制邪罍洗祕閣有罍其髙若干容若干有洗若干其徑尺有六寸余按罍洗皆水器也燕禮設洗於阼階東南當霤罍水在東冠禮設洗直于東榮罍水在洗東蓋古者祭祀燕㑹皆用罍洗所以盥也罍貯水洗受水凡行禮者盡然君尊不就罍故有匜盤皆以致潔也洗飾以雲靁與罍同器也或謂洗以龜魚為文取精潔之意不然龜魚皆水蟲而或又飾以藻荇此皆以類取也不必過求且又以藻荇可羞於鬼神邪烏鍾祕閣烏鍾自上降出其髙八寸二分口徑六寸三分其重若干鍾之制甚質鼓間容六舞間容四于間不及鼓二無旋蟲繞獸疑周初之器文未縟也其銘作烏形祕閣謂畫烏為象以自别鼎余考古文大抵皆畫也畫以象形則古之所謂書如此昔籀文烏象鳥形而㸃目以鳥目可見烏目不可辨篆文曰從烏而鳴亦烏之聲也古人制字可以類得之矣或曰流火復屋為烏此周受命之符也鼎著以烏或宜本于此余考蠆鼎鳯鼎皆以銘器安知烏非其以名著邪雲靁鍾御府有鍾無欵識可考然鼓間一雲一靁此銘也古文畫以象形而為之說者以為周鍾理或然也祕閣以權度挍得髙六寸三分衡甬髙三寸三分㒳舞相距五寸二分橫四寸㒳欒相距六寸橫四寸四分考其制于鼓鉦舞其體也甬衡其柄旋幹其所縣也篆有四以介其面也枚三十有六所以鎮其浮也周之制以其鉦之長為之甬長以其甬長為之圍是故小鍾十分其鉦間以其一為之厚為遂六分其厚以其一為之深而圜之今考其度略相合矣然余信以為周人之所作也古盤銘古盤銘得之河南鞏氏其銘為舉蓋而進之此其義也朴質不飾有足以承此殆古之匜盤也匜以注水承水於盤不使水散於地尊者之所用也叔郭父簋銘臨江劉原父得銅簋考其識曰叔髙父作鬻簋余按古文髙當作郭鬻當作旅郭象城郭相通旅猶為中為衆與今文無異蓋人三衆也簋形圜而楕如龜原父因歎禮器散亡得此可以證禮圖誤謬且今所用簋疑禮家無所据依崇寧五年紀城得銅器數十物有內圜外方如桶其形者其蓋正作龜形容量不及今六升才三合余考之知為簋也傳曰豆實三而觳豆為四升則簋容一斗二升以漢量挍之周一斗一升有竒魏齊權量於古二而為一周隋則三而為一今之量法猶當魏隋之中則不及六升者正周之斗二升也古人制器隨時則異後世偶得一物即据以為制不知三代禮器蓋異形也又諸侯之國得自為制豈必盡合禮文哉今所見宗器自為多制鄭康成謂制之同異未聞蓋古人慎疑如此伯考父簋銘陳氏得古簋其文曰伯考父作此寶簋形制與原父所得甚異不知其為何代器也然古以敦璉瑚簋為同物漢儒考定皆黍稷器也前世禮官謂簠簋以銅而後世以木者非也鄭康成曰敦有首者尊器飾也飾蓋象龜周之禮飾器各以其類龜有上下甲則所論已異賈公彥唐人名知禮其論簠簋曰以木為之容斗二升上刻以龜如是而已豈不知旊人為簋其用以銅者自周有之而夏商則或以玉今簠簋有幸而存者皆銅也若旊瓦刻木則宜世久不得見周之簠簋大夫刻為龜諸侯飾以象天子飾以玉則楕而圜以象龜蓋者諸侯制也刻以龜而為飾於蓋者大夫制也後世以大夫之制行於天子且用以享帝則非矣禮家不論於此伯􅝪父銘古甗皆有蓋有秝其下可爨上可羃以為蒸塵者也許慎言後改為甑甑甗形相類不可便為一物特後世甗廢而甑獨存也觀廩人溉甑甗司宫溉豆籩便知甗非甑矣甗在漢讀若言在隋音彥今人作偃不知聲類所以改者何也古者鼎俎簠簋皆有數故其次者謂之旅旅言其衆又曰亞也獨甑不見上下之等與其數如何今其銘曰伯􅝪父作旅甗知古之為甗以備薪蒸者非一器也考古圖以􅝪作溫今挍籀書溫之文若此孫炎翻以余廉謂進也王存乂瀘水篆字亦若此然則字當為瀘旅匜銘此器類觚但容受勝爾孫炎翻字作移爾隋韻始為頤音古今之言異也昔人得於萬年涸中歐陽文忠釋其文曰弡伯作煮臣考之於字煮當作旅以王存乂書考之臣則沱字今文以沱為池宜世不加考也禮器有匜而無沱匜為方中也則此器為匜可知古人於書凡器用則外從方古人方為匚若缶為匡杯為匠籩為簋為􅂒其取類衆矣篆文匜從方而古文不用疑昔人作字務從簡古或去其方故後世疑之禮家論匜謂為盛水器陸法言劉臻以為類桸蓋古所用以酌也漢人或謂形類羮魁中有道可以注水故懷嬴奉盥公子揮之今考其制與羮魁異矣是匜之類不一疑漢人所見異也煮簋銘先秦古器有鬻簋楊氏古器圖有鬻甗永叔集古皆存其名不廢或曰以火亨煮也不知簋盛黍稷且又可亨飪耶考其文協當為旅今字學諸書有据可考不知諸公皆以為煮何也古之食禮有正鼎又有陪鼎而進黍稷者以簋進稻粱者以簠故有八簋六簠又有一物而二簋者皆旅陳於席則以衆列而進者皆謂之旅其甗言旅者亦用以亨享非一器也尊鼎銘李保年得鼎于長安耕者其銘曰集作尊鼎萬夀無疆子子孫孫永寶用夫尊鼎異形其制似鼎者此鼎尊也吕大臨疑孔文父飲鼎為壺尊之屬而銘以鼎蓋古之制器自有据而鼎之制亦不一矣惟其用以名之唐開元十三年萬年人王慶獲寶鼎五銘曰􅑰作尊鼎與保年鼎同文但􅑰字刓缺不可識疑此鼎是也廣川書跋卷一
