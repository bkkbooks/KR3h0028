body:
  text: 廣川書跋卷三宋董逌著周姜敦銘伯􅔣父作周姜尊敦其器無文飾則自命士以上得用殆與秦漢間器無以異也周之世齊姓重天下故當時語曰姬姜觀原父所得敦三皆為姜氏則世以為貴姓可知周之諸侯與大夫卿盖無以周為諡者惟伯禽弟守采地居王之畿内世以周自别後世如宰周公類可以考也其謂姜則王畿之公也或言王之支庶子弟亦得以周號者且王子弟則或自有封矣支子分屬王畿者則以采地著其受姓命氏則子孫各以其姓自顯盖不以周自稱知彼既别於周矣若平王之子封汝川初以周為氏此其以周著者古之宗廟不出四封然得自長安知非汝川之周也晉姜鼎銘晉姜鼎以今權量挍之其重若干其容若干以合周律當為權若干為量若干周自中世天子不得考度量協彞器侯國得自為制則當晉國不知其為權量輕重多寡也銘曰維王十月乙亥晉姜曰余維嗣先姑君晉邦余不敢荒寧知其為晉鼎矣然則其謂晉姜則齊女也春秋時齊歸晉女者獻公則齊姜文公則大姜平公則少姜其在春秋前則穆侯夫人書傳雖間有遺缺不得盡見然其著者此爾少姜蚤死齊姜不得主祀穆夫人不盡穆侯世惟文公夫人當襄公世猶不棄祀事疑此大姜鼎也聖人作春秋於嵗首則書王説者謂謹始以正端故舊史以示成法今晉人作鼎則曰王矣是當時諸國皆以尊王正為法不獨魯也考於禮制鼎者或以宴享亦或以饗祭其數亦異矣故有正鼎者謂牛羊豕魚腊腸胃膚也其在羞鼎則膷臐膮矣盖食禮無膚祭禮則有之故其大者為膚鼎惟鼎則享備體也晉姜之作殆膚鼎謂耶腊音昔乾肉也膷音香牛臛也臐音熏羊臛也膮音寮豕臛也見内則孔文父㱃鼎銘孔文父鼎其制異也昔吕大臨嘗疑之謂制度盖尊壺之屬而銘謂之鼎余嘗考之有足為尊而著尊無足魯公方鼎銘為尊彞敦必三足如鼎而伯庶父敦則足如杅彝卣同器而父癸彝實為方鼎夫鼎之大亨謂以木㢲火然旅鼎陪鼎雖不受爨有亨養之道故鼎以有載也且有舉而行也受食為食鼎受㱃為㱃鼎食㱃之異重醴稻醴清酒黍醴清酒粱醴則致飲於賔客豈無器而節厚薄之齊哉春秋傳曰尊以魯壺此器為似其謂之鼎豈醫酏糟盖有火齊而節之謂耶大夫始鼎大夫始鼎其銘曰惟三月初吉壬寅王在咊宫大夫始錫作彞又曰王在辟宫獻工錫彞錫章又曰大夫始對揚天子休用作文考寳鼎孫孫子子永寳用按禮四命受器則上大夫也故冊祝於錫命將之博士吕大臨問曰古者受命作器祝冊命書必載之宗彞子孫寳用惟永永無怠以無忘其初古人於此以侈大王靈而著昭寵其章大矣又以告後之人其以致戒者此以禮乎取之何哉余曰此神之約也自商以上則不􅍌於此矣夫與神約者非必命祀郊社羣望以盟詛而存也盖以祖宗為祀而求使子孫不廢用享者此與神約者也故大約劑書於宗彞使神監焉使人畏敬不敢違也故不能守其約而廢器者其刑墨公法治之此其為約也先儒以彝為宗廟六彞盖尊之制爾余謂凡宗廟常器皆宗彞也虞氏宗彞至周分為二者豈可以宗彞盡宗廟之制哉今考古器存者鼎敦尊鬲等衆矣皆著銘曰彞則宗廟之器其常用者皆得銘之矣不必謂六彞之所書也宋公䪫鍾銘䪫音莖崇寧三年應天府得古鍾六於崇福院其一為黄鍾之宫髙一尺四寸八分鈕髙四寸㒳舞距一尺四寸半横一尺三分㒳欒距一尺六寸八分横一尺有二寸其二為大吕之角髙一尺三寸四分鈕髙四寸一分㒳舞距一尺三寸五分横一尺㒳欒距一尺六寸三分横一尺一寸五分其三太蔟之徴髙一尺二寸八分鈕髙三寸九分㒳舞距一尺三寸二分横九寸二分㒳欒距一尺六寸其四夹鍾之商髙一尺二寸七分鈕髙四寸㒳舞距一尺二寸三分横八寸八分㒳欒距一尺四寸横尺有二寸八分其五姑洗之羽髙一尺一寸五分鈕髙三寸八分㒳舞距一尺五分横八寸㒳欒距尺有二寸三分横九寸三分其六缺銘曰宋公成之䪫鍾按史記平公名成當周簡王時共公卒華元魚石立少子成是為平公立四十四年當魯昭公時見書春秋宋本商後而商出自帝顓頊當髙陽氏之世樂號六莖今考于書曰䪫樂名其字與莖同列子以為瑩其實一也宋均曰能為五行之道立根莖此説恐不然古人以英為華以莖為實髙辛氏既發其英則髙陽氏實之于莖所以反本流根以宣暢其咊氣使天下咸得而遂焉夫是故以名云當周之世樂用六代獨不見英莖之作於時疑宋為商後于其國而用之以存其禮樂兹故得而作也嘗考之襄公世作商頌以祀成湯故閔馬父曰正考父挍商之名頌十二萹於周之太師其輯之亂曰自古在昔先民有作夫以挍而輯之則考父所作也太史遷曰襄公之時修仁行義欲為盟主其大夫正考父美之追道契湯髙宗商所以興作商頌韓詩章句曰商頌美襄公作也馬昭曰宋為殷後郊祭天以契配于郊㝠者異於先王故詩詠契之徳宋無圜丘之禮惟以郊為大祭且欲别之于夏禘故曰大禘夫能祀契湯商宗有道則其臣宜作頌歌以薦之廟是宋用商之禮樂其作頌者無可怪也考其詩大禘春初則祭用殷也食嘗有樂則禮用殷也錯衡三等同之非周制也鞉鼓楹貫於宣王時考父效之如考父不作頌且謂晞尹吉甫者何哉余故謂頌成湯作莖樂則宋之制得以考矣天子方作大成樂以紹百王絶業故嘗求鍾之制不得周之舊鍾存者衆矣側􅑰則隓而不應横貫則扶摇而不得定考擊備設則震掉而或不得盡其音聲有司患之翌日制詔丞相御史以䪫鍾為正故今鍾得調焉乃下詔曰得英莖之器於受命之邦非天相之其能盡感徳之事哉宋君夫人餗飦鼎余既為編修官畢完書宋公䜌之鼎矣盖餗為八珍或曰有菜之鼎也翌日挍書郎黄伯思持宋君夫人餗飦鼎以問君與夫人並為餗鼎此何制也余曰古者祭祀饗食饋羞薦獻各有制不得相亂則饋餗鼎用於房中之羞此夫人之禮也少牢曰主人酬尸宰夫羞房中之羞于尸侑主人主婦故君與夫人宜各有饋也餗在禮為糝食糝一為菜烝牛羊豕糝稻為餌則糝以相參為名自是别鼎吕氏圖曰􅀈於字書不見疑為鉶盖古鉶為􅀈此以書名求之非也夫人羮謂之鉶鉶湆也其可謂之餗哉古文臂鏜為釬似鍾而長頸為􅀈飦鼎有盖不得形制疑鼎之長頸者也餗鼎銘祕閣至和舊鼎其銘曰宋公䜌餗鼎少監羅畸摹其欵識以問廣川董某曰史記宋世家無公諱䜌者豈宋自為諡或以菜地舉耶某曰周公惟二王後稱公而㣲子啓實封於宋宋非畿内地且不為諡其曰宋公果商嗣也竹書有宋景公䜌而史為頭曼孫炎以䜌為頭曼合聲以辨周秦之語今考班固漢書猶有兜䜌盖亦著其聲如此或曰餗鼎食鼎也今飦鼎亦曰餗者用以饗食其禮異乎曰古者天子諸侯食禮鼎俎各有數故有左鼎陪鼎特鼎然謂餗鼎者糝鼎也傳曰糝謂之餗又曰筍之為菜則餗也古謂八珍漢儒論者以八珍有肝膋無糝鄭康成考于周謂糝在八珍中而周官筍俎與此自異故薦食不同古之食饗若糝有菜則入八珍不湏肝膋若糝無菜則入羞豆今直曰餗鼎則糝有菜之鼎也宋公寳簋銘河南王氏得銅簋六其制各異銘曰宋公作寳簋或疑其器在一時而制不同將無所考於禮耶盖禮則有之後世不得其制而但守一物而為据者鮮或不亂於禮也元豐三年詔禮官考据典禮定為奉祀禮文其書大備禮官請依古作簠簋器上難其事謂禮制無明憲今偶得一器即用為据古之禮豈盡此一器嗚呼昭鑑遠矣今考宋公簋知禮器未可以一而据也邛仲頮盤銘邛仲之孫伯戔作頮盤銘曰惟王月初吉丁亥邛仲之孫伯戔自作頮盤用蘄糜夀萬年無疆子子孫孫永寳用之昔人以初吉為疑盖古文以王為闕則其為正可知按説文頮作沬馬融曰頮面器也傳曰洗手謂之洮洗面謂之靧古之事親者垢燂潘請靧頮與靧同古今文異也邛中菜地當周畿内疑為王子弟古有邛疏即其後也余怪古人於用器自期眉夀欲子孫永永用之不窮不知後世子孫不憚口澤者能朝夕用乎或謂父詞如此至子孫之詞不得用此也周舉鼎銘髙九寸二分深五寸九分口徑八寸二分容一斗六升二合重十四斤一十一兩祕閣既定作古器圖并考論其制上之或以問曰為古文舉然此為舉鼎謂可舉耶且三代之器言舉者衆矣已爵為舉丁卣為舉凡可舉以進者謂得名之今按此鼎銘舉其器非爵可舉而大且容斗六升重十四斤其得舉哉曰晉平公有臣杜舉酌公以罰又罰其二臣且自酌也後之為制者設之于庭以待直言晉謂杜舉其後改為百獸尊設于庭以示百官其昭大矣不必為一爵而存也盖因名而得以有作矣然制器簡古文字特異盖晉之當世或其後人所作以示於衆非秦漢之君所為也觀古之制器類有所本而揚斝洗觶一時有見乃傳後世不忘況其器猶傳此其可貴者豈偶然一古物供耳目之玩好哉余願得附其言於此竊有慕於古焉癸舉器新平張氏得古銅物或以為觚其容三升則當古之一斗余知非觚之制矣銘曰癸舉以癸為名疑為商之時而器乃周之制矣其形範與觚異者以無四隅而㢘稜皆廢不得為觚傳曰觚之為觚以有觚為㢘不為㢘者非觚也或謂舉器名疑古人之制名者也曰癸為名矣而舉又為名定誰名耶今鼎有舉爵亦有舉謂可舉也昔杜蕢揚觶其實為觗後世以為舉者本此或古人以自有舉於書不可得考燕禮主尊觗于篚古文觗為觶士長升拜受觶主人拜送觶作觗鄭康成曰古書或作角旁氏則與觚相近學者多聞觚寡聞觗寫此書亂之而作觚耳當漢之世二字相混然癸非商人則此當為杜舉或曰何知非商之器曰吾考之禮媵爵者洗象觚今癸舉則為四象者以其形制索之知周物也亶甲觚始余得亶甲城觚其髙八寸四分容一升考其制盖古所謂觶也又得李氏觚髙一尺一分其容六合無壇宇㢘隅其足為四象考其制則觚也梓人曰爵一升觚三升獻以爵而酬以觚一獻而三酬則為一升禮家於此疑矣考於古器無有合也昔韓嬰謂一升曰爵二升曰觚三升曰觶四升曰㯘如此則觚定二升觶定三升古者權量三不當今之一則其容六合李氏之觚是也若亶甲城所得挍之周量三升有竒則當為觶矣傳曰觚之為觚者以有觚也今亶甲器無觚與觶得以觚名矣昔鄭氏謂梓人之觚字當為觗觗與觶同制則其言是也禮器制度曰觚大二升觶大三升饋食禮主人洗爵獻長兄弟于阼階上長兄弟洗觚為加爵則觚倍於爵其實當二升古之論者盡如此余是以知梓人之書誤也齊豆銘考器之形知為豆矣而曰齊豆吕氏以銘得之曰作太公郭公孝公豆盖齊世家太公之卒百有餘年子丁公吕伋始立如郭公以下三世至孝公始見於史記去吕伋十四世矣今考齊世家無郭公曰孝公則其世數甚遠雖一豆之薦不如是遍於宗廟然自一時作器書以有别不知諸侯享廟其得至十四世邪當周之時秦有太公其後世為孝公田氏亦有太公而後世無以孝公為諡者雖世有相類然以太公號求之孝公皆逺在十世後可考也蠆鼎祕閣有舊鼎祥符初齊郡王上之其銘作蠆形余以書傳挍之疑為公子蠆也春秋時如鄭厲魯公孫與陳祥之族雖皆以蠆制名然自昔古器得者多子尾所為自送女器不苟作皆考合禮經存當時制度知子尾為器其衆且不勝舉也古之為書者盡於象形傳曰書者畫也故凡有形之物必寓之象至無形不可以象類得者然後寓之意而㑹焉意不能㑹而形類隨變則轉注以相授指事以相辨諧聲以相合故知字本象形且曰孳乳以相生也其變於此者形不足盡然後廣取以備物各有本也許氏説文解字雖本秦篆然蠆之字猶為象形盖秦人改書文以作故其原亦本古字惟㸃畫少變服䖍曰蠆長尾謂之蠍特其尾之名爾又曰蠍毒傷人曰蛆張􅍌切則蠍其毒之及人者也今既以蛆為蠅種則不復以螫為蛆矣以蠆尾為蠍則還以蠆為異文宜其古字廢也丼鼎余考此鼎無銘識有刻在盖曰丼以書文考於古在篆為箕在籀為期在古文為其然未少異也刻畫朴古欵識深重與蠆鼎相類書至精工非後世書篆家可識自漢以来功力漸改無復欵文如三代時故悉刻鑿為之今視其文如木蠧蟲行以此知為周秦間寳器也嘗考于古齊公孫竈生欒施施字子其至其後世以王父字為氏故漢有況其古者廟器以名宴器以字此其為燕器者與欒施氏嘗作此器後世守之不廢按其籍至咊中齊郡上之齊無其姓與名可索而知也今考古文孝經其為尊古文老子其為示或體為尊王存乂為丌古書亦無為者惟顧野王以丼為箕後世共疑於此林䍐以丼為其盖本鼎銘以考書法當古文廢絶後䍐能以古學自考不徒爾也昔走作寳咊鍾銘與季姜㱃盂及石鼓皆從丼為其則林之説是也今人不知古字或議䍐不能据古而自多臆説觀鼎篆所存乃與䍐合孰謂不知而妄有作也王子吳㱃􅢪潞國文公守京兆得鼎其銘曰惟正月初吉丁亥王子吳擇其吉金自作㱃􅢪其糜夀無疆子子孫孫永寳用之書家考古謂無􅢪而􅢪見三蒼知為鼎也古者以尊壺受酒而鼎亦屢見取用一時以得為之余見古器衆矣非宗彞以祀則其功庸所在故有銘也計功稱伐於此乎陳之矣曰自作㱃􅢪盖惟宴私用之抱朴子以辱金不可用以為藥且為器皆有避然擇吉金是慎其所養也古者敦斝巵匜非餕莫敢用之又以口澤不可用器而謂子孫永寳用之其何据耶意者用以為享乎或以此戒之可銘也寳龢鍾銘髙八寸一分衡甬髙四寸四分兩舞距七寸七分横五寸五分兩欒距八寸九分横六寸六分重十斤五兩祕閣寳龢鍾銘曰走作朕皇祖文考寳龢鍾走其萬年子子孫孫永寳用亨吕氏説曰太史公稱牛馬走其後班固蔡邕亦皆以走自見於書盖卑以自謂託於此也或謂託於下走自漢如此周人未嘗有此嘗考之夫以作宗器薦之祖廟宜刻名以自列其曰走為賤稱非言懼名禮此昔人所慎也走自是著名以别支子況於子孫其可以名廢耶古人於書走足辵疋同文在今其有据者如此又如不可据者尚多此皆未有可考也禮官曰銘稱皇祖文考謂祖文王也世數雖逺盖推本原不然昔人衛莊公曰皇祖文王烈祖康叔文祖襄公古人稱文祖文考不必舉諡如襄公曰文祖則可以考矣豈必文王之子而謂文考以其皇祖稱考又不可附其説古器刻銘若賡作文考尊師艅作文考彞戠作文考敦豈皆以文王享乎且諸侯不可得通天子其得通天下而享之非周制也寳龢鍾寳龢鍾二與前一器同制禮官考其權量度數髙七寸五分衡甬髙四寸二分㒳舞相距七寸横五寸三分㒳欒相距八寸四分横六寸重十三斤十二兩以今太府法制求之如此其鍾以雙鳯為飾又其旁刻字作鳯形若烏鍾飾烏為名舊號鳯鍾古著字本象形故凡有形之物必寫象以見欲其有識也至於形不可得與無形象而可求則凡有意可㑹有事可指皆為别類以見若其事可假其聲可諧其意可轉而相授皆字之變也嘗考古文鳯字但畫鳯尾為之小篆轉以為朋司馬彪曰鵬者鳯也然則鳯形為銘知為鳯也或曰周之興鸑鷟鳴於𡵨陽疑周人著瑞以示後世此余不得而知也虢州古鍾銘虢州所上古鍾其髙三尺二寸有竒口徑八寸三釐其頂徑一尺六寸銘曰王叔伯髙作其字摩滅不可復識皇祐三年改造樂律内出古鍾命有司考詳聲韻安定胡瑗得古鍾四參定尺度眀年樂成還之御府廼俾工圖之因得其名以傳廣川董某書其後曰考鍾之制於古有稽其度量或不能合者又往往其器皆出三代有識可證盖書之亡失不能備盡則器之幸存猶有眀訓是不可按圖而盡也今考其制在上無枚其擊無隧銑甬雖備而祛鼓不辨有舞外承有衡上􅍌無旋蟲繞獸以飾其外此其異于經也夫金尚羽其器有六以樂論者皆鍾也故曰中者為宫其大為䥬圜如碓頭大上小下曰錞如鍾為鐃如鈴為鐸此古人所用以和樂者也今其制則然矣此殆周人所謂錞于者耶故曰以金錞和鼓于寳謂去地一尺灌之以水又以其器盛水於下以芒當心跪注以手震芒其聲如靁當寳之世其器與灋猶世習之不廢故得備􅍌於此宜其考擊不受而無攠隧也漢什邡縣叚祖得鍾髙三尺二寸六分圍三尺四寸圜如筩史臣不能盡考故書如此不知其器可考亦異此説矣方後周時本玉斗以寀度則蔡邕古龠合挍晉前尺大一寸八釐其法與今黍尺適等則徑至八寸有竒者以徑一圍三挍之當三尺四寸矣此或周節樂之器也景鍾銘御府藏大鍾不知其出何時銘曰景鍾景祐中諸儒議樂出自上方參考度量初得其器圖之其髙三尺二寸徑一尺二寸其下刻識皆滅没不可辨或曰此古景鍾也有功則銘其上古人貴於書名金石謂此也後世䥴金之功既廢世或不能知其制矣管子曰黄帝作五鍾以正五聲所以分五行也而有景鍾則景鍾自是寳器若夫晉人之銘魏顆自為晉景公鍾不知其制與古同異許慎辨鍾為酒器而鐘為樂器今考景鍾咊鍾其銘皆作鍾不從童也惟寳咊鍾作鐘是知古人於此不一其書矣當漢世書文已譌而鍾鼎或藏厚地堌􅮒間未出慎不得見之故論書如此銅敦銘楊氏圖古器有銅敦銘曰宰辟父右周立王冊命周周頓首奉揚王休命用作文考寳敦其制與周姜敦異盖圜不作龜形亦無刻飾著耳附腹不與簠簋形同亦不為蟲獸狀而揜至上飾畫靁火今既受命於王為文考廟器此必考於制度不敢遺舊章也其制如此者疑禮文􅤖缺不能盡考傳禮曰有虞氏之敦周士制得用之又曰諸侯飾以象大夫刻以龜天子飾以玉而還象其形則敦雖通於上下惟其刻飾異爾豈其為此圖者不識當時蟲獸文而誤為草木之英華者邪周之世有太宰内宰宰夫在禮在春秋皆書曰宰若宰周公宰孔父宰文公宰皆官也譙周曰成王作辟宫其言王在於此則既異于夷宫武宫矣盖王之灋宫也肆命王臣必親即辟宫則其禮重矣錫戈琱􅀢華菜絲衣此命大夫賜非士得受之其制則與禮不合盖享敦祭敦制度不同故上得以兼下其形制則亦已辨也臨淄㦸銘或得㦸於臨淄故城趙氏售之臨淄故全齊以兵威䧺四方征戰不息其兵利器堅固宜有傳於後其銘曰闕書文猶為科斗形盖周之未衰也㦸有鉤其曲甚利或謂矛㦸以衝陷入物洞胸貫腋以利相尚今其狀如鉤旁出而内向者此於用不亦廢哉豈為鐓者固如此耶余嘗讀字林鐓平底也盖矛亦銅也進戈者前其鐏進矛㦸者前其鐓鋭底曰鐏平底曰鐓以其平底鐓地故謂鐓則鐓者㦸之末其與㦸並存也昔欒樂乗槐木而覆或以㦸鉤之斷肘而死王何以撃子之斷其右肩齊氏以戈擊公孟宗魯以背蔽之斷肱古者戈㦸之屬為之勾兵酋矛之屬為刺兵盖戈有胡矛㦸有句援句兵堅者在後刺兵堅者在前則㦸有堅其重則句牽者所用也昔楚授師孑焉以伐隨故曰句孑凡㦸而無刃秦晉之間謂之孑或謂之鏔音移吳楊之間謂之戈東齊秦晉之間其大者謂之曼胡其曲者謂之句戈孑曼胡今見古㦸有無刃而句者此其異也延陵墓字延陵季子墓字世傳仲尼書今入淳化官帖中其字如書簡牘不類豐碑石柱上所刻也而書亦少異於籀文疑當吳季子時書文宜盡從籀學不得有所異同又夫子未嘗至吳其書是非不可考也唐人於季子墓刻此十字張從申書其後而籀字極大不知一書而傳於世者大小不同此竟誰當其傳哉李陽冰書篆奄數百年人常謂初學嶧山碑後見仲尼書季札墓字便變化開合如虎如龍勁利豪爽風行雨集是陽冰所從得法不可謂非古也此當自有玅處今人不到陽冰地安能議其是非所極哉佳城銘葛洪雜記序夏侯嬰得佳城銘世無知者惟秦博士叔孫通能讀其文此科斗書也後世疑自孝恵時上推三千年當在洪荒之世盖未有書契今其文乃與秦小篆相類嘗考其銘此殆有數存者如大同古銘其事亦可推也後人不知世紀惟史記為據史記年自黄帝至堯舜纔二百年以世紀推次中間相授㡬數千年矣史特舉其至顯者失其序不能盡通然與佳城銘類故甄豐定為六書一曰古文則魯壁書與此銘矣是時傳者不可謂無据昔臨淄得桐棺前牒外隠起為銘齊太公六世孫胡公惟三字是古文餘同漢隷乃知書文相變不能逃古但數窮即改自然相合盖惟中本有因變以出是夙智分也知釋氏海藏傳經千佛同説則知此矣廣川書跋卷三
