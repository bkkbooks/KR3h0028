body:
  text: 廣川書跋卷四宋董逌著秦公敦銘商人堌中得敦銘曰秦公作敦其制簋也當秦之世敦制尚存可以考之按禮器有敦謂有虞氏之制也周制則士用之大夫以上則簠簋矣皆黍稷器也楊氏圖古敦與簋無辨異矣將周人所為不得盡用有虞氏之制耶敦音頓漢人謂頓設也玉府讀如對今轉為平聲非也先秦古器與此圖敦皆無盖傳曰敦有首者尊者器飾也飾盖象龜故經曰敦南首眀象龜蟲獸之形則古者形制亦不一特尊者有飾故與簋類其無飾者則不以龜為盖知為上士之器也太公寳缶銘諡書無太自周書定法後世雖有附入然不著此也昔齊有太公則謂先君太公望子久矣故假以自見然則太上為古非考行而傳也後世雖不以此考諡如田和輩皆取以自號於世秦自夷公後太公繼之其子代立是為恵公夫惟子代其位故以太上自稱秦齊皆有太公秦紀失傳其故世不考之其以諡為太公惟秦則然矣其曰太公寳缶則秦之廟器也楊南仲以其書為缶吕氏圖為古古非器名則其説不可据也今考於小篆則為缶者類矣雖秦篆故有與古文類者其不相類則亦衆也豈可盡据以求合耶傳曰盎謂之缶鄭康成許慎服䖍皆以缶為瓦又曰汲器又謂缶無以五金名者今考弫伯作匧銘殆與此類故知其為簠也古之為簠者本或作亦或作􅔆則字為􅔆書畫類也然自古者缶簠同文特後世不知考故識者疑也秦和鍾銘秦公曰丕顯朕皇祖受天命奄有下國十有二公不隊上帝嚴襲夤天命保大業故秦􅊒事或釋作使䜌夏曰余雖小子穆穆師秉眀徳獻敷眀刑䖍敬朕祀以受多福綏和萬民唬同虓夙夕刺刺説文曰田易居也羽元反以文或作桓萬生是敕咸畜百辟𦙍士趫趫善緣木走之才讀若王子蹻文武鎮静不廷優佊音避㸉古文燮从言籀文燮从􅥷􅥷音飪讀若濕秦文作燮从辛百邦于秦執事匭古文簋咊鍾故曰􅀢柯額翻枝柯也古文與格同邦其音􅀈􅀈雝雝孔煌文作其音光雝銧雝孔煌以昭􅀢説文音落謂零落也楚詞曰水凍于􅀢澤音鶴鐸顔之推以零音賜今此字當作格古今字異也孝享以受毛魯古文作旅多釐眉夀無疆畯恵在位髙引有慶匍楊南仲匍作薄借讀今以文考定當為撫百四方永寳用宜秦咊鍾皇祐元年春自内府降出俾考正樂律官臣圖其狀以黍尺度之口徑衡尺有五寸縮尺有三寸九分深二尺二寸六分項徑衡尺有二寸縮尺有一寸柄髙八寸銘曰秦公奄有下國考秦之先盖秦嬴受地西􅑰為國附庸至秦仲始大逮襄公賜岐西地名在諸侯其世數可考而知也今曰丕顯皇祖十有二公則秦公不自列於世矣史自襄公後十二公為景公自非子始邑則十二公後當為成公自秦仲十二公則為桓公秦至成公世號為强大其稱受命盖追本所始而諸侯有國則推大前世率以公爵自􅍌周自后稷十五王又諸先王不窋音术非王而後世以王號推之則秦嬴稱公可以知矣嗚呼咊鍾之作吾知其在成公世矣楊南仲乃謂襄公十二世為桓公非子之後十二世為宣公非也昔嘗考鍾律於前之世鍾其大曰鏞小曰棧中曰剽編於虡者鍾師掌之其大曰鎛此皆用於樂而可以度數考也聖人制律以定樂則鍾之大數以律為度黄鍾之律長九寸以律計身倍半為鍾是其數得於尺有咫矣其半損之得四寸半合為二尺二寸有半以為鍾餘律如是其以律為廣長圜徑也鍾間方六鼓間亦六舞間容四上下十六以十為率不盡於世此黄鍾之制也大十者其長十六合自尺五寸準之當得二尺四寸而秦鍾其深當二尺二寸六分其頂當寸四分自外度其髙則合於二尺四寸自内度其深則得於二尺二寸半而合於周之黄鍾律矣古人尺度雖不可一至律始一龠則皆周尺也漢制鍾律自昔考信而景祐樂尺所從寀者以黍得也若夫以玉尺論周以鐵尺論齊以水尺論隋其長率一寸八釐或至二寸三分皆不足用以和樂無怪其不能定律也夫以秦之辟在西裔禮文樂制無傳諸夏考於鍾律之度則該本於律而深於法數其於昭著勲庸告事宗祧眀示徳意皆深款重識盖將以燮調萬邦使工人告和以謂作器而民樂之矣則銘其鍾曰咊豈亦􅍌在三庭而盡備樂物以待鍾求和衆樂者耶若吳楚勾越辟陋在夷不知紀法谹鍾鎮鼎光華采飾著象真一作異物變前之大章至有九龍百獸其大千石其重萬鈞不得用於樂者非鍾也將以昌廣一作庶嚻大肆為觀美以夸震一世者後人増異侈誕相從故延賔之重至二千八百鈞嘉徳之量至受千斛太極之廣至二十二圍豈曰大不出鈞重不過石哉周至景王嘗作無射大林史不者斤鈞觀其政害財匱以逞其昭大矣功庸棄絶使著事者不得述焉是不若秦人著灋庸器而本於法制則銘畯功以示後世秦有得也詛楚文又通作有秦嗣王籀文敢字用吉玉􅀢古宣字通作瑄璧使其宗祝邵鼛布忠一作愍告于不顯大沈久讀作故湫巫咸本作不顯大神巫咸亞駝本作不顯大神亞駝㠯古以字厎底楚王熊相之多辠㫺我先君穆公及楚成王是讀作寔繆讀作戮力同心兩邦古若字古壹字絆㠯􅀈婚􅀈姻袗㠯齊曰枼葉萬子孫毋相爲不利古文親字卬仰大沈久湫而質焉今楚王熊相康讀作庸囘無􅂒道淫失讀作佚甚讀作耽亂􅀢奓古侈字􅀢從縱變輸讀作渝刺内之􅋿籀文則字虣音薄報反䖈不姑巫咸亞駝竝作辜刑戮孕􅀈婦幽刺古戚字拘圉其叔父寘者讀作諸㝠室櫝棺之中外之􅋿冒改久心不皇天上帝及大沈久湫之光􅍌烈威神而兼俖倍十八世之詛率者諸侯之兵㠯臨加我欲剗伐我社稷伐烕音許劣反我百􅀈姓求蔑灋古法字皇天上帝及大沈久湫之卹祠圭玉羲犧牲逑一作逮取􅜋我邊城新􅙉及􅀈長􅜋不曰可今又悉興其張矜􅀢音府巫咸本作籀文億字怒飾甲底兵奮士盛師㠯偪􅜋邊􅀢讀作境將欲復􅀈貺蹟唯是秦邦之羸敝􅀈讀作䩱音俞棧輿禮使介老將去聲之㠯自救也巫咸本作殹古也字亦應古受字皇天上帝及大沈久湫之㡬靈徳賜古克字劑巫咸本作􅀈古制字楚師且復略我邊城數楚王之俖犯詛箸著者諸石章㠯大神之威神湫淵大沈故湫地志以為在安定朝那秦并天下祠官所常奉大沈河沔江是為四川牲用牛犢具圭幣其神為中祠秦故就質雖用祝告然其制猶本堯舜舊典女几少牢具嬰毛一吉玉熊山其祠羞酒太牢具嬰毛五璧褚山少牢嬰毛一璧騩山太牢具巫祝舞嬰毛一璧今用吉玉宣璧而不言數有祝去巫其禮已異當秦漢間􅀈淵之靈或喧呼輒興雲仁夀中宜居湫水移於始平故冊有靈應而朝那無聞爾雅璧大六寸謂之宣肉倍好謂之璧今曰吉玉宣璧盖取吉玉為宣璧也巫咸巫咸河在女丑北其神威靈震耀得在祀典世圖其像右手摻青蛇左手摻赤蛇在保登山羣巫所以上下故安邑有巫咸祠其地袤五十二里廣七里周百十六里誓在石章所以沈於此而告也石麤可礪當時不擇美石以傳豈誓於神者有取於此將圖其可久而存哉不得而泐也亞駝王存乂以亞為烏今考鍾鼎銘惡或為亞古人於書盖假借從聲其書自當如此周禮曰其川滹池古文駝作馳字池故沱也詩曰江有沱其字本洍後世不知書學故以沱為洍以駝為沱此宜讀惡池為亞駝不足怪也烏池在周為漚夷水起北地東入河一名滱水九澤一也顧野王考其地在靈邱竹書紀年穆公十一年取靈邱則秦誓於此所以夸大其功而求定於晉也黄伯思學士以烏駝為在烏氏按烏氏在安定郡烏水所出觀秦方得晉地恐不盡質于安定一郡故知在靈邱為是書詛楚文後秦自文世有三石初得大沈湫文於􅑢又得巫咸文於渭最後得亞駝文於洛其詞盡同惟所用以質於神者則隨其號以異書盡竒古間存鍾鼎遺制亦或雜有秦文盖書畫始變者也嵗久漸以刓缺因据舊本得其完書此秦人底誓於神敘國之信作盟詛之載詞者也大沈故湫在朝那當漢安定郡方四十里巫咸祀在安邑巫咸山下臨鹽水亞駝則在晉為漚夷其傳自周秦為著祀則底而致信於禮則然其在盟詛於主誓大事在盟小事在詛若詛誓而求猒則惟後世末俗行之非古也秦楚之㑹著於書者不詳見不知其同盟者凡幾何嵗而質於神者如是衆也當其時唯岐陽之盟最盛且顯餘不見於書今考其詞若出一時又不知其一日㑹盟安得親質秦都又遍朝那靈邱耶前世疑楚無熊相而秦楚初未相搆豈有相趣以十八世之盟誓哉然春秋時楚本熊穴後世以熊為號又以其傳自熊霜又謂熊相其間如熊相禖熊相宜僚熊相祈而姓書熊相為芊姓方其盟質於神楚亦再世失秦則詛盟宜非一人古者列國有書類不主名其告於神亦惟曰嗣王則楚以其姓此其稱也然自成王後其見于經者盖平王以無忌取秦女昭王亡而秦使子蒲子尾赴難其在咸懐間始合盟然則謂十八世者亦可得而見也今曰昔我穆公及楚成王親質大沈故湫夫以其時考之楚成王十三年而秦穆公立其相與假尊周者盖二十三年雖不知其在何時親質然知其㑹盟之日最為長且久也然質于惡池安邑湫淵果知非一時其為詛且宗祝分致以告於神矣且楚自成王十八世為莊襄其頃襄時楚猶盛故秦以連衡為䧺楚以約從為霸當此時天下諸侯不歸秦則歸楚楚使諸侯析符求合亦可謂威强盛大宜秦人之畏也張儀以地詐楚則齊與楚合今視其詞則有新􅙉及􅀈是則商於也其後秦虜屈匄楚悉國兵復與秦戰則所謂剗伐我社稷伐滅我百姓而秦猶分漢中以和楚然則背犯盟而詛於神者此其為秦恵文時也懐王死頃襄王立當時猶以天下之勢在楚故謂楚之故地漢中林酈可得而復山東河内可得而一勞民休衆南面稱王矣於是襄王復與諸侯約從則所謂率諸侯之兵以臨加我然則秦之詛楚為頃襄也嗚呼􅐥闗之詐則没而不書及􅀈長􅀈猶謂楚人倍犯盟詛一作誼志其神而公怨之其自以為求信於神者妄也然文辭簡古猶有三代餘習非之罘琅邪可況後先此其為可傳也秦權銘秦權銘曰二十六年皇帝盡并兼天下諸侯首大安立號為皇帝乃詔丞相疾綰法度量􅋿不壹歉欵者皆壹眀之此始皇帝詔也又曰元年制詔丞相斯去疾法度量盡始皇帝為之皆有刻詞焉今襲號而刻詞不稱始皇帝其於久逺也如後嗣為之者不稱成功盛徳刻此銘故刻左使無疑此二世詔也昔開皇二年長安得秦稱權旁有銅塗䥴字即此銘也家訓所傳則從鼎而此從貝為異許慎説文兼有二字盖籀書文異壹從壼昆吾圜器其從吉聲也壹為専非數也其以權量専眀之所以一度量于天下秦無道則甚矣其制法立器盖不苟如此字尤竒古如三代鼎彞舊文顔之推嘗被詔寫讀謂史記隗林當從權作狀書傳久逺或轉譌至此今世得此銘者其器不一皆法制之物故得著焉秦權銘李元吉得秦權銘前詔與世所見盡同其後詔曰元年制詔丞相斯去疾法度量盡始皇帝為之皆有刻詞焉今襲號而不稱始皇帝其於久逺也如後嗣為之者不稱成功盛徳刻此詔故刻左使毋疑則與世所見字異其後又曰平陽斤平陽為晉邑則所置隷守也按史記秦紀二世元年皇帝曰金石刻盡始皇帝所為也今襲號而金石刻辭不稱始皇帝其於久逺也如後嗣為之者不稱成功盛徳丞相臣斯去疾御史大夫臣徳昧死言請具刻詔書刻石因眀白矣此詔今見於金石不一其詞故自不同太史氏所記亦其一也按權一物具前後詔書皆刻金為之古者鐫刻金石有其法漢後惟見刻石有存于今而刻金之工殆絶世不得傳然世亦有鈞同此而無刻字秦雖剏法立制其權量固同天下而刻銘疑内府所守其餘官府具得受之故能備前後詔然今時所見猶有數器皆刻此詔當其時其在四方應官府所在得受以為制此詔在民間以此為數而準取其平未必盡有刻也秦銘京兆田氏世得銅鍰一其制即始皇帝權銘又得方版纔三寸有竒挍以漢度得五寸其刻銘則秦二世詔也往時文與可得此二物盖其一時所制而鍰為前詔方為後詔疑兩代異器偶相合於此余考之即古規矩之器也古者定法立制始於權平於衡衡連生規規為榘規榘自是器名故以寓方圜之法後世不知其灋徒守其名率至不知規榘所在此其為方圜者且得有法數度量可考於其間耶孟子曰規榘方圜之至也為規榘以得天下之方圜則不可無器以寄其法使人就而正也韓子曰規有䃺荀子曰五寸之榘盡天下之方夫規之圜也其至於䃺則失其圜也此名法之所守也榘方也不失其方故能盡夫天下之方古之制器左旋見規右折見榘規榘準繩四者皆器也故曰大匠與人規榘使知方圜之法至於棄規榘委繩墨而得方圜平直者吾弗知也嶧山銘陳伯脩示余嶧山銘字已殘缺其可識者厪厪耳視其氣質渾重全有三代遺象顧泰山則似異疑古人於書不一其形類也嶧山之石唐人已謂棗木刻畫不應今更有此然求其筆力所至非後人摹傳搨臨可得放象故知摹本有至數百年者夏鄭公嘗得此本益可信也嶧山今謂鄒其記曰始皇乗羊車以上其路猶存即邾文公所卜繹地酈道元曰始皇觀禮於魯登此山命李斯大篆勒銘山額名曰畫門其文考史記多不合豈傳者誤邪魏武帝使人排倒猶有求者不已秦則無道而篆刻顧後世不及故世以為法取之不窮其後邨落供命不給聚薪其下縱火焚之遂至刓缺然不應遂無存字昔唐人嘗取舊文勒石故謂後世所摹皆新刻然碎碑未絶故是好竒者猶得搨本余有之不逮此本完也泰山篆泰山篆秦丞相李斯書慶厯庚子嵗宋莒公惜其殘剥摹石于東平郡凡四十七字江鄰㡬治奉符患四方求者日至厭于供命則又刻其字于縣廨按其文秦二世詔也史記載始皇帝上泰山立石封祠下禪梁父刻所立石詔書其敘巡狩以時不書封禪事立石書詔非緣封禪發之疑史記自誤二世元年東行郡縣並海南至會稽盡刻始皇所立石石旁著大臣從者名如此則泰山刻石始皇帝所立始皇詔書刻其三面二世詔宜在其隂今石南面為二世詔書始皇帝刻詔書乃在北西東三面盖石仆而後人起立植之以其一面稍完故立之南鄉此其故也河間劉跂嘗披抉剔去其翳蝕處得字九十有八班班可知以史記考之其詞可讀眀年余至泰山就視其石髙纔八九尺方面二尺餘以亂石培其下昔所建立盖鑿石為穴下寢其中嵗久摧仆則後人累石固其趾以存至字則止此未可以久遠期也考其詞寴音親􅛍音鄰遠黎民大義著眀史作休眀陲于後世史作􅑰于後世皇帝躬聽史作躬聖男女體順史作理順且刻詔書金石皆史誤以詞可得證之然昭隔内外或謂為融古字相借不然則格與隔不可兼用也陲為邊陲若垂後世則當作􅑰説文甚辨慎不應爾見泰山篆字疑其字誤慎書雜以古字論撿押也曰施于後嗣石尤可考益為昆字昔衛宏嘗謂古一字有兩名者就注之御史大夫則夫夫也莒公亦曰夫中有大如千人書千千今考禮記檀弓曰夫夫是也則字盖如此此李斯所得据也大人貫簪為夫則大夫同文義亦可知嗚呼三代書名至秦焚滅盡之後世不得知先王命書之意惟秦文是習此其禍天下後世其有窮耶後世無所考書名論辨字意則猶以是為据盖亦敝也篆文於後世為工然況之三代此其為夷狄異俗之法以亂中國者君子則宜過而不問也昔漢儒謂秦廢先王書李斯欲以其書傳後世以愚黔首然黔首卒叛秦而不可愚至於其書在者後世諸儒方共解詁以傳而三代書名幸有存者則隨棄不録然則秦之為患其足以愚後世者余於此知之矣非秦能愚人諸儒盖自愚而不知也金人銘李次升示余金人銘曰皇帝二十六年初兼天下以為郡縣正法律同度量大人来見臨洮身長五丈足六尺謂得之卬中金人脇下余考之此秦金人銘也何以至此昔秦以長狄十二見于臨洮長五丈餘以為祥鑄金人象之其重二十四萬斤坐阿房宫前當漢而徙之未央宫王莽嘗鐫其膺文則此銘知不得傳矣其後董卓以其九鑄錢而石虎以其三置鄴宫苻堅取之後置長安以其二為泉其一適至陕而堅亂民以其勞苦患之乃排陷河中戴延之曰翁仲所投故河流湧起然金狄亡矣為此書者其自秦權而成之寄於金人然字竒而古猶在銅鍰伯仲間也程邈篆書李季忱示余程邈篆四簡簡十二字余考之自漢以後書篆書所不至也篆灋䝿得竵匾應勢故筆力常有餘此書盡之或謂書家但言邈在雲陽獄初從簡便作書主於隸徒故號隸文當多事時用之適當遂公行之邈不更為篆文篆自史籀後李斯因之作為小篆由漢逮今不能改豈邈與斯當秦之世固嘗為此篆文不可考也張懐瓘曰古文謂孔子壁中書篆書史程邈作也隸書程邈所獻也初未信此言逮得季忱所藏刻銘於是信之知唐世書多懐瓘自有据也廣川書跋卷四
