body:
  text: 廣川書跋卷七宋董逌著砥柱銘唐砥柱銘貞觀十二年特進魏徵撰祕書正字薛純書其字因山鑱鑿就其窪平隨多少置字故不成行序宛轉索於嶔崎間以摹故石雖存而頗難得世知䝿之唐以書學相髙刻石之文此其最大者也筆力有餘㸃畫不失尚多𨽻體氣象竒偉猶有古人體灋其後桞公權書刻招提今已譌缺不可讀惟純所書在濁河間得完葢摹擊之工不至雖濤浪射發風雨摧剥尚不廢也醴泉銘九成宮醴泉銘唐祕書監魏徵撰率更令歐陽詢書按唐書貞觀中改隋仁壽宮為九成宮永徽中又改為萬年宮宮在岐州開皇十三年楊素所治也徵言宮城之内本乏水源六年四月西城之陰土覺有潤以杖導之有泉隨而涌出因名醴泉不知何据也漢書京師醴泉飲者痼病皆瘉故漢儒集禮有地出醴泉天降甘露以為人主之瑞而不知者謂水從地出其味若醴如此則列子所謂神瀵者顧漢魏郡國與唐離宮安得有此尔疋曰甘雨時降萬物以嘉謂之醴泉葢甘露雨也今据此則論者不知其所出也故著其説歐陽詢帖余求前人論書必先擇筆至於動作皆得如意非是未甞書也韋昶善書而玅於筆故子敬稱為竒絶然書必託於筆以顯則筋骨肉理皆筆之所寄也率更於筆特未甞擇而皆得佳趣故當是絶藝葢其所寄者心爾論者謂飛白冠絶有龍蛇戰闘之象雲霧輕飄之埶真行出于大令森森焉若武庫矛㦸至使智永奪氣信乎書玅至此極者然飛白篆書世不復傳今收真行章草可見知畧無勍敵非虚語也虞伯施謂詢不擇紙筆皆得如意此正紀其實耳宜遂良不能及也虞世南别帖虞伯施手帖論儒學不使一日失業恐子弟墜其家聲且戒之使其不息也觀北堂書鈔大見功力深至非積學之久不能盡此子纂雖識書學而文業衰矣故知虞氏九世文名為儒林所嘆可以為難也方隋時伯施以文學推選任祕書即來䕶兒以􅐥略任將帥至唐來氏有恒濟反以文顯而虞氏子昶以下不能世其業而為入仗宿衞故陸元方戲曰來䕶兒兒把筆虞世南男帶刀故曰雖在父兄不能移子弟理固然也來恒本傳曰恒濟兄弟相次知政事世南子昶無才術歴將作少匠主工作許敬宗曰䕶兒兒作相世南男作匠文武豈有種耶薛稷雜碑書貴得法然以㸃畫論法者皆蔽於書者也求法者當在體用備處一法不亡濃纎健決各當其意然後結字不失疏密合度可以論書矣薛稷於書得歐虞褚陸遺墨至備故於法可据然其師承血脉則於褚為近至於用筆纎瘦結字疏通又自别為一家然世或以其瘦快至到又似不論成法者也劉景升為書家祖師鍾繇胡昭皆受其學然昭肥繇瘦各得其一體後世不謂昭不及繇者觀其筆意他可以不論也李衞公書世傳扶餘國事類若劍俠而衞公從之似以任縱自嬉而放悍不制者然考其行事則動以禮法自約又若老書生深究進退存亡者信王佐器世或未易量也此書豪武自將亦既放矣或疑其偽將其㬥侮神羞求合於杳𡨕者乎亦當時憤激感慨豪氣未除而然耶劉餗甞言衞公訴神且請告以官位所至詞色抗厲後有聲曰僕射好去顧不見後果如言此書逮似或真有是耶將後人因此而附益之乎餗在開元中其説似有据是則若可信也褚河南聖教序褚河南書本學逸少而能自成家法然疏瘦勁鍊又似西漢往往不減銅筩等書故非後世所能及也㫺逸少所受書法有謂多骨微肉者筋書多肉微骨者墨豬多力豐筋者聖無力無筋者病河南豈所謂瘦硬通神者耶遂良帖褚河南於書葢天然處勝故於學雖雜而本體不失初學晉右軍既又學虞伯施後於史陵得用筆意乃曰此法更不可教人是其玅處也羿之立教必志於彀至巧之所極當自其心得非可法度凖繩授也學至於此當自知之辯法師碑辯法師碑薛純陀書㫺歐陽文忠公甞許其字不減率更然所書不傳於後永尗所得純陀書惟此不知又有甚焉者也貞觀十二年奉敕書銘砥柱其字磊落如山石自開隱鱗而出可以見方丈之埶矣固無牽強以成也當時如虞伯施褚登善號能書者皆避而讓之其後柳誠縣愛其書恐失其次第則又别書於石後世得純陀所書砥柱銘者皆碎雜叢疊必按此而序之砥柱銘薛純而此碑為薛純陀甞為祕書省正字本名純陀後以純自别于時撿于類書見之碧落碑碧落篆李肇得觀中石記知為陳惟玉書歐陽永尗以李漢碑為黄公譔然字法竒古行筆精絶不類世傳篆學而惟玉於唐無書名於世不應一碑便能奄有秦漢遺文徑到古人絶處此後世所疑也李陽冰於書未甞許人至㤅其書寢卧其下數日不能去世人論書不逮陽冰則未必知其玅處論者固應不同段成式謂此碑有碧落字故世以名之李肇謂此碧落觀也故以為名李漢謂終于碧落字而得名余至絳州見其處今為龍興宮考其記知舊為碧落觀而開元改今名又篆文若未畢其文者其終非碧落字則肇説是也其云有唐五十三禩龍集敦牂尔疋嵗在午為敦牂永尗謂髙宗總章三嵗以唐歴考之自武徳戊寅受命至咸亨元年庚午實五十三年矣然則總章者誤也别本碧落碑絳州碧落篆刻天尊背州將不欲以搥擊石像乃摹别石因封其舊石像今世所得皆摹本也雖横直圜方典刑有稽然遁其神者衆矣段成式言樊宗師作誌令陳惟玉書立太行山上此言險怪難知豈甞求得其當而妄為戲哉世言字不考古甚則以品為鄰今於古文􅮎字正如此便知後世不知古字而妄議者可以歎也歐陽通碑詢之子書家擇筆如逄䝉求弓矢必得勁良然後及逺中微然弓勁矢良當求其材可為者非是雖得善工不能極其精也漢世郡貢兔毫當時惟趙國為勝而工製或異亦復不良議者謂兔豪無優劣工手有巧拙正應工手不得則不得論其豪也路扈一世名手且重以雜寳為跗然其善不過秋兔之毫及其後世漸以豐狐為柱然鋒􅓄穎芒非兔翰莫可為者歐陽通於書過自矜重至以貍豪為覆兔豪管皆象犀然筆用兔頴自㫺不能改至於為柱則或假用他毛若遂用貍為鋒心恐不得若兔豪之剛柔順適能中人意也後世或假胎髪羊毳雞毛䑕鬚亦皆成筆然不能盡其利用故知其特貴異爾王逸少謂有人以緑沈黍竹管見遺録之多年斯亦可愛玩詎必金寶彫琢然後為貴㫺人或以琉璃象牙為管麗飾則有之然筆貴輕便重則躓矣不知貴犀象管者定可得輕便哉矜持太過失其常理是有媿不擇紙筆者非能其父書也歐陽通别帖今世所見歐陽通書惟三碑其别帖殆存此也筆力勁險盡得家風但微失豐濃故有媿其父至於驚竒跳駿不避危險則殆無異也書家論通比詢書失於瘦怯薛純比詢書傷於肥鈍今視其書可信也智乘院碑長子智乘院碑唐鄭王文學阮立徳譔李承福書碑成於咸亨中則天帝時也􅊲次鄭王元齡懿髙祖第十三子武徳四年分國于滕出刺沅州貞觀七年徙鄭十七年持潞州節改絳州一年再持節潞州復持節絳州所至以能稱善決大獄髙宗褒以優詔當其時鄭王名重于朝廷為宗室表顯慶元年持節安沔隨郢安州刺史此其所歴也唐書惟叙鄭潞絳三州不言再持潞絳節其為安州刺史亦不著也子敬嗣國新舊書皆作璥葢因其弟琳顯名疑皆從玉也唐存中宗世子皆以材任職而敬之三世為夷簡為宗閔琳之再世為勉皆位宰相其在當時至顯而史所書若此其可勝􅊲耶然琛珪琰璿璲珩碑皆不具而别見于龕石此宜史官不能備録也崔敬嗣墓誌集古録曰崔為唐名族而敬嗣不顯余􅊲之唐有兩崔敬嗣㫺中宗放房州吏多肆慢不為禮敬嗣為刺史獨盡誠推奉中宗復位有與敬嗣同姓者每擬官輒超拜召見悟非是訪真敬嗣死矣即授子注五品官注生光逺甞持節荆襄徙鳳翔又節度劍南其官職甚顯敬嗣亦以此名於世㫺人偶不􅊲也陳昭題名河南石氏得唐陳昭題名制度大備知今日進士刻石甚陋段成式曰慈㤙寺題名自張苔於寺中題其同年人因為故事柳氏序訓又謂韋肇初及第偶於慈㤙寺塔下題名後進慕效之按苔登科在天寳十三載此時已有題名觀陳昭所書在開元九年則其事可以􅊲也封氏記神龍已來杏園宴後慈㤙塔下題名同年中推善書者紀之他時有將相朱書之及第後知聞或過未及第時題名則添前字故李紵不加前字到老恨焉則題名自唐神龍初有之矣桞氏著書在中和三年其碑僅存因成故事則余得􅊲之方會昌中陳商知舉奏對不稱改命王起主文宣㫖停曲江大會及題名局席至中和而後進士復題名慈㤙則自廢而後行葢在此時也甞聞唐人言桞宗元劉禹錫題名慈恩寺談元茂秉筆不欲名字著障目押縱版子者率多不逹柳暗斟酌之馬徵鄧文佐盡著版子而宗元竟不逹雖一時為戲然徳器自可於此見之題名之盛亦一時所尚雖至今不廢但隆殺異爾六公詠李北海六公詠今泰和集中雖有詩而無其姓名又其説一章不盡或遺余見荆州六公詠石刻文既不刓故得盡存可以序載於此按中宗復位以彦範王扶陽暉王平陽𤣥暐王博陵柬之王漢陽恕已王南陽世謂五王然皆梁公所進故邕歎其成大功者六人詩尤竒偉豪氣激發如見斷鼇立極時至今讀之令人想望風采宜老杜有云㫺盧藏用謂邕如干將莫邪難與爭鋒史官所羙謂碑頌是所長余見他文亦不若是壯厲警㧞殆感憤而作故氣激于内而横放于外者也序言邕為荆州今新舊書但稱坐善張柬之貶福州司户參軍韋氏平還為左臺御史張廷珪姜皎引為御史中丞姚崇出為括州司馬起為陳州刺史後貶遵化尉徙灃州司馬括州刺史歴淄滑汲郡北海不書嘗為荆州也御史臺精舎碑御史臺精舎記唐中書令崔湜撰漢承秦制御史為丞相貳其後以寺𨽻之憲法所在也然立精舎以居其致一於此可矣書傳所見最先包咸東海立精舎教授此在西漢末顧湜謂此佛之所舎㫺漢處摩騰洛陽西建精舎為始誤也按釋書以静居為精舎致一為精不使雜也古之齋心服形其居必有可黙存者今人猶闢屋為齋謂如齋戒以守其獨不可以精舎名之此亦過也蕭摩之請造興塔寺精舎詣二千石庾子輿造佛寺因立精舎嶺南源明僧紹住弇榆山棲雲精舎此皆諸梵所居然書生立學㫺傳此名豈致道之所居惟精一而後得之㫺魏武甞曰譙東五十里築精舎秋夏讀書其後徐庶折節學問精舎唐僧淵立精舎豫章阮孝緒以一鹿車為精舎徐伯珍立精舎䝉山陳寔立精舎講授張郡戴顒立黄鵠山竹林精舎張漢直其弟出精舎數里遇之則古人於其居也以是名之凡以求致一于學者故以名自警觀其朝夕處之可不思以致其精耶後世知釋氏所居為精舎便以為精舎皆寺也湜之嗜利蔑學其可責以此哉盧舎那碑盧舎那佛像記蔡有鄰書今見於世者三碑惟尉遲迥廟與此存耳書法勁險驅使筆墨盡得如意當與鴻都石經相繼也唐志稱有鄰於八分本怯弱至天寳間遂至精玅相衛中多其蹟然則當時葢不止三碑惜其今亡之也尉遲迥碑尉遲迥碑成伯璵撰世以蔡有隣書特貴其叙迥事與周史畧同然迥之死節不得顯方周之興迥已為蜀國公矣逮魏之亡一宗伯且受命舊國舊都望之無慨于懐不翅傳舎一日去之矣隋公總政天下之埶可以知也迥則不受而承制起師以興復為任其事則有疑也豈以地居嫌疑埶窮畏迫自度不能容於隋而發哉則寃憤欝結不得其死宜其出靈響以自見不得如伯璵也唐説自迥之死而相州都督死者前後相繼張嘉祐既治事夜整冠危坐有自西廡出者曰余後周尉遲迥也死於此遺骸尚存願得畢葬前牧守者膽氣薄劣驚悸而逝非所害也又指其女子曰同瘞於此明日嘉祐發掘得之備衣衾棺器禮而葬焉既夕出謝曰余無他能願畢公之政節宣水旱唯所命嘉祐以事聞上請置廟嵗時血食有詔褒異今􅊲周紀韋孝寛既平鄴城則移相州守安陽至于碑則謂武徳中朝制改葬逮開元丁丑張嘉祐問俗郡言多祟公曰蜀國公獨為純臣闕修殷薦其取戾也宜哉觀此自是武徳改葬至嘉祐則廟而祀之矣亦不因詔而行也與尚書故實政戾謂神之休福則得之其謂遺骸西廡詔為廟容改𦵏于開元嵗皆誤也李太白藁藁書世傳李太白遺文或謂謝氏子弟誑武功蘓才元所書更不復詳􅊲所出而推舉過重便謂不減魯公然此書雖少繩墨不可􅊲以法度要是軒前輊後度越陵突令人想見酒酣賦詩時也王僧䖍論書或以其人可想或以其法可存世人㤅李太白名至偽書一卷亦聲價増重豈以人可想故耶張旭千字長史於書天也其假筆墨而有見者是得其全而加之手爾豈知曲直法度自成斲削間邪觀其書者如九方臯見馬不可求於形似之間也方其酒酣興來得于㑹意時不知筆墨之非也忘乎書者也反而内觀龍蛇大小絡結胸中㬥㬥乎乘雲霧而迅起盲風異雨驚靁激電變怪雜出氣蒸烟合倐忽萬里則放乎前者皆書也豈初有見于毫素哉彼其全于神者也至于風止雲息變怪隱藏循視其蹟更無徑轍時一豪不得誤是㫺之昭然者已器故耶張長史草書百技原於道惟致一則精復神化此進乎道也世既以道與技分矣則一涉技能便不復知其要玅此豈託於事游泳乎道者耶張旭於書則進乎技者也可以語此矣故凡於書一寓之酒當時沈酣不入死生憂懼時振筆大呼以發其鬱怒不平之氣至頭抵墨中淋漓牆壁至于雲烟出沒忽乎滿前醒後自視以為神異初不知也今􅊲其筆蹟所寄殆真得是哉夫神定者天馳氣全者材放致一於中而化形自出者此天機所開而不得留者也故遇感斯應一發而不可改有不知其為書也莆田方宙子正得君謨所藏張長史帖為書其後崇寧二年十一月壬申張長史别本見鐻於山不喪其天見蜩於林不分其神誠能知此可以語書矣甞見劍氣渾脱舞鼓吹旣作孤蓬自振驚沙坐飛而旭得之於書則忘其筆墨而寓其神於羣帝龍驤雷霆震怒之初矣落紙雲烟豈復知耶此殆假于物者神動應於内者天馳耶㫺崔延伯每臨陳則令田僧超為壯士歌然後單馬入陳所向無前至僧超死則不復能戰是知以氣勝者氣能葢天下然後可以勝天下矣宜純氣之守者萬物不得窺其蹟也郎官石柱記赤驥白􅀢一駕千里當其披崑崙上羽陵時求其逸景於逐足下殆無遺蹤矣至于在六轡間和鑾在前鋈續在後則過君表而舞交衢進退履繩旋曲中規求其毫釐跌宕無遺恨矣長史之書殆盡於此方乘醉時翰墨淋漓雖驚風迅雨不能與其變俱也此詎可以規矩凖繩求哉及郎官記則備盡楷法隱約深嚴筋脈結密毫髪不失乃知楷法之嚴如此而放乎神者天解也夫守法度者至嚴則出乎法度者至縱而不可拘觀其􅝫音樹鋒鱗勒峻磔抑左升右仰䇿輕掲緊䟐音立闇收此書盡之世人不知楷法至疑此非長史書者是覩其騏驥千里而未甞知服襄之在法駕也張友正艸字張友正所書自云得漢人心法其用筆過為鋒長而力弱殆不可持故使筆常動摇勢若宛轉世人故自不能用今􅊲其書别搆一體自得成就雖神明潛發不逮古人然自然處正自過人也今人不知古人用筆或妄詆者不知書者也皇象曰欲見草書漫漫落落宜得精豪㼱而兖切柔皮筆委曲宛轉不叛散者紙當得滑密不沾汙者墨又須多膠紺黝者如逸豫之餘手調適而心歡娯正可以小展觀此便知友正用筆葢有所本近時趙叡彦思學友正用筆至于草字已能輕舉迅速頡頏筆墨間自與握一寸筆頭拘制方寸間者異也崇徽公主手痕碑碑在汾州靈石葢唐僕固懐恩女懐恩唐功臣以嫌猜叛入囘鶻沒其家入後宫大歴四年以囘紇請婚封為崇徽公主下降可汗以兵部侍郎李涵往册命唐都闗中其入囘紇道至汾上此其常也然托掌石壁遂以傳後豈怨憤之氣盤結于中而不得發遇金石而開者耶廣川書跋卷七
