body:
  text: 廣川書跋卷九宋董逌著劉統軍碑余讀韓愈作劉昌裔碑竊疑其書謂旣葬將反柩于京師知其必有誤也且旣葬矣安得而反柩哉因求其碑偶存為考其文是反机于京書之所傳其譌若此豈不使後世疑耶其餘雖于義不甚相妨然因其譌誤可以復證也碑云陳許軍節度使今書本無軍字反机于京碑無師字不可以誣碑無以字有太史之狀有太常之狀而無下有字蘇民戰敵碑為軋敵陳力應變碑為陳方僕射已都碑作以都書曰菑害碑作􅨶害以文考次知書本為誤乃知碑刻之傳於當時者不可誣也後世挍讐不得原本因誤就譌不究其意隨己所見致文字錯亂以疑後學可勝歎哉又劉統軍别本元祐七年余為李平叔書劉統軍碑後眀年贊皇李叔憲復得此碑屬余考其嵗月將有釋於後也按新唐書劉昌裔始說邊將不售去入蜀楊惠琳亂說之順命拜瀘州刺史署昌裔州佐惠琳死客河􅃋間曲環方攻濮州表為判官為環檄李納剴曉大義環上其藁徳宗嘉之或謂永貞元年十一月夏州節度留後楊惠琳反明年六月伏誅則不得順命為瀘州刺史建中三年曲環為邠隴節度其後改陳許則不與李納同時其序錯亂不可以据今考于碑楊琳為橫巴蜀靡凋公由游寄單船往諭招琳後來降公不有功徳宗之始為曲環起則昌裔先在河北外論事不得用則入蜀說楊子琳得佐瀘州子琳死始從曲環新舊書唐歷書永泰二年崔旴攻劒南節度使郭英乂卭州柏茂林瀘州楊子琳劒南李昌䕫起兵討旴大歷二年杜鴻漸節度西川表子琳瀘州刺史當其時昌裔實佐其州事則自當為楊子琳但為楊琳舊書因之故不得以相亂新書以為惠琳又以其在夏州時故謂李納僭逆嵗月皆誤至謂攻濮州葢陳許節度李光顔其謂曲環誤也新書建中二年平盧節度李正己卒子納自稱留後貞元八年納卒舊書李納之為留後在大歷十一年其卒當貞元十五年以實録考之舊書是也舊書建中二年李洧棄其師李師道以州来降十一月宣武節度劉洽與神策將曲環大破李納之衆於徐州又曰李納擁兵侵廹徐州令曲環與劉𤣥佐同救建中三年李希烈侵汴州環大破希烈軍于陳州城下擒其驍將翟暉以功加兼陳州希烈平環兼許州貞元十五年環卒上官涗代之涗卒軍中推昌裔遂代節度碑謂新帥不牢劻勷將逋則吳少誠薄城涚欲遁去皆於碑可以考之後世不求其事惟史所録据以為信則安得無誤歐陽公嘗以碑考史書謬誤若此之類是也田𢎞正家廟碑唐文敝至韓愈始變而知所守後世學退之者惟歐陽永叔獨探其源余考田𢎞正碑葢其傑然自出拔乎千百嵗之上者永叔嘗得此碑以挍集中誤字三處曰銜訓事嗣考其所出雜比成章錯綜而不亂信其有得於此又曰降以命書奉我王明必以集為誤者余則不得信於此也以降命書不得如集所傳天明施于君為不類不若王明之切當而有据也今碑為非是則不可謂天明以降為工於集所著而傳則不可碑雖旣定其辭而後著之石此不容誤謬然古人於文章磨鍊竄易或終其身而不已可以集傳盡為非耶觀其文當考其詞義當不然後擇其工於此者從之則不得欺矣今天下知文公者莫如文忠公文忠謂是人不敢異其說況碑為當世所書人豈可盡告而使知耶今人得唐人遺藁與石刻異處甚衆又其集中有一作某又作某者皆其後竄改之也嗚呼知退之者益少今惟文忠為得其要其說猶然其下一等又可知矣徐偃王碑徐偃王碑昌黎韓愈撰徐放書碑故在集中以其文相挍不失葢碑近而傳者衆故得不誤愈於此碑序事淹該華實不似黃陵等碑錯雜無序駸駸上薄漢周不造其極則不止魏晉宋齊糠粃殆盡略無餘習可謂至矣昔人嘗謂公於文渾然一出於己不蹈藉前人横驁直肆恢竒衍溢今考其言曰徐不忍鬬其民北走彭城武原山下百姓隨而從之萬有餘家因號其山為徐山此即范曄漢書全用其語偃西王母事盡錄穆天子傳朱弓赤矢采祥瑞志然則愈於文葢亦未嘗不用前人語但使人不覺如己出也其曰故制樸角昔人嘗改為桷淮南子曰堯樸角不斲素題不枅愈於書無不用也平淮西碑唐平淮西碑翰林學士段文昌撰安定李元直官􅃋方得於定武余感而歎曰明娵子奢莫之媒也嫫母力父是之喜也昔韓愈受詔為文開鑿渾元索功𤣥宰葢精金百汰愈鍊愈堅其植根深其藏本固發越乎外其華􅂱然不可掩已自漢以後無此作也帝子不慧過量其夫且嬌姹之苟以大功尸於私室夸耀寵靈要求命數惟意私之則破其碑以仆於道時君世宰暗愚自將則受以改命文昌庸伍安知為文氣質衰陋無復經緯雖組織求麗而綱領失据正如江左俗學以麗偶自矜借使一時女子無知朝廷之間君臣論議又出一女子下耶借使在朝無人庸鄙暗劣文昌其可承詔為此哉昔李商隠讀愈平淮西碑謂如元氣正賴陶化庶類而當時不容況一日得行其道吾知其不得存矣或謂不叙愬功考其言用夜半至蔡破其門取元濟以獻盡得其屬士卒豈嘗泯没無傳顧愈以裴度決勝廟算請身任之帝黜羣議決用不疑此其所取逺矣劉禹錫知名于時嘗忌愈出其右貞元長慶間禹錫隨後以進故為說每務詆訾且謂文昌此碑自成一家其自快私意如此又謂栁宗元言愈作此碑如時習小生作㡌子頭以紃綴其文且不若仰父俛子以此為上下之分宗元嘗推愈過揚雄不宜有此語皆禹錫妄也羅池廟碑文公叙羅池事亦旣異矣夫鬼神茫昧幽眇不可致詰聖人閟而不言惟知道者深觀其隱自理得之然不以示人恐學者惑也昔殷人尚祭祀事死以生其敝小人以鬼則立敎御俗可不慎耶嘗觀文公守儒道甚嚴以世敎為己任其論武陵謝自然事勇決果斷不惑於世可謂能守道者至羅池神則究極細𤨏惟恐不盡豈亦蔽於好竒而不能自己耶為李文叔書羅池碑羅池之文至矣来者不能加也其以子厚正直為神誤矣昔歐陽文忠學文公而知至者嘗評田𢎞正碑銜訓嗣事為譌必曰事嗣則語參錯而雜比故能起而振也余讀此碑至牛繫軛下引颿上檣益知簡鍊差擇其精至此信天下之竒作然永叔謂春與猿吟兮秋鶴與飛疑碑之誤此最退之用工處不知何故反於此疑之考銜訓事嗣退之便是一體得於彼而失於此葢亦不思也為陳中王書羅池碑佛經言人之生死變化出入六道中葢上修則天神果下陊則阿修羅果然天中極樂修羅極苦以樂苦相求者皆有極盡惟修泥洹果者然後出此栁子厚浮躁進搏得罪其時以忿恚憤怨死若在正法中陊修羅界宜也今西方諸國尚神為俗各有名號以祈福祥惟女國正名為阿修羅葢西域以神人為修羅其自有名者以其所顯者得名號稱之正如羅池之類是也愈不讀佛書不知其果如是方且叙其怪變謂聦明正直也黃陵廟碑黃陵碑世以其書為重石久缺剥字滅幾半矣近人以其完本售至數萬謂傳師此書特謹重有法不與他石並也歐陽永叔嘗得其碑謂降小君為夫人据碑為定其餘猶有可證於書者今考於禮如夫人之為小君自不失正豈書猶可疑也又若陟方等語大不合於書矣退之於文嚴整密緻故語妙天下余於黃陵碑疑之詞不整比而辨事謬誤不知何為至是其謂張愉曰且使後世知有子名加此於人其誰受之耶穆宗詔曰張愉學古人仕甚修飾河西有政聲次於李諒則愉之名不待愈而後世知之矣又黃陵廟碑博士王持國得韓愈撰黃陵廟碑甚完其字無譌軸而藏之屬余書其後余謂黃陵文見昌黎集人皆可得惟碑以沈傳師書為貴乆則字剥缺不可讀故其完本難得余嘗考昌黎之文閎深浩博不與世人同機軸卓然自成一家獨於此碑雜碎無統紀文氣亦不純而格韻不類葢其辨湘君已失故其言亦自畔不得經意湘君即舜妃夫人為女英以楚詞可得知之古者天子建后其以娣姒從者雖皆同姓自當為夫人此禮也郭璞疑帝舜之后不當降小君夫人愈謂有小君故正得稱君夫所謂君即小君也后夫人配君故天子國人稱之謂君則后謂小君降天子也舜不立正妃二女以長㓜為序不言后豈后之下復為小君以稱此非禮也惟諸侯之妃天子封之曰夫人故國亦以小君稱之對諸侯以自稱於國也書稱舜曰五十陟方乃死禮曰天子登遐釋詁曰騭假格陟躋登升也則登遐升遐同文舜為陟方自是南廵狩凡行必謂陟葢往而升也不謂地有高下而陟降異詞周公稱成湯曰禮陟配天自是殷禮能升配天享國不宜遂以為陟而死也今曰陟文句為盡而謂方乃死者此不成語愈書誤以竹書雖以陟為升謂升遐也不得於此取之觀愈於此碑時用工深故博考而詳取葢求之太過牽强取合固宜忘失本意李干墓誌唐太學博士李干誌河南李仲微得其碑以傳然其文自見昌黎集中惟碑少見故仲微貴之其書李翺亦可臧也志曰字子漸集無此又以栁賁為泌與集本異者唐憲宗紀自作栁泌知李道古誌與此皆誤此誌甚罪干以丹砂受賁之術以死且以為世戒也又敘歸登食水銀火射竅節以出李虚中服硫黃致疽發於背李遜且死始知藥誤孟簡自以得不死藥二年卒盧垣溺出血肉李道古亦以栁泌藥死海上觀其說者自令聳懼震恐可終身守之且世亦知尊生矣其壽宜不死卒以得死雖甚暗庸不此為也或傳退之晚嵗頗嗜硫黃卒以此死白居易曰退之服硫黃一病竟不痊居易言可信也立論以戒世求世必信公乃自蹈於此何哉余意以血氣旣耗不得如向之時方幸扶衰救疾以冀朝夕近功不知其患已如干也可以一歎哉孔戣志孔戣志稱戣平生節操有古人風使作者無愧詞亦使人知以銘誌為貴也考廣徳王碑其敘亦僃矣當戣為華州刺史奏江淮進海味道路擾人憲宗以其言忠詔除嶺南節度其事見於嶺表者韓愈盡道之獨不及華州事則誌不得而具者其序當然也嘗見隋煬帝時責貢四方而海錯出尤盡當時如鮸魚蝦子含肚鱸魚乾膾密擁劒桂蠧鯉腴動輙千品勞人殄物至江淮絶魚雖欲不亡其可得耶或曰使得其臣如戣軰在左右當無此患是不然諫幸江都如任建宗即日朝堂捰烏果切殺之矣然則人臣進諫亦會逢其時爾非憲宗之明其說果得行乎處州孔子廟碑處州夫子廟碑唐咸通四年刺史王通古重立以傳考之李繁作學官處州當元和二年至僖宗而碑已廢後世以昌黎公文可傳故又刻石於學使世存之昔歐陽文忠公謂隋唐之際天下州縣學皆廢且文公見官為立祠州縣莫不祭之則以夫子之尊由此其盛嗚呼禮之廢乆矣皮弁祭菜示敬道也周之制凡始立學必釋奠於先聖先師禮曰始立學者旣釁器用幣然後釋菜不舞不授器夫􅇚奠有樂釋菜無樂鄭康成謂釋菜於詩書禮樂之官釋奠於先聖魯之錫成王以天子禮樂祀周公安得祭於學哉然則先聖祀孔子可也當三代盛時夔伯夷世為先聖祀於諸國必有合也至漢始以孔子祭於學天子親祀自晉成帝至唐武徳定著於令其禮稍重范寗請用王者儀而范宣之議當其釋奠用帝王禮樂然謂釋奠幸存不以四時為祭今又無樂文忠公据後世苟簡便謂禮有不足則誤矣昔貞觀中始以孔子為先聖永徽定令復用周公為先聖黜孔子為先師然文公遽以句龍棄得常祀無如夫子盛文忠謂孔子後天下皆以為先聖豈亦不知考於古耶開元詔曰昔縁周公南面夫子西坐自今後夫子南面而坐内出王者衮冕之服衣之制詔丞相冊封文宣王於是列㦸而以門人配焉其曰南面用王者事巍然以門人為配豈古實行之嘗怪二公於此不知考古使後世疑之此可歎也廣川書跋卷九
