body:
  text: 廣川書跋卷十宋董逌著同光四年宣中書謂之草樞密院謂之底三司謂之宣昨以鄴都叛亂須議濟師相次更委嗣源同謀翦滅不意忽因深夜寨内驚騷遽至紛紜權罷征討其城下一行大軍除鄴都側近分屯守把外李紹榮並部領且歸闕下見别舉王師攻取次兼李嗣源李紹貞等為緣軍亂自負憂疑不欲回赴闕庭又未盡聞行止恐是郤歸鎮府排齪軍都向背未知隄防宜設竊知恐有潰散兵士逃背軍都結搆兇徒奔突城鎮右奉聖㫖令諸處更切誡嚴師旅管内遍切指揮各令守把城池安存户口常加警僃勿失機宜仍須不住差人探候每事機飛狀申奏付晉州準此同光四年三月十七日宣樞密使李樞密使張天子降書命於下有策書制書詔書誡書策書起年月日稱皇帝曰此命諸侯王三公制書其文曰制詔三公赦命令是也詔書詔告也有三品其文一曰告某官某如故事二曰省奏事三曰羣臣有所表答也已奏如是奏是也誡言誡敕刺史太守及三邉營官被敕文曰有詔敕某官是為誡敕自唐以樞密院領兵事始以宣自别于命余嘗得梁宣底考之知其制自唐末至五代而行之當貞明時李振為樞密使凡宣傳上㫖以行于外而録于其院則謂之宣底而後樞密院以其與敕異事故以其詔命謂之宣其制於事後具月日臣某宣晉改樞密承宣以就其制今考其同光四年三月宣其書葢與梁同制也河南石温叟得後唐同光四年三月宣余因考之貞明宣底見五代之制葢自唐末相承如此梁以李振為樞密使其宣上㫖以行於外而録其事藏之故中書省以勅樞密院以宣各有制度其宣則於事後具年月日宣如唐告宣奉行而石氏所藏樞密院具姓此制則唐所行宣而録其底以藏與梁宣底同也昔宋次道論繫月日姓名者乃所以為底今樞密尚用之皆作卷軸連藏而同光宣以御前寳璽印出葢其所行以出者與其留底皆用寶也雖其一時搶攘葢有司存焉不容其制相亂當唐莊宗遣李嗣源以取魏州謀議出此其至竄亡可坐計也方且召李紹榮還闕而恐嗣貞走鎮天之所誘悖謬其心此宣可以資後世一笑當其以兵武擅天下謀畫計決應於事機不可謂暗於前計滅梁纔三嵗爾當皇甫暉以效節軍脇制在禮䧟鄴都初命李紹榮討之邢州亂又以李嗣貞將而討其州將趙太紹榮攻鄴無功莊宗欲自將牽於孽后不能決方其時明宗以疑自嫌不能釋於猜携乃授以師徒余竊怪其取禍以逞求自速也方軍變於魏時而紹榮猶守城南紹貞乃辟西北隅明宗託偽還鎮州紹貞勸帝以兵南下莊宗死氾水而此宣方進紹榮明宗果欲歸鎮豈不知紹貞幸禍以激變而求其自託於嫌在禮反於魏軍以旁引壞詔劉氏謂小事可趣紹榮指揮此可為長太息也始莊宗與梁軍相持會賀正入附遂得魏而梁由此亡及得天下以王正言守之此不幾于以天下為戲哉其籌畫算計皆不足論其措置施設所以成其亂者可以為後世戒以見五代之亂非天不悔禍葢人謀召患雖天心之仁不能拯而救也其稱樞密使即張居翰李紹宏也其言紹榮元行欽也紹貞者翟彦威也皆唐之賜姓號養子莊宗所仗以成功者也李後主蚌帖江南當五代後中原衣冠趣之以故文物典禮有尚於時故能持國完聚一方豈徒然哉觀此帖下屬州責蚌醬猶有古義知以宗廟為重恐滋味䤔玉篇昨冉切䣸玉篇而琰切味薄也其下惶遽供命不敢寧固知禮有貴於行事者也漢律會稽嵗獻鮚巨乙切醬二升以說文求之鮚為蚌知此為宗廟祭乆矣然謂漢有舊儀豈以此耶李國主集賢院書江左書兩等紙用澄心堂所作穀皮細鈔其上本入中隱堂僃親覽者為御府書其下入文館以廣圖籍書有楷法而字頗挍讐今散落人間徃徃收藏為嘉玩其書有楷等亦與供進者絶異晉有中祕書而又有外庫悉異紙札故虞預言祕府中有布紙三萬餘不任寫御書而無所給請四百枚付著作書史寫起居注然則書紙有等自昔然也為張潛夫書官法帖觀書似相家觀人得其心而後形色氣骨可得而知也古人大妙處不在結搆形體在未有形體之先其見於書者託也若求於方直橫斜㸃注折旋盡合於古者此正法之迹爾安知其所以法哉淳化中詔以祕閣所藏書入石又以翰林待詔王著摹字求其書法之外各有異處殆不可得至於行筆利鈍結字踈密時可見之然決磔鉤剔更無前人意皆著之書也其後得祕閣墨書挍其字畫皆硬黃摹書至有墨色烟落或以重墨添暈當著奉詔時其所摹搨皆略放其大體而私以筆畫成之宜其用筆略無古人遺意不足異也觀王洽書逸少謂不減己落簡揮毫有郢匠成風之埶王珉書獻之謂騎驢駸駸欲度驊騮前今視官帖二人書畫雅有相類而洽更自劣弱珉書則與子敬更不可辨皆硬黃偽誤少真而摹傳者遂成一體也今人不知其故憑石本便評定書畫至於放言立論更無疑處此與觀景而論形神以為某勝某劣何以異哉為方子正書官帖世疑官本法帖多弔喪問疾葢平時非問疾弔喪不許尺牘通問故其書悉然余求之故不當爾也唐貞觀嘗購書四方矣一時所得盡入祕府張芝鍾繇張昶王羲之父子書至四百卷漢魏晉宋齊梁雜蹟又三百卷惟喪疾等疏比之凶服器不及入宫故人間所得者皆官庫不受者也唐世兵火亦屢更書畫湮滅不能存其一二逮淳化中詔下搜訪已無唐府所藏者矣其幸而集者皆唐所遺于民庶者故大抵皆弔問書也石曼卿書世以曼卿跅弛不羈故其乗一時豪氣所感豈提鈆懐槧者所能模放耶觀其論天下事無不公當後數十年其言益信可用精思者不能過也潞子城有曼卿所書葢寶元七月是時朝廷始以曼卿所上民兵為可行故得與吳遵路同籍河東兵至此迨今六十五年本道再置使按民兵其說正當時所議而西河師中適為上黨尉初得其書摹石此豈亦有數耶晝錦堂記運筆柔則無芒角執手寛則多緩弱㸃掣短則法臃腫㸃掣長則法離澌畫促則字勢橫畫踈則字形慢拘則乏勢放或少則純骨無媚純肉無力少墨浮澀多墨苯畢衮切苯䔿草叢生也鈍書病如此其衆惟積學漸成者當求擺脫入究竟三昧此宜有墨池筆塜終身于是然書法須得天然至功力亦不可棄王僧䖍曰宋文帝書自謂不減王子敬時議天然勝羊欣功夫不及便知力學所至不可廢也蔡君謨妙得古人書法其書晝錦堂每字作一紙擇其不失法度者裁截布列連成碑形當時謂百衲本故宜勝人也書萊公事後李化光書王世弼事其言萊公主隂官若王者居巍然正坐侍列至衆曰此王也命弼拜旣寤稍露其語故化光得書或問秀師曰此脩羅地也佛法脩羅下人天一等或疑公之正節直行當入天神今乃在修羅何耶廣川董某曰子謂主隂官者為生大海心而下劣者耶亦將謂鬼趣所攝而從卵生者耶若公之蹈難不顧死以忠力再造王室此與執持世界力同無畏葢與帝釋梵王居者不知公在天趣矣子無疑其如在離溝下竈泆陽倍鮭沈水海口以恐懼驚動疑俗求敗鼓喪豚者為公之靈響耶顔泉記余見李勝作顔泉記昔文姜事姑則異一日泉發其居遂廟食於此或曰昔李陽氷嘗尉淄川刻碑廟中今所書葢據李監說余往來求陽冰記不得其後得破石僅尺葢為礎或視之書字可讀按其說文姜姓顔餘與今廟中刻石所記無異嘗見唐李冘作集異記書文姜事姑以孝謹樵采之外汲山泉以供飲一旦緝籠之下湧泉清泠可愛時謂顔娘泉李冘所記後世据之按顧野王輿地志謂顔文妻也事姑感得靈泉生於室内常以緝籠葢之姑出籠即泉涌居宅時號籠水野王所記自是當時所傳李冘以為顔文姜誤也今考地記淄川為齊邑唐武徳分於齊郡而為州治當唐陽冰為尉於郡邑其事不妄而謂顔氏文姜則不得其實按此水本號萌水出甲山東北逕萌山西注般陽入于隴下與齊水合者萌水口也不知冘陽冰在唐世猶不得其水名而輿地志固己辨其出可無信耶余修官書見熈寧中封顔文姜為順徳夫人當時不知詳考但据李冘所記此其失也寶章集上山斫檀榽遐雞切橀呼奚切榽橀木細葉似檀今江東有之先殫謂山無檀則不可謂榽橀果足用為檀則世亦不能自罔也昔神龍中王方慶上其祖導洽珣仲寶騫規獻之二十八人書離卷為十詔賜其書號寶章命崔融為序復還方慶當時所集大小差次不能比櫛相倫隨其廣狹高下為卷其後散逸世人各復一二得之淳化所上帖已有雜出是集者矣元符中祕閣復以至道後逮紹聖間所購書摹石寶章集盡刻之余嘗見墨蹟盡作硬黃紙次第測入切㞏直立切玉篇曰從後躡也如梵經亦甚整理此乃唐人臨搨者世人以其石刻出祕閣比他石為難得乃剔取寶章一卷别出謂真方慶所上也導洽珣書自有存者世或得之不於此求而競從於偽因書其末崇寧三年十月為宗子大年書為邵仲參書寶章集古人論書要識書家主人則妄誤者故常奴爾亦何至亂真耶後世於書旣失眼目而摹搨轉偽則雖欲如古人懸斷真偽不復得也故常求辨其縑紙所因以識其世先後其間甚偽者可以辨至工於臨搨而得舊縑紙者則不能盡知服䖍謂方絮曰絮葢漢紙如此古人治紙要自有法故以縑帛依舊書長短隨事截之則為幡紙以生布作紙絲綎故名麻紙以樹木皮作紙名穀紙至櫱汁涅染㸃治槌裝則為經紙自漢魏遺字多作幡紙晉宋多作麻紙而隋唐用經紙今世所見宋晉帖多作經紙硬黃此於真偽可以不論也余見祕閣寶章集悉為經紙摹書然武后旣復以賜方慶則留于御府者當時所臨搨者也不然公家何處得此然有法度陵驤迅快故知為能書也僧伽傳蔣頴叔作鍾離景伯書廬江劉良以示余考之僧伽本天竺人龍朔初至中國景龍四年入滅葢年八十三矣此以舊傳韓退之詩知其瑰竒不可少貶其謂李太白嘗以詩與師論三車者此則誤也詩鄙近知非白所作世以昔人類在集中信而不疑且未嘗深求其言而知其不類余與之挍其年始知之太白死在代宗元年上距大足二年壬寅為六十年而白生當景龍四年白生七嵗固不與僧伽接然則其詩為出世俗而復不考嵗月此殆涅其服者託白以為重而儒者信之又増異也龍朔元年至景龍四年以唐歷挍之為五十年知僧伽在西方時三十三年矣余以舊傳知之魯直烏絲欄書翟湛嘗以烏絲欄求豫章黃魯直為書蘇子瞻陶淵明詩字尤用意極於老壯態不似平時書但烏絲治之不得法礙磔決頗失行筆勢葢縑帛不如昔也往見晉宋諸人謂縑素之工殆絶於昔惟王僧䖍尋得其術雖不及古不減郗家所製當時書縑自别是一機杼故能傳乆逺如此觀張芝有縑素書傳於唐而張昶毛𢎞亦傳縑素書後人得其舊本便知其異也今為烏絲不如昔工又澀緩有浮纇槌練得柔滑加繕治然後可用不若紙也唐許渾以烏絲欄書其詩為集然則豫章書東坡詩便為有考於古也廣川書跋卷十
