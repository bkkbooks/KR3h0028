body:
  text: 廣川書跋卷六宋董逌著鍾繇賀表昔人辨鍾元常書謂字細畫短而逸少學此書最勝處得於埶巧形宻然則察真偽者當求之於此其失於勁宻者可遥知其偽也賀表畫疏體枝鋒露筋絶不復結字此決知非元常之為也永叔嘗辨此謂建安二十四年九月關羽未死不應先作此表論辨如此正謂不識書者挍其實爾若年月不誤便當不復致辨邪辨書者於其書畫察之當無遺識矣皇象𨽻字皇象書呉大帝碑在江寧府書雖本漢𨽻然探竒振古有三代純樸氣自是絶藝非如東漢遺書循一矩律籍蹈綴襲竊而自私也自王志愔定録古今書而象已在著録中至庾肩吾以象品入上中其後李嗣真因之不改不知當時所定果何据也羊欣稱象善草書世稱沈著痛快而張懐瓘惟稱象小篆入能品其他不見稱於人今官書有象章草帖故自精深竒崛前世獨不言象為𨽻字何也意謂既以書入品第則或不盡著其言又諸人或有兼數書著者此又不可知也余疑此碑近出書畫尚完故是前人未見當其評書時不得䀝睨於其間也不然書𨽻至此而可遺其品目哉象尺書曰太子屏風在此已乆而未得之又曰想必醉令作鱧魚梅羮相待其自矜持如此七賢帖長安李丕緒得晉七賢帖世疑劉伶作靈李氏謂史容有誤然其字伯倫知為伶也書尤怪詭不類然昔經范文正公歐陽文忠公蔡文惠公諸人題識故後世不復議余昔于官書中見山濤阮籍嵇康書皆入作者閫域而不見劉伯倫書不知今所傳果何所從来而得其形製哉余見梁世自有劉伶善書畫當世號文學士豈此書是耶唐初購書以金故人得偽造以進當時李懐琳好為偽迹其用意至到或謂亂真昔人謂急就章為王逸少書七賢帖假云薛道衡作序缺三字􅀢褙持以質錢其所用繭紙皆謝道士所為尤便臨書故懐琳所為書皆繭紙無薛道衡序此蓋後人所為得劉伶書因以付之故其詭異不可法度約者此正衒玉而賈石也紹聖三年余過長安邵仲恭得此摹本諉余跋其後别本七賢帖嵇含云衆口異賈羣目改望陸景云衆口毁譽浮石沈木今此一書致略失而論者異詞欲来者不惑不可得也世人信耳而不信目故於書少有自斷于胷中者苟惟人言信之故凡造妄架偽者舉得進也前人評畫謂耳中有畫目中無畫余於評書亦云司馬整碑晉宣威将軍南鄉太守司馬整頌泰始四年己巳建書為𨽻古氣質渾厚與鴻都石經可一二挍也碑言整安平王孫義陽王之子仕魏拜郎中中郎議郎諫議大夫騎都尉給事中治書侍御史咸熙二年出臨宛郡加宣威将軍就郡拜庶子泰始三年十一月使者奉詔冊命為南中郎将統兹宛郡今考晉書整義陽王望之子初奕為義陽世子奕䘚整嗣封清泉侯追贈冠軍将軍自郎中議郎史不盡書如宣威将軍中郎南郡守則見於法書而史氏闕之碑自泰始四年建則侯于清泉皆自宛郡後然頌曰出臨鄙郡自託于詞亦何陋也漢之衰文物随弊至晉不勝淺陋殆無前人一言一語雖政教汙隆文章與時髙下然自是氣質卑薄至論述次第亦已失當此可怪也整在當時葢公族一少年名爵未立頌至謂禀乾坤之純靈竝聖賢而誕興其在南郡謂洪恩淪乎不測覆養包乎無外巍巍之功揚于仄陋其受冊命慶雲隨之夫儗人必於其倫非其倫者人亦不得受之文字之壊至此可歎也太公碑太公廟碑今在衞州共縣晉太康十年立其文可識曰太公望者此縣人太康二年縣之西偏有盗發冡而得竹䇿之書書藏之年當秦坑儒之前八十六嵗其周志曰文王夢天帝服𤣥􅓙以立於令狐之津帝曰昌賜汝望文王再拜稽首太公於後再拜稽首文王夢之夜太公夢之亦然其後文王見太公而訊之曰而名為望乎畣曰唯文王曰吾如有所見太公言其日且述其言臣以此得見也文王曰有之有之遂與歸以為卿士其紀年曰康王六年齊太公卒葢壽一百一十餘嵗史記謂東海上人西伯與語大説曰自吾先君太公望子乆矣故號之曰太公望又曰吕尚處世隠海濵西伯拘羑里􅤖宜生閎夭素知而招吕尚言吕尚所以事周雖異然要之為文武師葢不得其詳乃廣徴異説其謂東海上人則得于孟子其先君望子則得於墨子至拘羑里則戰國辯士之論也灼龜而得兆立以為師今緯書有之曾不知諸侯無太師而東海時避紂爾則得以為卿士其説是也詩曰維師尚父則知為武王師也竹書最古當魏安釐王時國史也則所書宜可信其言服𤣥􅓙而説文無此字惟曰漢令解衣耕謂之襄而衛宏字説與郭昭卿字指曰有之知許慎所遺古文衆矣昭卿因宏以有記非得是碑豈知宏之為有据哉晉紀言咸寧五年盗發汲郡冡與此碑異知史誤也月儀世謂母邱奥碑比蔡邕石經無相假借惜其書不見扵世觀晉人評書以索靖比王逸少而歐陽詢至卧碑下則筆墨妙絶不待見其書然後信也近世惟淳化官帖中有靖書其後購書四方得月儀十一章今入續帖中其筆畫勁宻顧他人不能䀝睨其間然與前帖中書亦異不知誰定之李嗣真曰靖有月儀三章觀其趣尚大為遒竦無愧珪璋特逹猶夫聶政相如千載凛凛為不亡今月儀不止三章或謂昔人離析然書無斷裂固自完善殆唐人臨寫近似故其書剞劂逕出法度外有可䝿者崇寧三年四月十七日書官帖後告誓文告誓文今入晉書傳中昔逸少為王懐祖檄也當時以不能堪摘細事遂脱幘自投朝廷以其誓苦故不强起以官夫廹之陿地不能自適其情其誓固陋也開元中此書得於潤州瓦官講堂鴟尾其書一字為數體一體别成㸃畫不可一概求之如字有横顯異行法變草未嘗復出實天下竒作也李延業獻之岐王十二年復出岐王宅被焚則宜世不得傳矣今碑字刻畫過于嚴重無復前法似是唐經手搨摹以傳陶宏景論書謂逸少自呉興前書猶未為稱凡厥存蹟皆是永和十許年中自失郡告靈不仕後略不復自書然告誓文已出當時知鴟尾得者别本也貞觀書目已列告誓文武平一嘗見于小函同樂毅論黄庭經共藏便知此本不一傳摹相承不能辨其真贗也蘭亭序蘭亭序在唐貞觀中舊有二本其一入昭陵其一當神龍中太平公主借出搨摹遂亡其一温韜發諸陵蘭亭復出太宗朝留神書學嘗出使購求藝文諸書當時已無蘭亭矣仁祖復尚書篆求于四方時關中得蘭亭墨書入録字畫不逮逸少他書其後祕閤用此刻石為後法帖今諸處蘭亭本至有十數惟定州舊石為勝此書雖知皆唐人臨搨然亦自有佳致若㸃畫挍量固有勝劣惟彷像得真為最佳也成都蘭亭寳月刻蘭亭序東坡居士為讃于後葢子由得于中山舊石故今所摹獨傳二蜀中州人或未知也余觀世所傳蘭亭書雖衆其搨摹皆出一人行筆時有異處繋當時摹書工拙惟祕閤墨書稍異更無氣象可求知後人所為不足尚也貞觀中詔令湯普徹搨蘭亭賜梁公八人而普徹亦竊搨出外以傳其書衆播普徹自能書識逸少筆意故雖摹搨自到極處逮褚河南歐陽率更臨蘭亭則自出家法不復随㸃畫也蘭亭真本世不復知普徹典刑猶有存者今所傳皆本于此中山者葢其一也黄庭經世疑黄庭經非羲之書以傳考之知嘗書道徳經不言寫黄庭也李白謂黄庭換鵞其説誤矣然羲之自寫黄庭授子敬不為道士書此陶貞白曰逸少有名之蹟不過數首黄庭為第一貞白論書最精不應誤謬今世所傳石本筆畫反不逮逸少它書觀開元中陸元悌奉詔撿挍言右軍真行惟有黄庭告誓知非楷字矣天寳末又為張通儒盜去莫知所在廼知舊書不傳今所見者特後世重搨疉摹不得其真久矣蜀本黄庭筆墨麤工本皆非可䝿苐以其名存之别本黄庭經淇水吕先得黄庭經最為異者見使評之余謂今世所傳黄庭經多唐臨黄庭之亡乆矣後人安所取法以傳耶張懐瓘謂逸少佳蹟自永和後而黄庭經永和十二年書也字埶不聨翩而㸃畫多失雖摹搨相授有失其初若無勝概可存縱傳授有据亦何取哉吕先得石書署其年永嘉支離其字尤不近古其永字等頗效王氏變法皆永嘉所未有余是以知其非也又黄庭經别本夫求馬者必自其羣至授以騏驥之任則真馬出矣唐得漢魏晉隋間書多至七百卷於是以黄庭為第一方在衆書時豈無所異而可一概哉顧世未嘗衡挍而彈繩之則論有同異不足怪也至稽之法度而脗合宷之體裁而結宻索之神明而不竭者於是世知有驊騮矣此當時唐人得舊本摹入石者時見筆意與常見二本及今秘閤所存異甚知唐初選置能盡書矣畫贊畫賛世傳晉右将軍王羲之書考其筆墨蹊逕輒不類知後人為之託之逸少以傳也昔王濛子修嘗求書右軍王羲之為寫東方朔畫賛與之敬仁亡其母見平生所㤅内棺中故知此書不傳乆矣唐自貞觀購書逮開元􅊧訪亦既盡矣挍定大王書二卷黄庭第一畫賛第二告誓第三韋挺以畫賛是偽蹟夫畫賛已亡而更出者可知其為偽也今世所傳疑不在韋挺論中彼得存于貞觀而入録當亦有可亂真䖏今之傳者不能便入貞觀録也樂毅論樂毅論世無全文髙紳所藏石至海字止以史記挍之四纔得其一爾今世所傳又其摹于此者葢無取也觀梁武帝評書謂此論微麤健恐非真蹟陶𢎞景亦疑摹本梁去東晉六十年其書不存況今去梁後又數百載中間馮承素已見六本今世所傳亦莫能辨先天中太平敗後咸陽老姬投書竈下是宏景所評已亡矣後世存者可求其真耶全文樂毅論智永師謂樂毅論正書第一自梁世摹出其後蕭銑之流莫不臨學然則此論不傳於世矣陳文帝嘗賜始興王雖號筆力鮮媚殆其臨搨之功勝也祕閤購書則其論全文陶宏景言樂毅論乃極勁利而非用意處故頗有壊字今所得異矣元符中詔摹於石以其書挍之殆唐人所書不逮舊本然聖俞㤅之謂最奇小字者是也昔王沂公善書嘗求得全文乃自石未破時摹尤為精勁余從其家得之非今秘閤石可比方也别本樂毅論舊傳樂毅論誤書兩字以雌黄㸃正以今所傳挍於舊史異者葢二十八字其文意自不相妨葢書傳已乆不能無誤昔時於秦玢兵部家得别本樂毅論文字完整筆力差劣然挍今祕閤石本亦可上下相敵或疑王著之所書也髙紳樂毅論李庠舊得樂毅論其本乃髙紳所藏石過自矜持謂真逸少書沈存中亦謂得前人説逸少諸書多是縑紙惟樂毅論書於石世以此為据余竊疑其不知何从得此説也昔梁武帝􅊧采逸少至盡而樂毅論已出當時無石本傳者大抵逸少每為人書多以前人賦論見于世傳之存者如黄庭畫賛洛神賦皆書于紙以授雖修禊序亦不令入石也唐得晉魏諸家字書故嘗評黄庭第一畫賛次之樂毅論又其次也武平一曰太宗於右軍書特留賞蘭亭樂毅論尤聞寳重别一小函貯之太平公主私取樂毅論以歸及籍其藏咸陽嫗竊舉袖中投之竈下開元録書但有黄庭畫賛告誓而樂毅論亡矣貍骨帖貍骨方今官帖中定為晉右将軍王羲之書唐人謂此本荀輿治勞之方右将軍臨之至今謂貍骨帖梁武帝嘗以古書雜蹟二卷問于陶隠居對以貍骨方是子敬書亦似摹蹟在梁已疑其偽今定為右将軍書果何据邪雖然右軍嘗書此帖或子敬臨之亦不可知也逸少十七帖逸少自謂吾書比鍾繇當抗衡比張芝艸猶當鴈行後世論者或異其説至唐然後無異詞信謂其書定出鍾張右而来者不至有議庾肩吾以芝為工夫第一謂繇天然第一而逸少工夫不及張天然過之天然不及鍾工夫過之然嘗考之芝臨池學書池水盡墨繇卧畫穿被於工夫至盡不可謂後于逸少也今觀其書卓犖天成者葢逸少所能其謂積學而至者恐不得筆力妙處觀十七帖者當以是求之逸少八帖逸少於書自分今古至扵行艸逮永和間極扵功力矣故所書紫紙多是少年臨川時蹟至其中年競用麻紙葢欲其行筆流便屈折如意蔡邕自矜􅀎書非流紈體素不妄下筆故㸃畫無失書法入妙韋誕亦謂用張芝筆左伯紙任及墨兼此三具又得臣手然後可以建徑丈之𫝑方寸千言觀此益見古人於書葢不敢易而為之如此丹陽邵仲恭得逸少八帖經生所書也此當是唐人善書者為之然流暢晃朗埶若飛動得步武於王良猶有舞交衢之態者也畣庾元規帖逸少於書自謂真出鍾草出張後生雷同失其當處敬元謂古肥進之謂今痩書至痩硬似是逸少㢠絶古人處若更論埶巧形宻意疎字緩皆不足者也世傳謂羲之書初不勝庾翼郗愔及其莫年方妙嘗以章草畣庾亮而翼遺書曰張伯英章艸十紙過江顛狽遂乃亡矣常歎妙蹟永絶忽見足下畣家兄書煥若神明頓還舊觀羲之書法正自然功勝豈待積學而至哉議者不知書有天機自是性中一事而學習特求就法度規矩爾至于離方遁圜不守繩墨自作勝概謂非天得不可也但見􅁃翼此語便謂初不若翼愔不知此語何所憑籍而知其昔不逮二子耶硬黄世有持逸少出師帖作硬黄紙漬以靈脾水乆之色如茅屋漏汁紙色盡變以此為紫紙所書也林子中以兼金購之它日復有持虞伯施書蘭陵王進本其紙文色理與出師帖一等又購而藏之未嘗致詰也一日持来京師客疑其偽子中不信也大抵世人貴古而不考實一承人之妄至于終身信之不悟葢偽言先入則信言不得受也硬黄唐人本用以摹書唐又自有書經紙此雖相近實則不同惟硬厚者知非經紙也王右軍作書惟用張永乂製紙謂𦂳光澤麗便於行筆今人不考其實得硬黄紙便謂古人遺墨曾不若畫像先論縑素而後定世之逺近常得大略也許民自杭得逸少十二帖皆靈脾漬也使余評之民竟不信洛神賦逸少此賦當以為第一今無復存者但子敬所書猶傳疑未可以伯仲間論也謝安石嘗疑子敬不逮父書後世或謂不復可辨且曰外人那得知豈書法雖一藝彼亦自有至處恐非造其域者不能致論也此書摹傳失据更無神明㸃畫存爾非子敬書法盡此洛神賦别本今世所傳洛神賦余見已四本矣雖王和甫家者號最勝結字踈宻得法然不若此書亦自與周子發家者稍異子發謂子敬愛書洛神賦人間宜有數本似未見其餘也昔馬澄評右軍書謂勸進洛神賦諸書十餘種皆作今體知逸少嘗書此賦子敬當是習其家學爾然書録不記子敬洛神賦其傳之失實将後人摹搨不可知也字法端勁是書家所難偏旁自見不相映𢃄分有主客趣鄉整嚴非善書者不能也大觀元年正月為安希古書子敬雜帖子敬書如河間年少自不拘束此當行草中也宋孝武學書或真行章草雜在一紙或重作數字或學前軰名人能書者而子敬詩賦賛論亦入此書大似未能得子敬當處此可與論書法之至耶謝太傅善書不重子敬每作好書必謂被賞太傅輒題後以畣之嘗問子敬君書何如右軍曰故當勝安曰物論殊不爾子敬曰世人那得知此帖超軼陵突似欲出其家學宜諸人有逸氣過父者之語也子敬别帖鼂旡咎持宗子某所藏子敬三帖使余評之余謂子敬自少刻意書學似恐墜其家聲中年自造書妙乃父子名家不能涇渭世人故應異論也謝靈運直謂當勝右軍唐文皇謂如枯查餓𨽻不知當時何故立論如此人之好惡相異有至是邪子敬謂世人那得知似恐世有妄評者然非筆入三昧豈能扵此下轉語荘子曰自大視細不眀自細視大不盡今論中令父子者皆視大而不盡也又子敬别帖謝太傅㤅逸少不取子敬人之好尚各以所見後世論者便以此為据至過有詆訾豈知真子敬父子間邪且學本家法以意相授非入其閫域者定孰知之或為説曰天公問下方人何衣曰衣蠶一作蟲蠶若何曰喙類馬色邠邠類虎天公以為謾使下問還報乃信西方諸國聞漢人語蠶吐絲而衣亦以為欺也夫妄言者嘗託於無而人或以為有信言者每託於有而人或以為無人之誕信相欺何可勝辨邪後人觀子敬書知其立論者皆蠶説也必有得子敬意者然後可與辨此李庠示余别帖竊有感焉天下之迷於是非多矣何可計邪王中令帖晉書評子敬書謂筆力逺不及父而有媚趣逸少作大字壁間子敬墁之而更為明日視之逸少不能辨也若此則父子間本無分處縱復有異豈應其論至此也當文皇評書便以子敬無屈伸放縱豈知法度盡處乃可言筆墨縣解是不知曾求于此也晉史修于唐臣皆貞觀時人其論宜如此王敬和帖燕石入笥卞和長號玉石亦自有辨但知者既少則昧者衆矣真贗相眩則偽者常勝後有真者不復察也余觀王敬和帖而傷之仁廟時購法書于四方洽之書落簡揮毫有郢匠成風之埶其帖已具寳章集今入祕閤觀者不求真偽謂真晉人書也余嘗察其書此正唐所摹以畱御府者豈知世復有舊札遺紙存乎今觀李氏所收帖然後可以辨矣世反疑為臨家者是豈不使卞和長號也羊欣薄紹之帖羊敬元書出子敬不忘本分薄敬叔書後學犬令雖其纖圓骨力克成但乏神明爾然二者同出不能相逺豈書法果自有所至邪後世論欣書謂舉止羞澀謂紹之書功力不足皆失其實也當在南朝時買王得羊不失所望謂紹之駕友凌師豈偶然者耶張懐瓘謂薄紹之羊欣王僧䖍康昕王右軍亦欲混其臭味是以二王帖中多有偽蹟觀此帖其有所稽矣唐貞觀中欣書得正行纔二十餘紙紹之行書四紙僅存不知此帖在唐録中為第㡬紙今世藏書家類無二人書此其可祕也鄧乂碑鄧乂碑集古録謂考其事績則鄧艾碑也夫艾乂同音葢名乂而音為艾字後世音讀既誤遂相傳如此酈善長曰濮陽城南有魏使持節征西将軍太尉方城侯鄧乂廟廟尚有乂碑秦建元十二年廣武将軍兖州刺史關内侯安定彭超立當後秦去魏晉不逺宜相傳可考至其後世音失其讀則幷與其字而移矣然則書文之失其得一二而正邪銅鼓銘陳叔夏得銅鼔甚大其餙為蚩尤飛廉塗善金而光耀至今不滅其銘曰龍昇元年七月大匠渙按龍昇為大夏年紀而鼓全似西南夷所作今秘閣猶有但其形製小劣無塗金為餙又其文為戲龜水艸與此異也崔鴻十六國書䓇連勃勃以銅為大鼓及飛廉翁仲銅駝龍虎以黄金餙之列扵宫殿之前疑即此也廬陵王銘世傳宗資文謂古無是而豐碑本以下繂其説信也嘗考呉均齊春秋王儉謂石碑不出禮典起宋元嘉顔延之為王琳碑石又考杜叔廉書儀則謂碑石自魏司徒繆襲改墓刻石以識因以述其徳行昔顔之推論碑銘皆不及此乃知不顯著于書者或不得盡考也嘗見南朝得王戎墓銘凡數百言其首書晋司徒尚書令安豐元公之銘其後張率得威斗何承天以為必甄豐求其説得石具如承天説然其制已備於漢豈特魏晉間耶蔡邕銘論曰碑在宗廟兩階之間近代已来咸銘于碑余見邕之為靈墓硬碑便知諸人論之不詳皆不足信于世廬陵王碑叙述惟謹微覺煩碎然書畫簡古爲足貴也定鼎碑古圗經稱定鼎碑在懐州衙署其題曰御射之碑以其文有定鼎遷都之十載故自昔其名如此不知定鼎遷都在孝文世而偶以文見之然字畫有法獨異于當時人所書亦見襲中國文物所致而夷俗汙陋漸革也魏書景眀三年九月丁巳車駕幸鄴戊寅閲武扵鄴南十月庚子帝親射逺及一里五十歩羣臣勒銘扵射所甲辰車駕還宫今碑所書年月與史相合然自戊寅逮庚子為廿一日則自鄴至懐而還京師可以考次也不言幸懐溫等處自是可略然既書親射勒銘不書其地乃繼文扵上似御射當在鄴南然則此不當略也北海王詳髙祖南伐自洛北廵詳常與侍中彭城王竝在輿輦陪侍左右至髙宗射之所髙宗停駕詔諸弟及侍臣皆試射逺近唯詳箭不及髙宗箭所十餘步髙宗嘉之拊掌欣笑遂詔勒銘瘞鶴銘華陽真逸撰上皇山樵闕一本有書字鶴壽不知其紀也壬辰嵗得於華闕一字當為亭甲午嵗化於朱方天其未遂吾翔闕一字當為寥廓耶奚奪闕一字仙鶴之􅃍也廼褁以𤣥黄之幣藏乎兹山之下仙家無闕四字我竹此字不完故立石旌其事篆銘不朽詞曰相此胎􅨛浮邱闕二字余欲無言爾闕五字當有靁門二字去鼓闕一字當為子表畱闕二字當為形義唯髣髴事亦微㝠爾将何之解化闕五字入此字不完又闕一字惟寧後蕩洪流前固重扄右此六字不完又闕八字華亭爰集真侣瘞爾闕四字或但止于此未可知也丹陽真宰此四字不知其次瘞鶴銘今存于焦山及寳墨亭者葢書於此凡文字句語讀之可識及㸃畫之僅存者百三十餘言而所亡失幾五十字計其完書畫葢九行行之全者率二十五字而首尾不預焉熙寧三年春予與汾陽郭逢原公域范陽張褘子偉索其逸遺於焦山之陰偶得十二字於亂石中表畱惟寧十字完餘二字譌缺石甚迫隘偃卧其下然後可讀故昔人未之見而世不傳其後又有丹陽外仙江陰真宰八字與華陽真逸上皇山樵為侣似是真侣之號今取其可考者次序之如此其間闕文雖多如華亭寥廓之類亦可以意讀也二月一日南陽張􅘏子厚記瘞鶴銘鶴壽不知其紀壬辰嵗得於華亭甲午嵗化於朱方天其未遂吾翔寥廓也耶奚奪余仙鶴之遽也廼褁以元黄之幣藏之兹山之下故立石旌事篆銘不朽詞曰相此胎禽仙家之真山陰降蹟華表畱名真惟彷彿事亦微㝠西竹法里宰耳嵗辰鳴語觧化浮邱去莘左取曹國右割荆門後蕩洪流前固重扄我欲無言爾也何明爰集真侣瘞爾作銘宜直示之惟将進寧丹陽僊尉江陰真宰立石書瘞鶴銘後瘞鶴銘在潤州焦山下初刻于崖石乆而崩摧覆壓掩沒故不復得其全文余嘗怪唐人尚書學而此名字特竒偉宜世賞㤅而卒不見傳於人自張懐瓘張愛賔徐浩論書備有古今字法亦不見録考其嵗月雖不可得然此山之摧裂圯垝莫知何時而是書壓覆其下知其刻已久但𨼆沒石間自昔或未知之然其刻畫亦幸至今尚完歐陽文忠公以舊記稱王羲之書為非又疑顧況自號華陽真逸謂此書類顔太師沈存中直謂顧况所書如何而碑書篆者上皇山樵也則謂況書不可也往時邵興宗考次其文闕四十二字而六字不完又有六字不知其次其後張􅘏自力求之摹兩山間其闕字三十有五不完者七而又别求十二字與興宗不同昔刁景純就金山經庋中得唐人於經後書瘞鶴文以挍興宗子厚其字錯雜失序多矣宜直示之惟将進寧則不可究令竝列序之来者可以考矣文忠集古録謂得六百字今以石挍之為行凡十行為字廿五安得字至六百疑書之誤也余扵崖上又得唐人詩詩在貞觀中已刻銘後則銘之刻非顧況時可知集古録豈又幷詩繫之耶書黄學士瘞鶴銘後黄伯思學士以瘞鶴銘示余世謂晉右軍将軍王逸少書歐陽公疑華陽居士顧況道號然逸少逋翁其書可見不與此類嘗考次其年羲之生晉惠帝大安二年癸亥嵗至穆帝升平五年辛酉嵗卒當五十九年而成帝咸和九年太嵗在甲午逸少當三十二嵗逮四十八年辛亥始去會稽其時未嘗至朱方華陽又非其郡邑所望不得以此為稱顧況卒扵貞元末當元和七年為壬辰九年為甲午良不及也上推壬辰嵗為天寳十一載況當兒穉其號華陽乎葢自貞元以後皆不合扵此昔陶𢎞景嘗以其居華陽觀故自號華陽𨼆居貞白平時著書不稱建元直以甲子紀其嵗今曰壬辰嵗得之山陰甲午嵗葬扵朱方壬辰當天監十一年甲午則其十三年也隠居以天監七年逰海岳住會稽来永嘉至十年還茅山十二年弟子周子良仙去貞白作傳即十一年在華陽此其可知也或曰茅山碑前一行貞白自書與今銘甚異則不得為陶𨼆居所書然華陽真逸特其撰銘若其書者上皇山樵也四人各以其號自别固不得識其姓名疑皆𨼆君子也然其書在江巖石壁摹搨最難又石摧壓其上人不得至風雨雪霜不及故字畫至今尚完或疑梁以書傳逮六百年不應如新刻于石余求銘後王瓉書葢自貞觀至今亦無譌缺貞觀去梁未乆可考而知也蕭子雲别帖今世所傳蕭子雲書或見之碑轉相拓搨刻深畫重去真逺矣雖況以春蚓秋蛇人不謂過也麗正所藏葢自唐貞觀入録後散亡民間張河東初購得之五代入江南李氏江南平始還内府今視其書與世間所聞異矣勁特挺㧞更無後世俗態筆蹟健痩縈絲索鐵屈折盡妙不露筋絡求扵纖痩濃淡未嘗有遺恨也昔傳子雲作筆而心用胎髪故得纖細不失或疑非兎翰不足稱勁是不然豐狐之柱路扈嘗用之但不知胎毛非壮髪不知可用以作筆此余未之考也烏丸僧修志李調示余烏丸僧修石志曰僧修太原祁人周王之子因以建族父神念仕魏以䜛歸梁封南城壮侯又曰僧修仕文徳圭師雝府臨邉為岳陽王中兵參軍府王稱帝進開府持節荆州刺史義成郡公及執贄来朝奉璋謁帝天子以公世仕魏朝戮力梁國有命加禮異賜以强族授使持節驃騎大将軍出牧溫部方欲馳劍騎于稽秦耀樓船於淮泗天不予年此其所終始余考之烏丸本北部大姓神元世氏改為桓附入族官大統十五年文帝寳炬雖詔天和改姓者復舊然桓氏非神元所命知未嘗復也按梁書王神念太原祁人据頴川歸梁魏軍至與家屬渡江封南城縣侯其後諡曰壮神念死子僧辨以兵興梁胙荆州然則烏丸在梁為王氏而壮侯葢神念謚也今考梁書南史太清記周書皆不録僧修事其在神念僧辨傳史亦不稱僧修史家之闕如此其為壯矦則又誤矣梁元帝封湘東王太清元年持節荆雝九州然志謂雝府即世祖也諸書亦不録世祖為岳陽王至江陵陷而僧修入周其曰奉璋謁帝則周武也僧修賜氏烏丸葢非魏舊姓今姓皆不著烏丸别姓然誤謬相襲其可勝考邪或曰周天和六年其後為建徳今志乃書七年三月堋于武鄉何也余以長歴推之天和七年太嵗直辛卯其三月癸卯朔則丙午者四日也其月丙辰改元建徳葢十四日矣葬之十日改元志與史不差可得据也智永千字智永書梁所搨集千字至八百本江淮諸寺各畱其一至唐而見扵時者雖衆然真偽竝出藏書者已病其難得也觀右軍書託永和世謂黙符聖典有鄉背之宜而智永取名謂潜印元蹤盡其家法故側勒弩踢䇿掠啄磔雖盡其法度而縦擒緩急自出法度外若泰豆之御進復履繩旋曲中規取道致逺氣力有餘此豈可求於書儈畫販而論真偽耶千字其初本得右軍遺書梁武世嘗令殷鐵石搨一千字毎字一紙雜碎無序因命周興嗣次為韻語當其成時一夕鬚鬢盡白謂心力極于此書當時甚重其書詔令蕭子雲寫進而後世以書名者率作千字以謂體制盡備可以見其筆力然非書得成法者亦不能盡工也楊文公謂勅當為梁字本後人作草書筆畫轉移誤爾陳時朝廷命令未加敕字其説誠然知為字謬也張龍公碑舊見經序説梁武帝夫人郗氏或疑其事余考於書傳因龍天主祠得之謂郗氏性妬忌武帝受齊國未册命忿懟投死殿井衆趣救之已化毒龍烟煽焰衝人莫敢近遂為龍天主祠此尤增異而懺疏所説葢可信豈變滅起伏因心以感者果有耶惟懺言因經報得還人天道而此祠廼歴陳隋奉之雖居徙不常而嚴麗崇飭祈禱致禮每輙得應此又不可知也隋大業中即其地造龍宫寺沙門法濟住祠中時為神所降著衣鼓舞都不自覺然人化為龍與化虎熊果有異哉今得趙耕碑序路斯化龍祈求得應或可信也今人疑路斯非名當上元中波斯王有卑路斯来唐世因以為名者多矣豈獨此哉隆聖道場碑髙陽郡隆聖道場碑隋祕書郎虞世南撰次書石世南以書名隋唐間此碑最顯世競以摹本傳今其碑在定州龍興寺或疑為摹本以髙陽之郡在中山郡也今考大業雜記九年閏月幸博陵昔為定州先皇歴試所基遂改為髙陽今世南謂大業龍集癸酉有詔改郡以記王業所興然則與雜記合矣夫釋老之敎行乎中國自漢晉以逮齊魏僧尼為寺道士女冠為觀隋改法雲慧日二道場金洞玉清二元壇貞觀十二年復寺觀舊名則當世南時隋謂道場必矣唐志言定州博陵本髙陽郡義寧元年析髙陽為恒州武徳四年以髙鄭博野􅁐為蒲州貞觀初以鄭髙陽歸瀛州天寳元年復以博陵郡為定州而國朝廼以瀛州為髙陽郡以定武之郡歸中山則地隨改矣其興廢因革如此知碑非後世所摹也廣川書跋卷六
