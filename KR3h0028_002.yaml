body:
  text: 廣川書跋卷二宋董逌著石鼓文辯世傳岐山周篆昔謂獵碣以形製考之鼓也三代之制文徳書於彞鼎武事刻於鉦鼓征伐之勲於兵鉞其制度可考後世不知先王之典禮猶有存者鑿山刻石自是昭一時功績唐世諸儒以石鼓為無所据至謂田獵之碣盖未知古自有制也歐陽永叔疑此書不見於古唐廼得於韓愈韋應物以其文為疋頌亦恨不得在六經推大著説使學者肄業及之其驚潛動蟄金繩鐵索特以其書畫傳爾顧未暇掎摭其文􅍌之部類中後世得考詳方唐之時其文隐顯未盡缺落徴詞索事或可得之而愈應物徒知挍獵受朝宣暢威靈憺讋夷夏故愈謂此為宣王時應物以其本出岐周故為文王鼓當時文已不辯故論各異出也嘗考于書田獵雖嵗行之至于天子大蒐徴㑹諸侯施大命令則非常事也故四王二公後世以為絶典然則宣王蒐于岐山不得無所書或史失之其在諸侯國當各有記矣不應遂使後世無傳此其可疑也當漢之時見號竒字如甄豐輩定作史籀書竇䝉以為宣王獵碣而曰我車既攻我馬既同張懐瓘以此本車攻詩因考合前説且曰諷畋獵之所作也愈應物其書藉之則有据矣然為諷為美其知不得全於文義見也傳曰成有岐陽之蒐杜預謂還歸自奄乃大蒐于岐陽然則此當岐周則成王時矣方楚合諸侯求大蒐禮者不知宣王嘗狩於岐山以合諸侯況小疋所美其地本東都又選車徒無大號令則不得為盛節古者詩書不嫌同文其据以此便謂宣王未可信也吕氏紀曰蒼頡造大篆後世知有科斗書則謂篆為籀漢制八書有大篆又有籀書張懐瓘以柱下史始變古文或同或異謂之為篆而籀文盖以其名自著宣王世史所作也如此論者是大篆又與籀異則不得以定為史籀所書叔向曰昔成王盟諸侯于岐陽楚為荆蠻置茅蕝當時以為重禮故後世不得泯没宣王蒐岐陽世遂無聞哉方成康與穆賦頌鍾鼎之銘皆番吾之迹然則岐陽惟成王大會諸侯則此為番吾可知書言成湯狩于亳故後世有亳亭宣王狩于敖其在地記則著敖亭詩曰選徒于敖其事可以考矣周書記年於蒐狩之大皆書則合諸侯而朌大命亦一見於成王此其可信也昔人嘗怪自漢以往好竒者不道此書廼不得秦文若者猶得人入録藏之當漢號史書以刻畫竒崛盖亦不得盡其文則其不見道固宜獨怪愈於唐中世得之乃謂勒勳以告萬世又恨聖人於詩不得見之石鼓之譌自杜甫尚歎不知愈何以知其意謂編詩有遺也或曰此成王時詩則頌聲所存聖人不應去之果有豈不知邪曰轡之柔矣作洛皇門此周公作也詩書不得盡見將一時所訓非理亂所繫不足施後世者不得著也其因後代亡之亦未可知也曰子信為成王頌何前世未有考者則其説使人盡得信乎曰蒐于岐陽書傳再見而車攻之獵詩以為敖此可謂無所据乎此余考於古而知之世亦安得異吾説者知考古而索其事自當有所得爾不待此以傳也毛伯敦銘龔伯宗器其子􅌏所作也􅌏以功受天子命服赤芾彤冕黄裳鑾旂則作彞器以奉宗廟因以載其寵靈可以求其禮也皇祐中長安民得於渭上銘曰毛伯内門立中庭右祝􅌏王呼内史冊命􅌏王曰􅌏昔先王既命汝作邑今惟亂商乃命錫劉原父以毛伯為毛尗鄭歐陽永尗書以為据楊南仲吕大臨以鄭為􅌏説文弁作因以為證古字繁省雖不可盡考然鄭則從奠不應至此而弁不從臼其文異甚不知何以信之許慎顧野王書有􅀈等字吕忱謂􅀈為周大夫名為畿内地名惟名不可以字義知之而地邑或以為名亦不可知然則吕忱獨以􅀈為周人名者恐或自得有据傳曰原伯毛伯文王之子原毛之後世為王臣仍為伯爵或本封絶滅食采畿内故以采邑稱春秋時毛伯錫魯文公命説者文王子封為畿外之國考其時諸侯無毛國而毛叔仍文王子其受封在滅商後今曰皇考龔伯則非毛伯鄭矣周之制食采畿内者皆以地著姓則毛伯亦其食采於毛者不必以毛國尚存而號於王畿也銘曰乃惟商亂知周之冊也周之商亂其在成王世三監之變矣然此時毛伯國未絶故知非以存其本號者然赤芾鑾旂本以錫命諸侯至于畿内之伯得以為寵者知為王之加賜者也魯公尊彞銘古篆魯旅同文劉炫謂有文在手為魯疑不得若此其後得古文字傳模既失又改為字李陽冰以文當如盖為魯也祕閣有銅尊銘作公諸儒不能考定或以為鬯者非也以古文考之其書以鹵為魯在漢猶然其作者盖古者簡質其省文亦自有据宜世不得而知學者每謂諸侯不得祭天子而魯獨用天子禮樂二戴為書謂其説可信至于非二王後而得稱公此周之所以崇魯也故魯公拜後不以為過盖自周公時伯禽稱魯公矣今考此銘合於禮書其尊彞則自有制也龔伯尊彞銘龔伯尊彞臨江劉原父得於長安制形類敦而大其重若干其容若干附耳為竒獸口圜上周以囘文下畫為雲氣以禮考之罍也用之廟獻其上􅍌尊彞故刻銘以此彞尊自是二物有彞則有舟有尊則有罍其制如此􅺦之之制宗器自宜有序則彞尊罍以次􅍌矣其銘曰彞尊舉其大也傳曰彞卣罍器也又曰彞為上尊卣為中罍為下形如壺大受一斛但此器亡其尊彞惟罍存爾考于禮書犧象著壺大山此尊也鷄鳥斝黄虎蜼此彞也若罍則一矣其制皆為雲靁狀其上飾以囘下飾以雲囘為古文靁字故以鷄彞盛明水以鳥彞盛鬱鬯以犧尊盛醴齊宗廟七獻二祼為奠不㱃朝踐尸㱃五獻卿即天子與上公同九獻二祼為奠則尸㱃七可以獻諸臣故子男則五獻是尸㱃三可以獻卿大夫士三獻無二祼直有酳音印尸三獻故王酳尸因朝踐之尊醴齊后酳尸用饋獻之尊盎齊其臣卑尸酢賔長即用罍尊禮曰廟堂之上罍尊在阼犧尊在西然則古人自以罍彞尊同名盖相序以成禮也古廷設罍諸臣所酢人君以黄金飾尊大二石金飾口耳其自諸侯卿大夫則無金飾也韓子曰罍大器天子以玉諸侯大夫皆以金士以梓其説雖異然今世所見惟銅則其説或可信龔伯尊彞考於禮則大夫制也其稱盖當作益公原父以為非諡所見且古文益作坎卦自隸書始變而今文或異然古諡音益為益自當以古文定也顧野王曰大也乙憲翻篆文􅺦與願同古文作醜自當從篆叔䜌鼎銘䜌音鑾叔䜌作鼎考其制形則宗器也銘曰二十有三年王在宗周王命叔䜌余考於書周既營成周以居商民而以王城為宗周卜宅土中復歸西周故周官曰王還在豐多方曰王在宗周其後十一世犬戎攻宗周而平王始遷故黍離閔宗周宫廟之廢周自是不復居宗周矣其曰王在宗周則知其在幽王之前可以考也史自共和前其世數最長而可知者穆王在位五十五年昭王雖不見居位嵗月然穆王五十受命改元則知昭王在位之年久也昭穆皆有二十三年則叔䜌作器盖在二王之世矣銘之所書有鼏彞尊鼎盖宗廟之器説者以木横貫鼎而舉之謂鼏然易之鼎象則為金鉉豈叔䜌之鼎以為金鼏者耶尊彞有六其器也則用本朝踐獻踐不可考也三代鼎彝有銘多矣而曰霝終者今見於此鼎之銘又曰霝始霝終古者以霝為善其文與今同此其謂善頌者也伯庶父尊敦銘劉原父得古敦其銘曰伯庶父作王姑舟姜尊敦世或疑舟為丹又以為井者其文可考朱􅀈集字舟為古文周字顧野王謂舟為周詩言舟人之子則周也古文不一其體減増上下隨其形異不能盡以㸃畫挍也如伯庶父伯郭父鼎上下二體文皆異也此猶可以參考至寧為丁丁為丅省文示意豈可盡求於㸃畫間耶庶父知為名矣以尊敦求其制其為有盖飾者豈庶臣得用哉知周無丹氏井氏􅍌于侯國者舟也齊在周為大國世與姬為媾以國聘者在名則為太姜少姜在諡則為文姜宣姜穆姜在國則為齊姜晉姜衛姜盖以國繫姓者不特諸侯之國其在大夫以采地著者猶得稱之然則其謂周姜者可以知也周之世諸侯無以周為諡者王畿周公則得號之其他非王子弟母妻則其君王后也伯庶父於書不可考然謂吾之姑者知其為姪矣禮有王父母無王姑其以大稱者或得號而兼之知伯庶父為齊子也或疑為王之姑者則以周為諡矣若王之姑姊妹則為姬氏或當以異姓為姑姊媦者又非周制也尊敦失其盖不知形制所本然文飾備盡至于揜也尊敦上分趾皆作獸形此其為有飾者也惟諸侯則得用之商洛鼎銘此鼎制甚大挍以今太府權量為斤若干其容若干銘曰惟十有四月既死霸王在下都雝公作尊鼎原父以丁為寧其説是也周既都洛而以成周為下宫所以異宗周也周古史考曰周公營作下都則今洛陽何休曰周成王所都也其曰十四月者蔡君謨嘗疑之此盖自王之即位通數其月爾或謂周之十四月為夏之二月元命苞曰夏以十三月為正故管子有十三月令人之魯二十四月魯梁之民歸齊二十八月莱莒之君請復之語如此自是古人書時不必月嗣君未改年以月數計之邢子才曰四十二月之科一依恒式彼自其君即位後以月為數其時則已再改年矣盖循用古制服制小傳盡書以月此正未成君之制故昔人謂時王未改年者其説得之盉銘伯王㪍子作寳盉其制異哉禮學未嘗考也昔許慎以盉為調味器顧野王直以盉為味陸法言以盉為調五味鑊盖自周官儀禮竄失本文後俗襲誤莫知所本也今考於書則以鑊為䥴而以䥴為瓽瓽為器盆之大者盌則小於盆而同制矣則盉不可謂鑊孫强亦以盉為大鑊又曰鑊大鼎也劉臻吕忱以䥴為大鍾皆非有據少牢饋食禮曰羮定雝人陳鼎五三鼎在羊鑊之西二鼎在豕鑊之西而禮經改盉為鑊則失其制久矣法言雖能辯其名而不知鑊非可用割烹則亦誤也古之饗祭爨在廟門之東故初陳鼎於盉西後陳鼎於阼階爨為竈盉即煮薦體之器也升食者自盉以受於鼎鼎陳阼階則薦食於上矣故實鼎曰脀音征實俎曰載肩臂臑謂之前體膊胳謂之後體正脡横脊謂之體薦短正代脅謂之體解故體各異盉盉别一鼎盉中肉孰各升於鼎故取於盉以實鼎取於鼎以實俎然後可以饗食可以薦孰禮之成也後世不知俎鼎之制雖具簠簋籩豆有事於祭祀有司庀事謹守舊文而器名物體皆不能辯則盉廢已久其名又改尚得求其制而用耶史伯碩父鼎銘史伯碩父鼎二至和元年虢州得之嘗命挍其權量所極并其形制圖焉其一髙尺有七寸八分深尺有一寸二分徑尺有六寸九分受一䄷二斗重若干其二髙尺有六寸五分深尺有八分徑一尺五寸八分其受一䄷重若干銘曰惟六年八月初吉己子史伯碩父追孝於朕皇考釐仲王母舟母尊鼎凡四十三字其六子刓缺不可識或謂支干相配五行無已子也余按商兄癸彞為丁子周戠敦作乙子其類甚多盖以剛日柔日相配而制器之日用剛則以柔配之用柔則亦以剛為配之五行之用然也戊已為土戊為土生巳為土滅剛日不用而以已配者盖用其剛必即柔以成之今術家猶然在甲子六年正月朔當辛未則八月一日朔當戊子然碩父正宣王時其曰史伯則史臣而位大夫者故得作宗器以薦祖廟班固以史伯為厲王世昔鄭桓公宣王司徒問國於司伯則不得為在厲王時矣今官庫有史潁鼎銘同其皇考舟母或以碩父為潁字者雖然必與其字為配至其作宗器於廟則不得以字著也潁或與碩父為兄弟此不可得知矣今鼎二以釐仲為皇考而以舟母為王母釐盖其王父則以舟為王母其周女也稱王父以皇考則周固有之矣古之為史者書傳直以名配之而不著姓此其世代不得考也然銘有用蘄綽綰眉夀或為説曰綰如祈天永命綽如垂裕後昆以其書考之恐不盡得其文古人於書直有不可意得者況以秦文考之耶弫仲寳匧銘古人制法其書已亡不可得考今惟幸其器時有存者可以察也京兆民得古器為銅方匣其大若干其深若干文飾繁縟世不能考以法數惟其銘曰弫仲作寳匣劉原父釋曰寳医医於禮為櫝凡所以盛弓弩矢也而方中矢字又不與古文合不知何据而言也今考篆文集字當作匧其書尚與篆合古文匧不從竹後人因之從竹者誤也小篆雖秦文然亦存古古文不廢其同者甚衆若匧從夹其文可以得矣惟方字為古文然小篆自不從竹其用竹者或體也世或疑箧未有範銅為之此猶以從竹為古之器矣嘗見諸書説金箱石箧無不備也延康中上黨抱犢山功曹李及於巗得書四十卷盛以金箱然箱箧以載而藏之為名用金用竹隨其所為也豈但盡用竹哉弫之忍翻訓曰弓强也余以自漢以後諸書考之集古以為張仲誤也弫仲寳医銘上方所藏旅簋至衆獨無旅簠吕氏考古圖所載備矣大抵皆簋也昔嘗考其銘竊有疑於此矣簠簋古人共用之器也雖廢棄已久不應獨存簋而無簠􅮒藏所得不應盡藏旅簋以故世不得其制禮家乃為一器但方圓異爾嘗見紀城得器方圓雖異大抵類桶惟盖為龜此古􅔆之制也大觀元年劉仲馮以其􅮒藏古器上之適余在館始盡模其銘併得原父釋考之其曰弫仲寳医原父固以為張仲所作器也􅔆又作医余按弫伯之器既曰匧矣今而則又以􅔆為医其説異也考其文方中作赤以古挍之則為􅔆與簠同其文古也後世禮學既廢簠簋之制尤失至以方圜論辨而不知天子諸侯卿大夫異制苟為傳誤襲謬方且守之不議何也杜嬬鋪禮器無鋪古者陳獸謂鋪以金飾物亦謂之鋪説者以其形制類豆疑古又有此器也余考簠從甫自古文如此然其以金為之或從金此不足怪也或曰簠稻粱器也漢之釋禮經方曰簠圜曰簋簠内圜外方簋内方外圜余竊疑漢人不知何所据耶古器存於今者簋不圜則簠不方可知矣今曰鋪尊則以簠為尊受飯為簠受飲為尊以受飯之制為飲之制器則其制固宜異矣方甗銘李氏甗無秝銘曰方鬳或疑其制余為考之古者謂鼎上下大小若䰝曰亦鬻器類甗古文作鬳今仲信父之銘則作甗知字有兼存古人用之不一其制矣紀有甗齊晉以為重器然其用不過行於饗食今舉國為重號於天下則必有異者將國君之器自異而紀侯之甗則又其尤異者也紀城敦銘紀城在齊之東古裂繻之國齊桓公既滅之矣崇寧元年民有得古器數十於城者惟敦之制異甚其大若盤可受今二斗二升者嘗考之鄭康成以敦為槃類賈公彦曰以木為之今世所得古敦制形大類鼎髙鬴甗乃知其説異也盟㑹玉敦當以玉為之不在飾也且祭祀之時有黍稷故以敦盛黍稷若合諸侯盟誓則不用黍稷矣故敦中盛血夫以銅為敦用以烹飪也則其制宜與鼎鼐類若以玉為敦則不可以爨矣當謂有待於盛血者是也然則其形制自當相類不然則不可以敦名也石鼓文􅏶我字下同車既工通攻􅏶馬既同􅏶車既好􅏶馬既鄭音寳郭云恐是籀文騊字君子􅀢􅀢古文員字邋邋良渉反通作獵員斿麀鹿速速君子之求薛作首鄭作酋郭云恐當作鹵弓薛作及弓趙本有此玆㠯古以字寺諸家皆作時􅏶敺特薛鄭皆作孫字來趩趩􅀢亦反􅞚􅞚許建反一本重此音義未詳石本有重文即􅏶今作敔與禁禦之禦同即時麀鹿趍趍陳知反薛作其來薛作首鄭云鹵亦作既施本無此字􅏶敺其樸其來䢱䢱趙本有此二字射一本作􅏶音敔禦同其􅀈音義未詳蜀右一薛作辛文鄭作丙文汧殹古也字又郭云讀如繫語助也沔沔鄭叶作綿籀作泛㞼郭云讀如蒸􅀈籀文皮字借作被音淖淵鄭音鰋鯉處鄭叶作居之君子籀文之魚從寸之澫澫鄭云即漫字㠯萬通作曼又通有􅀢所加反今作鯊其斿今作游􅂒􅂒薛作散鄭作􅀈相闗反帛古文泊字下同魚􅛼􅛼音洛薛作鱳其􅀢鄭云􅀢亦作􅀢讀與俎豆之俎同氐鮮黄帛其􅀈卑連反鄭作又􅀈又􅤺鄭云即鮊音白其􅀈乞及反鄭本作豆孔庶羉謨官反籀文臠字之􅀢若反􅀢􅀢籀文洋字鄭音汙今作澣􅂒􅂒鄭作博即遄字其魚佳通維下同可通何下同佳鱮佳鯉可㠯㯱符霄反之佳楊及桺右二薛作戊文鄭作甲文田車既安鋚郭云大么反音條勒駻駻一作馬一作從既簡左驂旛旛右驂騝騝渠反􅏶㠯隮于邍古原字􅏶戈世􅀈鄭作􅀈薛作􅀈籀文今作陸又趙本作止射宫車其寫讀如卸秀弓寺時射麋豖孔庶麀鹿雉兔又作有㫋鄭云今作紳奔鄭云作奔或作走大鄭本有直字在大字上古直字也出各亞施云汗簡作亞古孝經作惡薛作畀字鄭疑思字郭云恐是㚖字古老切大白澤也執而勿射庶䟏䟏即擊切鄭云與轢同君子廼石本作逌薛作廼郭鄭云逌今作攸樂右三薛作丙文鄭作丁文鑾車石本作説文作呼骨反薛作􅒧字鄭云拜字敕眞鄭云即塡亦作鎭弓孔碩彤矢諸本作四馬其寫六轡驁驁鄭云五到反讀若遇諸家竝闕一字無重文􅞁諸家作徒􅀈鄭作馭孔庶薛作廓􅀢古宣字摶摶􅀢鄭云即字車載􅀈籀文道字徒如章邍溼通作隰陰陽􅢷􅢷七走反即趣字六馬射之籀文族字鄭云借作鏃字􅂒今作徐如虎獸麀諸本作鹿如多賢迧鄭云今作狥禽􅏶兔薛作鹿一作㲋允異右四薛作丁文鄭作戊文言䇿命諸臣天一本無此天字有􅀢􅀢二字霝雨􅀈今省作流迄湧盄止遥反一作盈㴕鄭云今作潗私列反鄭作滋郭云濕君子即涉􅀈汧殹也洎洎淒淒舫舟鹵薛作恁或作由䢜鄭云即歸字或作􅂒自薛郭作廓鄭籀文作鄠徒􅀈湯湯佳通維舟㠯􅀈或陰或陽极其輒反鄭云即楫字薛作枝㴱㠯戶一本無此于水一方勿止其奔其敔鄭云今作禦其古文事字右五薛作壬文鄭作辛文言漁狩而歸猷乍籀文通乍邍乍即導字遄我􅀈鄭作洽字除帥􅀈被􅧦音序郭作阪薛作音莽郭云恐是䒪居虯反鄭本作今省作莫為卅石本作卋施云卅三十也蘇合反非世字也里微薛作鄭云未詳音義一本無此重文逌薛作廼鄭云逌作攸薛作罟鄭云亦作古㮚字柞棫其㮽􅀈讀作皓方老反薛作格字􅀢􅀢薛作庸鄭云未詳音義鳴亞箬薛郭作籀文若字鄭作箬薛作華鄭云亦􅒧爲所斿薛作憂鄭云今作䕫籃郭作􅀢云籀文盩字今省􅀢樹􅀢薛鄭音合鄭云疑即畣字音響又模本下有孫字非右六薛作庚文鄭作乙文言除道而師弓矢孔鄭本有此三字庶左驂此字鄭本有滔滔是説文古熾字與此相類不具奪薛本有􅀈字闕音後具肝薛作肝鄭作旴音吁來其寫矢石本作災薛作尖鄭作矢具來樂天子施云鄭本子下有來字嗣王始古我來右七薛作甲文鄭作壬文􅀈被走䮺䮺鄭音劑馬鄭云今省作薦晢若石本作薛作奔鄭云即若字古諾字從此施云説文與微同薛作放音非也雉立其一之施云宿二本下皆有止字按此本作之字右八薛作己文鄭作庚文施云此鼓最磨烕僅存十三字不復成文􅏶水導既平既止喜薛作嘉樹􅋿則里天子永寍寧日佳維丙申􅏶其用馬既申敕肅肅施本作康康駕左驂䮯䮯五到反􅀈􅀈鄭音遫扯子一反鄭云疑即撻字女通汝不郭云籀文翰从飛鄭音同薛作霧郭云恐是籀文霾字公謂天余及如周石本作施云害字鄭云周今省作周不余及右九薛作乙文鄭作癸文言除道吳通作虞人􅀢亦作憐亟即亟字朝石本作勒薛作敕字鄭云即朝字夕敬載即西字載北勿奄勿伏薛作戊字鄭作仗字鄭云即嵒字或云即畢字而出薛作獻字鄭作狩字用大祝薛作髙字鄭云今作享埶薛作執説文執與藝同鄭云亦作社寍寧同逢孔囿籀文囿字麀鹿舊本鹿字在上麌麌􅏶其麀鹿鄭云即疃字天别本作大求又是右十薛作癸文鄭作己文廣川書跋卷二
