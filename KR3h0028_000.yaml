body:
  text: 廣川書跋目録藝術類一書畫之屬卷一父乙尊彞虞蜼敦虞罍尊夏伯作父丁寶尊彞銘商仲作辛鼎銘商貍首豆商著尊商圜觚商象觚一柱爵牛鼎二方鼎古豆螭足豆犧尊著尊虎彞周蜼彞周罍洗周烏鍾周雲靁鍾周古盤銘叔郭父簋銘伯考父簋銘伯􅝪父銘旅匜銘鬻簋銘尊鼎銘卷二石鼓文辨文附後毛伯敦周成王魯尊彞銘伯禽龔伯尊彞銘周叔䜌鼎銘周昭王伯庶父尊敦銘周商洛鼎銘周成王盉銘周制史伯碩父鼎銘周宣王弫仲寶篋銘弫仲寶醫銘杜嬬鋪方甗銘紀城敦銘卷三周薑敦銘晉薑鼎銘孔文父飲鼎銘大夫始鼎銘宋公䪫鍾銘宋平公宋君夫人餗釬鼎宋餗鼎銘宋景公宋公寶簋銘卭仲頮盤銘周周舉鼎銘晉平公癸舉器亶甲觚齊豆銘蠆鼎齊子尾甘鼎齊欒氏王子吳飲􅢪寶和鍾銘虢州古鍾銘景鍾銘銅敦銘臨淄戟銘延陵墓字佳城銘卷四秦公敦銘大公寶缶銘秦和鍾銘詛楚文秦權銘秦銘嶧山銘泰山篆金人銘程邈篆書卷五古鎗銘谷口銅筒銘漢甘露元年成都石室銘闕文公學生題闕權銘王莽素洗雙魚洗列錢洗章帝書窆石銘永建六年韓明府碑元夀樊常侍碑延熹元年孫叔敖碑延熹三年泰山都尉孔宙碑延熹四年西嶽華山碑延熹四年郙閣頌建寧四年慶都碑蔡雍石經熹平四年石經尚書石經論語朱龜碑光和六年小黃門護敏碑中平四年周公禮殿記初平五年四皓神坐君子公昉碑天祿辟邪字楊震碑並隂光祿劉曜碑橋太尉碑卷六鍾繇賀表建安二十四年皇象隸字吳七賢帖别本七賢帖司馬整碑晉太始四年太公碑月儀帖告誓文永和蘭亭敘成都蘭亭敘黃庭經三畫贊樂毅論全文樂毅論别本樂毅論髙紳樂毅論貍骨帖逸少十七帖逸少八帖畣庾元規帖硬黃洛神賦洛神賦别本子敬雜帖子敬别帖王中令帖王敬别帖二羊欣薄紹之帖鄧乂碑後秦建元十二年銅鼓銘盧陵王銘志寶鼎碑後魏瘞鶴銘梁蕭子雲别帖烏丸僧修志梁智永千文陳張龍公碑隋隆聖道場碑大業元年卷七砥柱銘貞觀醴泉銘歐陽詢帖虞世南别帖薛稷雜碑李衛公書褚河南聖教序永徽遂良帖辨法師碑顯慶碧落碑咸亨元年别本碧落碑歐陽通碑歐陽通别帖智乘院碑咸亨四年崔敬嗣墓志長安三年陳昭題名開元六公詠御史精舍碑開元盧舍那碑開元尉遲回碑開元李太白藁張旭千字張長史草書張長史别本郎官石柱記張友正草字崇徽公主手痕碑大歷卷八魯公祭姪文乾元磨崖碑大歷放生池碑大歷王密碑摹畫贊新驛記李陽冰篆千字琴銘徐浩寶林寺詩徐浩開河銘徐浩題經懷素七帖懷素别帖懷素洪州詩北亭草筆髙間千字遺教經鑄鼎原銘貞元隂真人詩貞元李翺題名貞元桐柏廟碑撫州六詠絳守居園池記長慶園池記别本隂符經序開成金剛經會昌武昌詩衡州門記大中趙璘登科記大中于範書唐經生字盩厔尉題名津陽亭記卷九劉統軍碑元和又别本田宏正家廟碑元和徐偃王碑元和平淮西碑元和羅池廟碑長慶為李文叔書為陳中玉書並羅池碑黃陵廟碑長慶為王持國書黃陵碑李干墓孔戣長慶處州孔子廟碑咸通卷十同光四年宣李後主蚌帖李主集賢院書為張潛夫書官法帖為方子正書帖石曼卿書晝錦堂記萊公事顔泉記寶章集元符二年刻為邵仲恭書寶章集僧伽傳魯直作烏絲欄書臣等謹案廣川書跋十卷宋董逌撰逌字彥逺東平人題曰廣川從郡望也逌政和中官徽猷閣待制王明清玉照新志載宋齊愈獄牘稱司業董逌在坐則靖康末尚官司業矣丁特起孤臣泣血録並記其受張邦昌偽命為之撫慰太學諸生事其人蓋不足道者然其書畫賞鑒則至今推之是編皆古器欵識及漢唐以來碑帖末亦附宋人數帖論斷考證皆極精審其據左傳成有岐陽之搜定石鼓文為成王作雖未必確而説亦甚辨然能知孫叔敖碑不可信而滕公石槨銘乃信博物志西京雜記之語又如以紀為裂繻之國不知其是卿非侯以忩中列逺岫為謝靈運詩不知其為謝眺亦多疏舛要不害其鑒别之精也乾隆四十二年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀廣川書跋目録廣川書跋原序弅家自上世以來廣畜異書多有前人真迹先君生而穎悟刻苦務學博極羣書討究詳閲必探本原三代而上鍾磬鼎彞既多有之其欵識在祕府若好事之家必宛轉求訪得之而後已前代石刻在逺方若深山窮谷河心水濵者亦托人傳撫墨本知識之家與先君相遇必悉示所藏祈别真贋訂證源流若書畫題跋若事干治道必反覆詳盡兾助教化其本禮法可為世範者必加顯異以垂模楷或涉同異事出疑似者必旁證他書使昭然易見探古人用意之精巧偽不能惑察良工之所能臨摹不能亂爰自南渡鄉關隔絶先世所藏莫知在亡或已散逸過江隨行所攜敗於兵火今所存得於煨燼之餘年來為裒集在者得書跋釐為十卷畫跋六卷繕寫藏諸家廟别録以示子孫俾知先君博物洽聞古今鮮儷無墜家訓庶或師範其萬一焉爾紹興丁丑嵗十月丙辰男弅謹序
