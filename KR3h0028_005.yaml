body:
  text: 廣川書跋卷五宋董逌著古鎗銘田仲方得古銅器於白馬河岸説者傳以為龍桮疑陵寢中器也宣和五年余来闗中與仲方㑹長安因示余龍桮考其制有首龍也其旁刻飾雜有花草蟲獸足分類巵其識曰互考之古字當讀為亞鎗盖古文尚書滄從鎗為倉古文從省如此漢制東宫給銅龍頭鎗則此器也其曰亞者鎗亦非一當有序而陳者昔人因火欲出銅鎗誤出熨斗乃曰鎗被燒失腳觀此便知鎗為有足器矣可以信也谷口銅筩銘大業三年三月改斗稱一依古法正用小斗小稱小尺以合於律吕度數銅筩銘曰谷口銅筩甘露元年十月計掾章平左馮翊府容十斗重四十斤劉原父以挍今權量容纔三斗重纔十四斤爾漢武以累黍定律至宣帝時權量寀矣考之於古其斛名曰律嘉量方尺而圜其外庣音挑旁九釐五豪羃百六十二寸其權銘曰律權石重四鈞同律度量衡劉徽以魏量挍之斛容九斗七升四合有竒則魏斛大於漢制梁陳以古升五升為斗周則以五升當官斗一升三合四勺矣一斗實重六斤十二兩公孫崈依漢志修稱尺與律權石等梁陳依之齊以古稱一斤八兩為斤隋氏不用律制但以古三升制為一升古三斤制為一斤傳曰魏齊斗稱於古二而為一周隋斗稱於古三而為一傳本論以大人同儀主事各二人為隷古盖當時筆畫可以貴也方時嘗遣儁士張叔等十八人東詣博士受七經還以教授至武帝皆徴入為王官按叔名寛世稱之七車張任博士作春秋章句十五萬言今於題名可考知蜀學比齊魯自文翁倡之余每升其堂考其題名裵囘歎仰未嘗不移日也權銘銘曰律權石重四鈞同律度量衡有新氏造按漢志三十斤為鈞四鈞為石為斤一百二十故謂之權石五權之制以義立之以物鈞之其餘小大之差以輕重為宜圜而環令肉倍好者權與物鈞重萬一千五百二十銖當萬物數此元始定制也莽號新室權銘既著之矣方晉之末校尉王和掘得圜石其銘如是當時以為瑞參軍續咸曰王莽時物也故以是傳之不知所存有㡬而此銘盖一時所同制也素洗雙魚洗列錢洗政和元年饒州得素洗二雙魚洗六列錢洗一其四銘曰永元元年其二曰元和二年元和漢章帝之八年所改永元盖和帝即位之元也而洗飾以魚盖古之制如此其用錢文自漢為之盖以錢為泉其以類取也又有隠起篆富貴昌宜侯王字紀談以富貴昌為蜀昭烈鑄器之銘今紀年元和永元知漢之制也如此矣唐開元九年許昌唐祠得古銅尊隠起雙鯉篆書文曰宜子孫當時以為瑞應宣付史館考其器殆亦洗也唐世古器見者尚少故皆不得其名但見有足以承則皆謂之尊觀顯慶中得洗銘作長宜子孫當時不知為洗則宜開元以為尊也章帝書要録謂章草本漢章帝書也今官帖有海鹹河淡其書為後世章草宗其取名如此以書考之非也此書本章奏所用以便急速惟君長告令用之臣下則不得建初中杜伯度善草見稱於時章帝詔使草書上奏然則章奏用草寔自章帝時不可謂因章帝名書也元帝世史游作急就章解散隸體書之其後用於章奏爾蕭子良不知其初廼謂杜操始變字法謂之章草然伯度在史游後實二百年矣不可謂其書始於操也窆石銘元祐二年永城下得石如豐碑其上刻銘曰沛國臨濉時窆石室永建六年五月十五日太嵗在未所遭作大吉利時窆石室候来歸我有之按永建漢順帝即位之元其年為辛未則謂太嵗在未是也傳曰窆器豐碑之屬然古之制公室視豐碑三家視桓楹而周制及竁以度為邱隧共喪之窆器盖豐碑謂斲大木為碑形如石而窆為横木盖豐碑之上所以下紼其器不得同者古者君封以衡大夫以緘衡則以木横之棺傍緘則直以紼繫之不得以横木其上也鄭衆曰窆謂葬下棺也讀如氾祭之氾左氏謂之傰檀弓謂之封昔人謂其聲同也盖周漢之聲與今自異其事可得考之於此嘗謂墓之有銘在漢則杜鄴甄豐然樹之於外其後如繆襲輩刻官代納之壙中皆在永建後然刻銘墓中不知何時而於所見者永城窆石最先他銘志得之知其所由来遠也韓眀府碑漢韓眀府修孔子廟碑其文雖剝缺然可句讀得之眀府名勑字叔節歐陽永叔嘗謂書傳無以勑命名者秦制天子之命為勅漢用秦法當時豈臣下以勅自名者也考之字書勅字從束謂誡也王者出命令以誡正天下者也按韓眀府自名勑爾古者以勞賚為勑勑為賚音其文為徕别體當南齊時有劉勑為始興内史則古人名勑何世無之豈於此疑哉往時文嘉謨作縣樓架勅書於昌樂榜為敕書蜀中縣多作敕者説文敕自音䇿謂馬箠也㩽音竒謂木别生也嘉謨盖勛之子勛有書名不知㩽非勅字其子不能考古誤以為勅可不戒哉樊常侍碑漢常侍樊安碑安永夀四年二月卒其後勒碑序所厯官今碑在唐州湖陽安故湖陽人也桓帝永夀三年是為延熹之元實自四年六月以改則在二月故猶為永夀但立碑在後自宜以延熹為据也漢自延平故制壊矣中常侍黄門増舊三倍於永平又改璫黄金而貂右矣其勢傾天下觀東觀漢記書宦者盡敘其所承本系如孫程曹騰為唐叔振鐸後則史氏畏避不能直筆其於序事可得据耶今碑敘自中黄門遷小黄門又自此遷常侍或疑其制盖漢中世常侍千石小黄門六百石中黄門三百石中藏令六百石掌中幣帛金銀貨物其序自應如此蔡倫自小黄門遷常侍而中黄門非大功不得躐小黄門以進此可得考也漢又有中宫謁者書内從僕射謁者主報中章宦者漢制主中文書則左右史也此皆不屬少府而自為一職其制已極宜其能亂天下而卒以亡漢也孫叔敖碑楚相孫叔敖碑漢延熹三年五月二十八日立固始縣令叚君夢見因故祠架廟堂屋以存其後故列於斯又按叔敖相楚其事著於列子莊子左氏吕氏春秋賈子説苑等書太史公作史記不詳見而此碑當桓帝時能自敘列又多異聞疑當時自有書以傳可得据而成之今考史記優孟為叔敖衣冠抵掌談語其歌曰山居耕田苦難以得食起而為吏身貪鄙者餘財不顧恥辱身死家室富又恐受賕枉法為姦觸大辠身死而家滅貪吏安可為也念為㢘吏奉法守職竟死不取為非㢘吏安可為也楚相孫叔敖持㢘至死方今妻子窮困負薪而食不足為也於是莊王謝優孟召叔敖子封之寢邱至碑則曰叔敖病甚臨卒將無棺槨令其子曰優孟曽許千金貸吾孟楚之樂長與相君相善雖言千金實不貸也卒後數年莊王置酒以為樂優孟乃言孫君相楚之功即忼慨髙歌曰貪吏而可為而不可為㢘吏而可為而不可為貪吏而不可為者當時有汚名而可為者子孫以家成㢘吏而可為者當時有清名而不可為者子孫困窮衣褐而賣薪貪吏常苦富㢘吏常苦貧獨不見楚相孫叔敖㢘潔不受錢涕泣數行王心感動覺悟問孟孟具列對而求其子封於潘國下溼墝埆人所不貪遂封潘鄉潘鄉即固始碑史於文雖異其謂因困窮而後封者則同也昔叔敖曰楚人鬼而越人可常有者惟寢邱至其後猶子孫守之似不因其窮困而受封況寢邱自是叔敖所命於其子者子孫能守不廢又何至乞食優孟而後求封此地哉皆不可信也歐陽公嘗言非此碑不知叔敖名饒余求於書自漢安順後諸儒鄉霹虚造無所撿括竟為異説使學者竒偉所聞樂附從之如伏生為勝毛公為萇子賤為宓此皆西漢所不書也其應劭謂公羊為髙穀梁為赤阮孝緒以穀梁為俶沈以仲叔名貢此不得知也至不知其時則又妄論之矣何休以公羊漢初人糜信以穀梁當秦孝公時而西漢皆謂子夏門人如此者衆也不知何考之焉啖助曰西漢諸儒猶不能定其時代及名字而後代妄為記録此碑所謂叔敖名饒余於此則有疑焉泰山都尉孔宙碑漢泰山都尉孔宙碑延熹四年書其序舉孝㢘厯元城令泰山都尉此其所居官也曰躬忠恕以及人兼禹湯之辠已昔人謂漢世近古猶簡質如此以禹湯用之泰山都尉亦自不類謂辠已尤不得施於此也且宙之譱不過當引過自居不以予人然便為辠已亦於書何取漢世文物至東京衰陋已如此嘗怪三代文字之盛其見於鍾鼎簡册不入詩書尚多有之渾厚尊嚴如冠劒大人黼黻以朝坐清廟而走羣后使人仰俛有愧後之人拘廹自囚如餓隷羈虜左右望畏而愁歎喑嗚之氣鄉人悲咤又如宦豎宫妾寀諱忌之甚則俳諧如庸倡笑侮求説一時故皆不得逞夫熊牟射虎氣已貫金石矣其放矢復沓則意已避石故不能中也文章以氣為主君子養氣配道與義死生威武不得移之故其言深純渾厚放乎江海之津者使人望洋鄉若不得其涯涘也彼其肎低首求售顧一切忌諱牽攣自拘遑遑然求合而不得也詩稱文王克昌厥後其在武王眀發不寐其在書則曰無若商王受古人於文無忌如此其氣固已盖天下矣宜見者聳動吁可畏而歎也余讀屈原書以朕自況周秦六國間凡人相與言皆自臣也秦漢以後禁忌稍嚴文氣日益凋喪然猶未若後世之纎宻周細求人功辠於此也昔左氏書子皮即位叔向言罕樂得其國葉公作顧命楚漢之際為世本者用之潘岳奉其母稱萬夀以獻觴張永謂其父柩大行届道孫盛謂父登遐蕭恵開對劉成甚如慈㫖竟陵語顧憲之曰非君無以聞此徳音鮑照於始興王則謂不足宣贊聖㫖晉武詔山濤曰若居諒闇情在難奪夫顧命大行慈㫖諒闇徳音後世人臣不得用之其以朕自況與稱臣對客自漢已絶於此況後世多忌而得用耶顔之推曰古之文宏才逸氣體度風格去今人實逺但綴緝疏朴未為密緻耳今世音律諧靡章句對偶避諱精詳賢於往昔之推當北齊時已避忌如此其謂綴緝疏朴此正古人竒處方且以避諱精詳為工音律對偶為麗不知文章至此衰敝已劇尚將倀倀求名人之遺蹟耶吾知溺于世俗之好者此皆沈約徒隷之習也西岳崋山碑西岳崋山碑後漢延熹四年𢎞農太守孫璆建書曰五帝巡狩五岳立宫其下宫曰集靈殿曰集仙昔歐陽公謂集靈宫惟見於此天下之事其不可知衆矣然人各以所見自限不可以此斷天下事也文籍所傳其隠細不大顯於世凡㡬何書其顯而在人耳目者雖衆又未必盡得而知則其存與否吾安得而盡之故於書傳所疑每則慎之不敢決然以謂此也漢武集靈宫見於太華漢志既書之矣桓譚嘗賦之酈道元曰敷水北逕集靈宫其事甚備永叔惜不得見也張昶序曰岱山石立中宗繼統大華授璧秦胡絶緒白魚入舟姬武建業寳珪出水子朝䘮位布五方則處其西列三條則居其中世宗又經集靈之宫於其下想松喬之疇然則集靈亦其盛哉三輔黄圖書其制度類聚亦書其名劉勰盖嘗言矣予因得考之信郙閤頌漢郙閤當析里橋建寧五年李君諱㑹字伯都析里大橋於今乃造其言斯溪既然郙閤尤甚臨深長淵三百餘丈接木相連號為萬柱碑今所見如此考其地當闕而郙閤無存蹟昔歐陽文忠公嘗疑醳散闗之􅢉漯徙朝陽之平燥按㬎古文顯字漯川漢作濕讀謂川在卑濕書學至今同文古字濕作又作漯故漢人濕又作􅀢然則漯當作濕燥古文作慘盖喿與叄同體其言醳則與易同卜用醳亦易也至謂遭遇隤納則以傾隤地壊自納於淵漢人文陋無足道然用字亦本古也慶都碑堯母冢在濮州靁澤縣有碑余得而考之盖建寧五年廷尉臣仲定所建濟隂守宷晃元讓成陽令管遵君臺遣大掾輔助以成其説感赤龍而生堯則本春秋合誠圖謂慶都生於斗維之野常在三河東南天大雷電則血流潤大石之中生慶都為黄雲覆盖蔑食不飢許慎嘗為之論曰堯親慶都盖天帝之女寄伊長孺家年二十九無夫出觀於河有赤龍負圖而至曰赤龍受天之圖有人赤衣光面八采鬢􅐖長赤命帝起城元寳及生堯視如圖故睂有八采之色以帝王世紀考之堯為帝嚳子則豈為無父漢人尚䜟緯其論每若此彼以漢髙祖為雷電感大澤中以生則追敘堯事相配且為堯之後雖帝王之興必有禎祥不應怪詭至此劉焯嘗謂左氏稱在夏謂陶唐氏其處為劉氏非魯史本文廼漢儒欲其傳特為此語以漢出堯後獨堯左氏為有眀文以此求重於世孔頴達特信其説觀此碑所録與許慎立論則焯之説有所推考之矣昔皇甫謐以榖城為陽城而碑作成陽集古録以碑為正余按成陽本成伯國地記謂在濮州雷澤述征記曰成陽東南有堯􅮒則成陽惟謐為誤他書皆得證之延光四年書祠唐堯於成陽古未嘗亂也蔡邕石經經廢於世無所傳聞久矣當秦未滅詩書其學已失舊法世傳不可復求而得之況其在後世耶漢承秦亡雖起而盡收於溝渠炱燼間然缺殘湮淪無復全學諸儒妄度聖人隨誤釋謬方將訓習章句不得其序其能得之道全以求聖人之意而不失哉至其不得於言則疑於經不得於經則疑於學師習各異黨學相伐至改滋荄周由等以就其學有不合者則私定桼書以應其誤獨蔡邕鐫刻七經著於石碑有所撿据隠括其失而周盡當時號洪都三字其異文者附見此於已殘之經得收其遺逸而僅存其可貴也纔三十年兵火繼遭碑亦損缺魏正始中又立一字石經相承以為七經正字後魏武定四年移洛陽漢魏石經于鄴魏末齊神武自洛陽徙于鄴都河陽河岸崩遂没于水其得至鄴者殆不得其半周大象中詔徙鄴城石經于洛時為軍人破毁至有竊載還鄴者船壊没溺不勝其衆也其後得者盡破為橋基隋開皇六年自鄴京載入長安置于祕書内省議欲補緝立于國學㑹亂遂廢營造之司用為柱礎貞觀初魏徴始收聚之十不一存其相承傳拓之本猶在祕府當時考驗至詳謂不盡為邕如馬日碑數輩相與成之然漢隷簡古深于法度亦後世不及故兼存之趙綽曰唐造防秋館時穿地多得石經故洛中人士逮今有之考當時所得已是漢世所遺没而得者國初開地唐御史府得石經十餘石此又唐末淪没之所出也石經尚書祕書郎黄符以石經尚書示余為考而識之蔡邕以經籍去聖久逺文字多謬俗儒穿鑿疑誤後學熹平四年奏求正六經文字邕乃自書於碑大屋覆藏立太學門外號鴻都石經屋覆四面欄障開門於南河南郡設吏卒視之昔朱越石與兄書曰石經文都闕碑髙一丈許廣四尺駢羅相接太學在南眀門外講堂長十丈廣三尺堂前石經四部本碑四十六枚元魏時西行尚書周易公羊傳十六碑存十二碑毁南行禮記十五碑悉崩壊東行論語三碑毁禮記但存諫議大夫馬日磾議郎蔡邕名當是時尚有碑十八盖春秋尚書作篆隸科斗復有周易尚書公羊禮記四部陽衒之曰石經尚書公羊為四部又謂春秋尚書二部書有二經當是古文已出衒之出北齊謂得四十八碑誤也洛陽昔得石經尚書段殘破不屬盖盤庚洪範無逸多士多方總二百三十六字其文與今尚書盡同間有異者纔十餘然則知古文尚書盖已見於此或曰魏亦作石經安知此為漢所書哉余謂魏一字漢為三字此其得相亂耶且曰天命自度碑作亮恵鮮鰥寡碑作恵于矜寡乃逸既誕作乃憲既延治民祗懼作以民肆髙宗享國五十九年作百年以書攷之知傳受譌誤不若碑之正也方漢立學官書惟有歐陽夏侯其書雖不全見今諸家所引與古文尚書全異不應今所存古文反盡同也疑邕既立二書則或當以古文自存矣王肅解書悉是孔傳便知魏去漢世未遠肅得其文不然不應又盡同也晉内史梅賾闕舜典而當時猶疑知古經已廢于漢魏不爾肅得自私使世疑耶余知至晉其書已絶今考杜預釋左傳以古文為逸書又知歐陽夏侯所傳殆異於古文其知者於此乎考之石經論語石經今廢不存或自河南御史臺發地得之盖論語第一篇并第十四篇為一碑亡其半矣其可識者字二百七十又自第十八篇至第二十篇為一碑破缺殘餘得五之一其存字為三百五十七以今文論語挍之其異者若抑與之與為意與之我未見好仁者惡不仁者作未見好仁惡不仁朝聞道夕死可矣作可也有三年之䘮於其父母無乎字惡居下流而無流字年四十而見惡焉無焉字鳯兮鳯兮作何得之衰往者不可諫也来者猶可追也今本皆異執輿者為誰而作執車者為誰子是魯孔丘與曰是然後曰是知津矣比今書多二字耰而不輟作輟夫子憮然植其杖作置其斯而已矣作其斯以乎子游作子斿而在蕭牆之内作而在於蕭牆之内凡碑所存挍其異者已十五之一矣使鴻都舊書盡存則其異可知也夫以邕之所定雖未盡善然漢儒學専其挍定衆家得正譌誤多矣此猶是千嵗舊書比今兵火之餘師學已久廢其庸得論當耶朱龜碑余得朱龜碑廼考次其文曰龜字伯靈察孝㢘除郎中尚書侍郎以將事去官于時益州夷侵寇以君為御史中丞討伐鮮卑侵犯障塞復舉君拜幽州刺史吳兹曰序集古謂龜事蹟不見史傳其僅見此碑者如此余曰文忠偶未考耳龜事見漢書甚詳華陽國志曰靈帝熹平中蠻夷復反益州太守雝陟遣御史中丞朱龜將并涼勁兵討之不克朝議不能征欲依朱崖故事棄之大尉掾巴郡李顒益州太守與刺史龎芝伐之徴龜還顒將巴陵郡版楯軍討之皆破後漢書記熹平五年諸夷反叛執太守雝陟遣御史中丞討之不能克朝議欲棄之太守尉掾李顒建䇿討伐乃拜顒益州太守擊破之還得雝陟今以碑為据則漢書謂夷執雝陟朝廷遣龜何顒擊叛蠻始得雝陟則龜皆非其功故碑自略之其可考也昔常璩書蜀事最詳范曄修漢書多依用之至謂益州太守雝陟遣御史中丞朱龜則誤矣漢御史中丞在殿中察舉非法其出繡衣持斧墨綬以下得擅誅則太守非遣況龜為御史中丞非朝廷遣之豈更有他任而居外者耶其將并涼勁兵又益州得専而用哉或曰别本國志有蠻夷復反雝没故益州太守遣御史中丞朱龜討之余曰如此則里學小兒語也雝没故益州太守且何詞也哉而曰遣御史中丞者便為朝廷三府豈不益陋耶小黄門護敏碑此碑漢靈帝中平四年立小黄門在漢秩六百石永叔疑其刻碑已盛余考其時孫程以侍御史持節監護䘮事乗輿幸北部尉瞻望車騎單超賜東園祕器棺中玉具發五營騎士將作起􅮒塋侯覽豫作夀冢石棺雙闕髙㢘百尺其制如此則敏為大碑深鑿屬文見之何足稱異哉其書曰守静韜光以遠悔吝敏之能與不能未可以此得之然當時以此銘之豈亦慎時之失不得顯言亦於此稍見其有貴於斯者耶方其時如吕强忠直且不免死既死收捕宗親知當時盖亦有人矣為忠直而受禍其得盡行其志哉余讀其書而傷焉不自意當靈帝世而沈没宦豎中能自拔起於汙濁此其可貴也同時有北海趙祐以博學稱甘陵吳伉善風角託病不與事濟隂于肅下邳徐衍南陽郭耽稱為清忠不争威權又有李巡與諸儒五經文於石此其尤異者然其可謂宦者遂無其人耶若敏於是余知其上不得如巡强輩以取名自顯然下亦不若忠讓之徒剝䘮王室其不得書於史宜也周公禮殿記此記在成都學舍顔有意撰昔廬江文翁治蜀初立學成都作講堂石室開二堂左溫故右時習復作周公禮殿畫孔子像盖古者以周公為先聖孔子為先師故學必祀周公以孔子配之自開元後制度廢棄惟此存爾可以考也其後遇災太守陳留髙朕隸釋作朕修立増二石室更於夷里橋今學石室一為髙朕朕自有功學者故其室至今與文翁俱傳在漢為蜀守以勸學為本二人之存爾可以不廢也昔人嘗疑朕非制名可稱於臣下者自秦漢天子所為稱豈復可存耶流俗謂為髙勝至宋璋洗視知為髙朕范蜀公嘗為人道之甚詳余嘗至其處求字畫得之實為朕字知在漢猶未有嫌不必曲辨朕為勝也蜀書有髙勝為郪縣人昔人疑其為守非也魏文帝時夏侯霸為右將軍霸父朕嘗仕於漢可信也四皓神坐神坐西漢所書鑿石為位以為祭也一曰圏公神坐二曰綺里季神坐三曰夏黄公神坐四曰甪里先生神坐重畫深鑿其書甚完知漢人去秦不遠其相傳必不誤昔王元之在汝水以詩寄畢文簡曰未必頸如樗里子定應頭似夏黄公文簡謂綺里季夏當為一人黄公其别一人也元之撿諸書得陶淵眀洎唐詩人皆言黄綺如李白輩亦如此即改去此詩然世亦竟傳自是人皆以文簡為据余得四皓神坐知元之非誤但昔人論四皓或言園綺或曰綺夏不必盡舉首字取之順則用之或淵眀自讀作綺里季夏不可知也周燮曰追綺季之蹟世説曰綺季東園公夏黄公甪里先生謂之四皓姓書有綺里先生季其字也則為夏黄公無可疑者風俗通楚鬻熊之後為圏考之陳留志圏公自是秦博士周庚以常居圏中故謂圏公昔圏稱撰陳留風俗記蔡邕集有圏典魏有圏文生皆其後也古者甪與祿同文故樂書作觮鄭康成於禮甪皆作祿陳留志作甪唐李涪嘗辨之君子公昉碑此碑巴郡漢中太守郭芝立石碑祠下書其事者余見其已異也昔公昉以藥塗屋柱㱃牛馬六畜翛然與之俱逝神仙變怪不可以常理論之然雞犬皆仙昔淮南王安或為其説如此余見淮南以辠誅死知其為説者妄也公昉事雖増異矣然可以不信者於事則得為概見也昔葛稚川謂仙人可以盡求其言劉向所説列仙傳自刪秦大夫倉書中出之洪又采其遺者中黄仙人石光康鳯子崔文劉元藥子長李文尹子張子和王柱董君異衛叔卿梁伯而謂李八百為唐公昉作傭客後八百偽病公昉為廢數千萬不以為損又作惡瘡公昉與其妻妾舐之其瘡盡愈以丹經授公昉公昉入雲臺山中合丹丹成仙去洪之傳如此不聞其與六畜俱逝然碑立於漢而洪為書在後洪不取此知其謬也洪嘗論藥可㱃牛馬鳥獸令其不死則如公昉事正洪所欲得而不以言則知當無其傳彼果有傳人亦不以信也抑雖稚川好竒亦不謂其傳可信耶大抵世人喜道怪然理之所在可以考也天禄辟邪字鄧州南陽北有東漢太守汝南宗資墓墓列二獸其髙八尺角而鱗分鬛曳尾過壯大左曰天禄右曰辟邪皆刻膊上字不盡為隸法盖篆之變也漢自光和後碑盡為隸至書其額或作篆亦時有焉大體皆為偃波埶而此石所書獨多篆法知漢隸之有如此者以篆尚存也按書志桃拔一名符拔似鹿長尾一角為天禄兩角為辟邪無前角者為浮都禄又為鹿傳曰辟邪應瑞之獸也五色光煇長尾善知星變故其見于時著瑞應也封氏曰秦漢以来帝王陵前有騏驎辟邪象馬之屬人臣墓刻石虎羊以為儀衛其在唐有制然資以御史中丞而墓刻辟邪盖漢無此制也昔交趾獻獸麟首一角而肉鱗當時不能識其後沈括察其形謂是天禄然當時所獻無鱗甲五色但皮肉隠鱗不説長尾未得便為天禄也太尉楊震碑并隂漢既衰敝士俗流於容説俗儒不知名義所處震於此時拔然自振流俗間以直節峻行激發汙濁天下矯首鄉風知名節為重持禄保寵有願死而不忍為者孔子曰志士仁人無求生以害仁當震之發大難奮大義直指利害吾知震之死者非不幸也觀其門生故吏可謂衆矣而髙舒楊倫輩方且率天下而禍仁義以抗言為直以犯難為義以殺身為仁至摩礪激訐以進斷者為得事君之道其觸機投穽以陷患害相趣而不顧卒成黨禍而漢以亡夫為名節者本以成身吾見其身之禍求以治國家而國家卒以亡矣盖行仁義而不知其道者也光禄劉曜碑劉曜字季尼此碑可識者餘不完難句讀碑首書曰漢光禄勲東平監劉府君余按劉氏本范氏後自秦而反其故處者為劉氏則劉當為留説文留從􅣧户開為卯卯為春門户闔為酉酉為秋門則留自從丣丣為酉之省文故知留不從卯劉姓則不從刀也當漢季世緯書既出故言卯金刀者劉也學者不復考古妄意求之昔許慎以劉為鐂其轉而為劉者以田易為刀也然姓書周之大夫有食菜於劉者此畿内地也因地以為氏則與漢姓異出但不知古文劉者其書與漢如何故凡漢姓自當為鐂或以為畱南朝有畱異或以為出留侯非也特漢姓不失其本者如此橋太尉碑李元仲示余斷碑盖從地得之昔為礎也故其劖鑿不可盡見惟曰公諱𤣥其下已缺又曰濉陽人知其為橋公祖碑也公祖故臣門人述其言行銘于三鼎勒于征鉞官籍第次書之碑隂世或傳之此碑盖司徒崔列廷尉吳整刻列石者猶可於此書見之余謂𤣥在漢世無大事功惟疾惡破姦為務盖剛介一操之士當其時所薦達多在顯位故名猶傳又如魏武於其㣲時𤣥則識之故其後世名益顯也廣川書跋卷五
